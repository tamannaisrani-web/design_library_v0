<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DCDS Components — Interactive Playground</title>

    <!-- Tokens (CSS variables) -->
    <link rel="stylesheet" href="/src/theme/tokens.css" />
    <link rel="stylesheet" href="/src/components/Alert/Alert.css" />
    <link rel="stylesheet" href="/src/components/Button/Button.css" />
    <link rel="stylesheet" href="/src/components/LinkButton/LinkButton.css" />
    <link rel="stylesheet" href="/src/components/DropdownButton/DropdownButton.css" />
    <link rel="stylesheet" href="/src/components/ButtonGroup/ButtonGroup.css" />
    <link rel="stylesheet" href="/src/components/Switch/Switch.css" />
    <link rel="stylesheet" href="/src/components/RadioButton/RadioButton.css" />
    <link rel="stylesheet" href="/src/components/Checkbox/Checkbox.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- React + ReactDOM + Babel Standalone (in-browser JSX) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: 'Nunito Sans', system-ui, sans-serif;
        background: var(--color-surface-2);
        color: var(--color-text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* React mounts here — make it transparent to the flex column */
      #root {
        display: contents;
      }

      /* ------------------------------------------------------------------ */
      /* Top navigation bar                                                   */
      /* ------------------------------------------------------------------ */
      .app-nav {
        display: flex;
        align-items: stretch;
        background: var(--color-surface-1);
        border-bottom: 1px solid var(--color-stroke-subdued);
        padding: 0 var(--gap-24);
        height: 52px;
        flex-shrink: 0;
        z-index: 10;
        gap: var(--gap-4);
      }
      .app-nav__brand {
        display: flex;
        align-items: center;
        font-weight: var(--font-weight-bold);
        font-size: var(--font-size-label);
        color: var(--color-text-primary);
        padding-right: var(--gap-20);
        margin-right: var(--gap-12);
        border-right: 1px solid var(--color-stroke-subdued);
        user-select: none;
        white-space: nowrap;
        letter-spacing: 0.02em;
      }
      .app-nav__tab {
        display: flex;
        align-items: center;
        padding: 0 var(--gap-12);
        border: none;
        border-bottom: 2px solid transparent;
        background: none;
        cursor: pointer;
        font-family: inherit;
        font-size: var(--font-size-label);
        color: var(--color-text-subdued);
        font-weight: 400;
        transition: color 120ms ease, border-color 120ms ease;
        margin-bottom: -1px;
        white-space: nowrap;
      }
      .app-nav__tab:hover {
        color: var(--color-text-primary);
      }
      .app-nav__tab--active {
        color: var(--color-text-primary);
        border-bottom-color: var(--color-stroke-action);
        font-weight: var(--font-weight-bold);
      }
      .app-nav__tab:focus-visible {
        outline: 2px solid var(--color-stroke-focus);
        outline-offset: -2px;
        border-radius: var(--rd-XS);
      }

      /* ------------------------------------------------------------------ */
      /* Two-column layout                                                    */
      /* ------------------------------------------------------------------ */
      .app {
        display: grid;
        grid-template-columns: 360px 1fr;
        flex: 1;
        overflow: hidden;
      }
      .panel {
        background: var(--color-surface-1);
        border-right: 1px solid var(--color-stroke-subdued);
        padding: var(--gap-24);
        overflow-y: auto;
      }
      .panel h1 {
        font-size: var(--font-size-h4);
        margin: 0 0 var(--gap-8);
      }
      .panel h2 {
        font-size: var(--font-size-label);
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: var(--color-text-subdued);
        margin: var(--gap-24) 0 var(--gap-8);
        border-bottom: 1px solid var(--color-stroke-subdued);
        padding-bottom: var(--gap-4);
      }
      .panel h2:first-of-type {
        margin-top: var(--gap-16);
      }
      .control {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: var(--gap-8);
        gap: var(--gap-8);
      }
      .control label {
        font-size: var(--font-size-body-small);
        color: var(--color-text-subdued);
        flex-shrink: 0;
      }
      .control select,
      .control input[type='text'] {
        flex: 1;
        font-family: inherit;
        font-size: var(--font-size-body-small);
        padding: var(--gap-4) var(--gap-8);
        border: 1px solid var(--color-stroke-subdued);
        border-radius: var(--rd-XS);
        background: var(--color-surface-1);
        color: var(--color-text-primary);
        max-width: 180px;
      }
      .control input[type='checkbox'] { transform: scale(1.1); }

      /* ------------------------------------------------------------------ */
      /* Stage (right panel)                                                  */
      /* ------------------------------------------------------------------ */
      .stage {
        padding: var(--gap-32);
        overflow-y: auto;
      }
      .stage h2 {
        font-size: var(--font-size-h4);
        margin: 0 0 var(--gap-16);
        border-bottom: 2px solid var(--color-stroke-action);
        padding-bottom: var(--gap-4);
      }
      .stage section {
        margin-bottom: var(--gap-32);
        padding: var(--gap-24);
        background: var(--color-surface-1);
        border-radius: var(--rd-M);
      }
      .preview {
        display: flex;
        flex-wrap: wrap;
        gap: var(--gap-16);
        align-items: center;
        margin-top: var(--gap-8);
        padding: var(--gap-16);
        background: var(--color-surface-2);
        border-radius: var(--rd-S);
        min-height: 80px;
      }
      .preview--dark {
        background: var(--color-fill-primary-9);
      }
      .events {
        margin-top: var(--gap-8);
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: var(--font-size-validation);
        color: var(--color-text-subdued);
        max-height: 80px;
        overflow-y: auto;
        padding: var(--gap-4) var(--gap-8);
        background: var(--color-surface-3);
        border-radius: var(--rd-XS);
      }
      .stage-note {
        font-size: var(--font-size-validation);
        color: var(--color-text-subdued);
        margin: 0 0 var(--gap-8);
      }

      /* ------------------------------------------------------------------ */
      /* Alert-specific stage helpers                                         */
      /* ------------------------------------------------------------------ */
      .alert-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: var(--gap-12);
        margin-top: var(--gap-8);
        padding: var(--gap-16);
        background: var(--color-surface-2);
        border-radius: var(--rd-S);
      }
      .alert-toast-triggers {
        display: flex;
        flex-wrap: wrap;
        gap: var(--gap-8);
        margin-top: var(--gap-8);
        padding: var(--gap-16);
        background: var(--color-surface-2);
        border-radius: var(--rd-S);
      }
      /* Toast overlay (fixed bottom-right) */
      .toast-container {
        position: fixed;
        bottom: var(--gap-24);
        right: var(--gap-24);
        width: 400px;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        gap: var(--gap-8);
        pointer-events: none;
      }
      .toast-container > * {
        pointer-events: all;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>

    <!--
      Inline component re-implementations.
      The canonical source is src/components/*.tsx. These mirror the same
      props/classes 1:1 so opening this HTML produces a true preview without
      a build step.
    -->
    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useId } = React;

      /* ============================================================
       * Alert
       * ============================================================ */
      /* Paths mirrored exactly from assets/icons/bold/ and assets/icons/linear/ */
      /* All states use InfoCircleBold — color applied via CSS on .dcds-Alert__icon */
      const ALERT_ICON_SVG = (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22ZM12.75 16C12.75 16.41 12.41 16.75 12 16.75C11.59 16.75 11.25 16.41 11.25 16L11.25 11C11.25 10.59 11.59 10.25 12 10.25C12.41 10.25 12.75 10.59 12.75 11L12.75 16ZM11.08 7.62C11.13 7.49 11.2 7.39 11.29 7.29C11.39 7.2 11.5 7.13 11.62 7.08C11.74 7.03 11.87 7 12 7C12.13 7 12.26 7.03 12.38 7.08C12.5 7.13 12.61 7.2 12.71 7.29C12.8 7.39 12.87 7.49 12.92 7.62C12.97 7.74 13 7.87 13 8C13 8.13 12.97 8.26 12.92 8.38C12.87 8.5 12.8 8.61 12.71 8.71C12.61 8.8 12.5 8.87 12.38 8.92C12.14 9.02 11.86 9.02 11.62 8.92C11.5 8.87 11.39 8.8 11.29 8.71C11.2 8.61 11.13 8.5 11.08 8.38C11.03 8.26 11 8.13 11 8C11 7.87 11.03 7.74 11.08 7.62Z" fill="currentColor" />
        </svg>
      );
      const ALERT_ICONS = {
        success: ALERT_ICON_SVG,
        error:   ALERT_ICON_SVG,
        warning: ALERT_ICON_SVG,
        info:    ALERT_ICON_SVG,
      };

      const AlertCloseIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M5.00098 5L19 18.9991" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
          <path d="M4.99996 18.9991L18.999 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );

      function Alert({
        state = 'info',
        emphasis = 'subtle',
        isFlag = false,
        title,
        children,
        onClose,
        actions,
        className,
      }) {
        const timerRef = useRef(null);

        useEffect(() => {
          if (!isFlag || !onClose) return;
          timerRef.current = setTimeout(onClose, 5000);
          return () => { if (timerRef.current) clearTimeout(timerRef.current); };
        }, [isFlag, onClose]);

        const role = (state === 'error' || state === 'warning') ? 'alert' : 'status';
        const ariaLive = state === 'error' ? 'assertive' : 'polite';
        const showClose = emphasis === 'subtle' && !!onClose;

        const classes = [
          'dcds-Alert',
          `dcds-Alert--state-${state}`,
          `dcds-Alert--emphasis-${emphasis}`,
          isFlag ? 'dcds-Alert--flag' : '',
          className || '',
        ].filter(Boolean).join(' ');

        return (
          <div className={classes} role={role} aria-live={ariaLive}>
            <div className="dcds-Alert__inner">
              <div className="dcds-Alert__content">
                <span className="dcds-Alert__icon">{ALERT_ICONS[state]}</span>
                <div className="dcds-Alert__body">
                  <div className="dcds-Alert__text">
                    {title && <p className="dcds-Alert__title">{title}</p>}
                    {children && <p className="dcds-Alert__message">{children}</p>}
                  </div>
                  {actions && emphasis === 'subtle' && (
                    <div className="dcds-Alert__actions">{actions}</div>
                  )}
                </div>
              </div>
              {showClose && (
                <button type="button" className="dcds-Alert__close" aria-label="Dismiss" onClick={onClose}>
                  <AlertCloseIcon />
                </button>
              )}
            </div>
          </div>
        );
      }

      /* ============================================================
       * Button
       * ============================================================ */
      function Button({
        variant = 'Primary',
        color = 'Primary',
        size = 'M',
        isDisabled = false,
        isFullWidth = false,
        isIconOnly = false,
        ariaLabel,
        ariaBusy,
        type = 'button',
        className,
        children,
        onClick,
        onFocus,
        onBlur,
        onMouseEnter,
        onMouseLeave,
        onKeyDown,
      }) {
        const classes = [
          'dcds-Button',
          `dcds-Button--variant-${variant}`,
          `dcds-Button--color-${color}`,
          `dcds-Button--size-${size}`,
          isIconOnly ? 'dcds-Button--icon-only' : '',
          isFullWidth ? 'dcds-Button--full-width' : '',
          className || '',
        ].filter(Boolean).join(' ');
        return (
          <button
            type={type}
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-busy={ariaBusy || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            onClick={onClick}
            onFocus={onFocus}
            onBlur={onBlur}
            onMouseEnter={onMouseEnter}
            onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * LinkButton
       * ============================================================ */
      function LinkButton({
        state = 'Default',
        size = 'M',
        isIconOnly = false,
        ariaLabel,
        href,
        target,
        rel,
        className,
        children,
        onClick,
      }) {
        const isDisabled = state === 'Disabled';
        const classes = [
          'dcds-LinkButton',
          `dcds-LinkButton--state-${state}`,
          `dcds-LinkButton--size-${size}`,
          className || '',
        ].filter(Boolean).join(' ');
        if (href) {
          return (
            <a
              className={classes}
              href={isDisabled ? undefined : href}
              target={target}
              rel={rel}
              aria-disabled={isDisabled || undefined}
              aria-label={isIconOnly ? ariaLabel : undefined}
              onClick={onClick}
            >
              {children}
            </a>
          );
        }
        return (
          <button
            type="button"
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            onClick={onClick}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * ChevronDownIcon
       * ============================================================ */
      const ChevronDownIcon = ({ size = 16 }) => (
        <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <path d="M3.5 6L8 10.5L12.5 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );

      /* ============================================================
       * DropdownButton (with floating _BaseMenu)
       * ============================================================ */
      function DropdownButton({
        variant = 'Secondary',
        state = 'Default',
        size = 'M',
        isOpen = false,
        isDisabled = false,
        menuItems = [],
        onToggle,
        onSelect,
        className,
        children,
        onClick,
      }) {
        const wrapperRef = useRef(null);
        const resolvedState = isDisabled ? 'Disabled' : isOpen ? 'Open' : state;

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => {
            if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
              if (onToggle) onToggle(false);
            }
          };
          document.addEventListener('mousedown', handler);
          return () => document.removeEventListener('mousedown', handler);
        }, [isOpen, onToggle]);

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => { if (e.key === 'Escape' && onToggle) onToggle(false); };
          document.addEventListener('keydown', handler);
          return () => document.removeEventListener('keydown', handler);
        }, [isOpen, onToggle]);

        const buttonClasses = [
          'dcds-DropdownButton',
          `dcds-DropdownButton--variant-${variant}`,
          `dcds-DropdownButton--state-${resolvedState}`,
          `dcds-DropdownButton--size-${size}`,
        ].filter(Boolean).join(' ');
        const wrapperClasses = ['dcds-DropdownButton__wrapper', className || ''].filter(Boolean).join(' ');

        return (
          <div ref={wrapperRef} className={wrapperClasses}>
            <button
              type="button"
              className={buttonClasses}
              disabled={isDisabled || resolvedState === 'Disabled'}
              aria-disabled={isDisabled || undefined}
              aria-haspopup="menu"
              aria-expanded={isOpen}
              onClick={(e) => {
                if (onToggle) onToggle(!isOpen);
                if (onClick) onClick(e);
              }}
            >
              <span>{children}</span>
              <span className="dcds-DropdownButton__chevron"><ChevronDownIcon size={16} /></span>
            </button>
            {isOpen && (
              <ul role="menu" className="dcds-DropdownButton__menu">
                {menuItems.map((item) => (
                  <li role="none" key={item.id}>
                    <button
                      type="button"
                      role="menuitem"
                      className="dcds-DropdownButton__menu-item"
                      disabled={item.disabled}
                      onClick={() => {
                        if (item.disabled) return;
                        if (item.onClick) item.onClick();
                        if (onSelect) onSelect(item.id);
                        if (onToggle) onToggle(false);
                      }}
                    >
                      {item.label}
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      }

      /* ============================================================
       * ButtonGroup
       * ============================================================ */
      function ButtonGroup({ Style = 'Default', isLink = false, ariaLabel, className, children }) {
        const resolved = isLink ? 'Link' : Style;
        const classes = ['dcds-ButtonGroup', `dcds-ButtonGroup--Style-${resolved}`, className || ''].filter(Boolean).join(' ');
        return (
          <div role="group" aria-label={ariaLabel} className={classes}>
            {children}
          </div>
        );
      }

      /* ============================================================
       * Switch
       * ============================================================ */
      function Switch({ State = 'Enabled', checked, defaultChecked = false, name, label, onChange }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const value = isControlled ? !!checked : internal;
        const isDisabled = State === 'Disabled';
        const id = useId();
        const classes = ['dcds-Switch', `dcds-Switch--State-${State}`].join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              type="checkbox"
              role="switch"
              className="dcds-Switch__input"
              name={name}
              checked={value}
              disabled={isDisabled}
              aria-checked={value}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
            />
            <span className="dcds-Switch__track"><span className="dcds-Switch__thumb" /></span>
            {label && <span className="dcds-Switch__label">{label}</span>}
          </label>
        );
      }

      /* ============================================================
       * RadioButton
       * ============================================================ */
      function RadioButton({ State = 'Enabled', name, value, label, checked, defaultChecked, onChange }) {
        const isDisabled = State === 'Disabled';
        const id = useId();
        return (
          <label className={`dcds-RadioButton dcds-RadioButton--State-${State}`} htmlFor={id}>
            <input
              id={id}
              type="radio"
              className="dcds-RadioButton__input"
              name={name}
              value={value}
              checked={checked}
              defaultChecked={defaultChecked}
              disabled={isDisabled}
              onChange={onChange}
            />
            <span className="dcds-RadioButton__indicator" />
            <span className="dcds-RadioButton__label">{label}</span>
          </label>
        );
      }

      /* ============================================================
       * Checkbox
       * ============================================================ */
      function Checkbox({ State = 'Enabled', name, value, label, checked, defaultChecked = false, indeterminate = false, required = false, onChange }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const resolved = isControlled ? !!checked : internal;
        const isDisabled = State === 'Disabled';
        const ref = useRef(null);
        useEffect(() => { if (ref.current) ref.current.indeterminate = indeterminate; }, [indeterminate]);
        const id = useId();
        const classes = ['dcds-Checkbox', `dcds-Checkbox--State-${State}`, indeterminate ? 'dcds-Checkbox--indeterminate' : ''].filter(Boolean).join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              ref={ref}
              type="checkbox"
              className="dcds-Checkbox__input"
              name={name}
              value={value}
              checked={resolved}
              disabled={isDisabled}
              required={required}
              aria-checked={indeterminate ? 'mixed' : resolved}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
            />
            <span className="dcds-Checkbox__indicator" />
            <span className="dcds-Checkbox__label">{label}</span>
          </label>
        );
      }

      /* ============================================================
       * Reusable control widgets
       * ============================================================ */
      function CtrlSelect({ label, value, onChange, options }) {
        return (
          <div className="control">
            <label>{label}</label>
            <select value={value} onChange={(e) => onChange(e.target.value)}>
              {options.map((o) => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        );
      }
      function CtrlToggle({ label, checked, onChange }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
          </div>
        );
      }
      function CtrlText({ label, value, onChange }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="text" value={value} onChange={(e) => onChange(e.target.value)} />
          </div>
        );
      }
      function useEventLog() {
        const [log, setLog] = useState([]);
        const push = (msg) => setLog((prev) => [`${new Date().toLocaleTimeString()}  ${msg}`, ...prev.slice(0, 9)]);
        return [log, push];
      }

      /* ============================================================
       * Alert state messages
       * ============================================================ */
      function DismissableAlert({ state }) {
        const [dismissed, setDismissed] = React.useState(false);
        if (dismissed) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
              <span>{state} alert dismissed</span>
              <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontSize: 'var(--font-size-body-small)', fontFamily: 'inherit', padding: 0 }} onClick={() => setDismissed(false)}>
                Restore
              </button>
            </div>
          );
        }
        return (
          <Alert state={state} emphasis="subtle" title={ALERT_TITLES[state]} onClose={() => setDismissed(true)}>
            {ALERT_MESSAGES[state]}
          </Alert>
        );
      }
      const ALERT_MESSAGES = {
        success: 'Your changes have been saved successfully.',
        error: 'Something went wrong. Please try again or contact support.',
        warning: 'This action cannot be undone. All associated data will be permanently removed.',
        info: 'You are viewing a read-only snapshot of this report.',
      };
      const ALERT_TITLES = {
        success: 'Changes saved',
        error: 'Submission failed',
        warning: 'Irreversible action',
        info: 'Read-only mode',
      };
      const STATES = ['success', 'error', 'warning', 'info'];

      /* ============================================================
       * The full playground
       * ============================================================ */
      function Playground() {
        /* --- Navigation --- */
        const [activeTab, setActiveTab] = useState('buttons');

        /* --- Button controls --- */
        const [btnVariant, setBtnVariant] = useState('Primary');
        const [btnColor, setBtnColor] = useState('Primary');
        const [btnSize, setBtnSize] = useState('M');
        const [btnDisabled, setBtnDisabled] = useState(false);
        const [btnFullWidth, setBtnFullWidth] = useState(false);
        const [btnIconOnly, setBtnIconOnly] = useState(false);
        const [btnLabel, setBtnLabel] = useState('Save changes');
        const [btnLog, pushBtnLog] = useEventLog();

        /* --- LinkButton controls --- */
        const [lbState, setLbState] = useState('Default');
        const [lbSize, setLbSize] = useState('M');
        const [lbLabel, setLbLabel] = useState('View details');
        const [lbHref, setLbHref] = useState('');
        const [lbLog, pushLbLog] = useEventLog();

        /* --- DropdownButton controls --- */
        const [dbVariant, setDbVariant] = useState('Secondary');
        const [dbSize, setDbSize] = useState('M');
        const [dbDisabled, setDbDisabled] = useState(false);
        const [dbOpen, setDbOpen] = useState(false);
        const [dbLabel, setDbLabel] = useState('Actions');
        const [dbLog, pushDbLog] = useEventLog();

        /* --- ButtonGroup controls --- */
        const [bgStyle, setBgStyle] = useState('Default');

        /* --- Switch controls --- */
        const [swState, setSwState] = useState('Enabled');
        const [swChecked, setSwChecked] = useState(true);
        const [swLog, pushSwLog] = useEventLog();

        /* --- RadioButton controls --- */
        const [rbState, setRbState] = useState('Enabled');
        const [rbValue, setRbValue] = useState('monthly');

        /* --- Checkbox controls --- */
        const [cbState, setCbState] = useState('Enabled');
        const [cbIndeterminate, setCbIndeterminate] = useState(false);
        const [cbChecked, setCbChecked] = useState(false);

        /* --- Alert controls --- */
        const [alertState, setAlertState] = useState('info');
        const [alertEmphasis, setAlertEmphasis] = useState('subtle');
        const [alertIsFlag, setAlertIsFlag] = useState(false);
        const [alertShowTitle, setAlertShowTitle] = useState(true);
        const [alertTitle, setAlertTitle] = useState('Alert Title');
        const [alertMessage, setAlertMessage] = useState('Lorem ipsum is placeholder text commonly used in the graphic, print, and publishing industries.');
        const [alertShowClose, setAlertShowClose] = useState(true);
        const [alertShowActions, setAlertShowActions] = useState(false);
        const [alertClosed, setAlertClosed] = useState(false);

        /* --- Toast state --- */
        const [toasts, setToasts] = useState([]);
        function showToast(state) {
          const id = Date.now();
          setToasts((prev) => [...prev, { id, state }]);
        }
        function dismissToast(id) {
          setToasts((prev) => prev.filter((t) => t.id !== id));
        }

        const tabs = [
          { id: 'buttons',   label: 'Buttons'   },
          { id: 'selection', label: 'Selection'  },
          { id: 'feedback',  label: 'Feedback'   },
        ];

        return (
          <>
            {/* ---- Top navigation ---- */}
            <nav className="app-nav" aria-label="Component groups">
              <span className="app-nav__brand">DCDS Playground</span>
              {tabs.map((tab) => (
                <button
                  key={tab.id}
                  className={`app-nav__tab ${activeTab === tab.id ? 'app-nav__tab--active' : ''}`}
                  onClick={() => setActiveTab(tab.id)}
                  aria-current={activeTab === tab.id ? 'page' : undefined}
                >
                  {tab.label}
                </button>
              ))}
            </nav>

            <div className="app">
              {/* ============================================================
               * LEFT PANEL — controls
               * ============================================================ */}
              <aside className="panel">
                <h1>Controls</h1>
                <p style={{ fontSize: 12, color: 'var(--color-text-subdued)', margin: 0 }}>
                  Adjust props and see the result live on the right.
                </p>

                {/* --- Buttons tab controls --- */}
                {activeTab === 'buttons' && (
                  <>
                    <h2>Button</h2>
                    <CtrlSelect label="variant"    value={btnVariant}  onChange={setBtnVariant}  options={['Primary', 'Secondary', 'Tertiary']} />
                    <CtrlSelect label="color"      value={btnColor}    onChange={setBtnColor}    options={['Primary', 'Error', 'Warning']} />
                    <CtrlSelect label="size"       value={btnSize}     onChange={setBtnSize}     options={['L', 'M', 'S', 'XS']} />
                    <CtrlToggle label="isDisabled" checked={btnDisabled}  onChange={setBtnDisabled} />
                    <CtrlToggle label="isFullWidth" checked={btnFullWidth} onChange={setBtnFullWidth} />
                    <CtrlToggle label="isIconOnly" checked={btnIconOnly}  onChange={setBtnIconOnly} />
                    <CtrlText   label="label"      value={btnLabel}    onChange={setBtnLabel} />

                    <h2>LinkButton</h2>
                    <CtrlSelect label="state" value={lbState} onChange={setLbState} options={['Default', 'Disabled']} />
                    <CtrlSelect label="size"  value={lbSize}  onChange={setLbSize}  options={['L', 'M', 'S', 'XS']} />
                    <CtrlText   label="label" value={lbLabel} onChange={setLbLabel} />
                    <CtrlText   label="href"  value={lbHref}  onChange={setLbHref} />

                    <h2>DropdownButton</h2>
                    <CtrlSelect label="variant"    value={dbVariant}  onChange={setDbVariant}  options={['Primary', 'Secondary', 'Tertiary']} />
                    <CtrlSelect label="size"       value={dbSize}     onChange={setDbSize}     options={['L', 'M', 'S', 'XS']} />
                    <CtrlToggle label="isDisabled" checked={dbDisabled} onChange={setDbDisabled} />
                    <CtrlToggle label="isOpen"     checked={dbOpen}    onChange={setDbOpen} />
                    <CtrlText   label="label"      value={dbLabel}    onChange={setDbLabel} />

                    <h2>ButtonGroup</h2>
                    <CtrlSelect label="Style" value={bgStyle} onChange={setBgStyle} options={['Default', 'Link']} />
                  </>
                )}

                {/* --- Selection tab controls --- */}
                {activeTab === 'selection' && (
                  <>
                    <h2>Switch</h2>
                    <CtrlSelect label="State"   value={swState}   onChange={setSwState}   options={['Enabled', 'Disabled']} />
                    <CtrlToggle label="checked" checked={swChecked} onChange={setSwChecked} />

                    <h2>RadioButton</h2>
                    <CtrlSelect label="State"    value={rbState} onChange={setRbState} options={['Enabled', 'Disabled']} />
                    <CtrlSelect label="selected" value={rbValue} onChange={setRbValue} options={['monthly', 'quarterly', 'annual']} />

                    <h2>Checkbox</h2>
                    <CtrlSelect label="State"         value={cbState}        onChange={setCbState}        options={['Enabled', 'Disabled']} />
                    <CtrlToggle label="checked"       checked={cbChecked}     onChange={setCbChecked} />
                    <CtrlToggle label="indeterminate" checked={cbIndeterminate} onChange={setCbIndeterminate} />
                  </>
                )}

                {/* --- Feedback tab controls --- */}
                {activeTab === 'feedback' && (
                  <>
                    <h2>Alert</h2>
                    <CtrlSelect label="state"        value={alertState}       onChange={(v) => { setAlertState(v); setAlertClosed(false); }} options={['success', 'error', 'warning', 'info']} />
                    <CtrlSelect label="emphasis"     value={alertEmphasis}    onChange={(v) => { setAlertEmphasis(v); setAlertClosed(false); }} options={['subtle', 'subtler']} />
                    <CtrlToggle label="isFlag"       checked={alertIsFlag}    onChange={(v) => { setAlertIsFlag(v); setAlertClosed(false); }} />
                    <CtrlToggle label="showTitle"    checked={alertShowTitle} onChange={setAlertShowTitle} />
                    <CtrlText   label="title"        value={alertTitle}       onChange={setAlertTitle} />
                    <CtrlText   label="message"      value={alertMessage}     onChange={setAlertMessage} />
                    <CtrlToggle label="showDismiss"  checked={alertShowClose} onChange={(v) => { setAlertShowClose(v); setAlertClosed(false); }} />
                    <CtrlToggle label="showActions"  checked={alertShowActions} onChange={setAlertShowActions} />
                  </>
                )}
              </aside>

              {/* ============================================================
               * RIGHT STAGE — previews
               * ============================================================ */}
              <main className="stage">

                {/* ============================================================
                 * BUTTONS TAB
                 * ============================================================ */}
                {activeTab === 'buttons' && (
                  <>
                    <section>
                      <h2>Button</h2>
                      <p className="stage-note">
                        Click to fire all attached handlers (onClick, onFocus, onBlur, onMouseEnter, onMouseLeave, onKeyDown).
                      </p>
                      <div className="preview">
                        <Button
                          variant={btnVariant}
                          color={btnColor}
                          size={btnSize}
                          isDisabled={btnDisabled}
                          isFullWidth={btnFullWidth}
                          isIconOnly={btnIconOnly}
                          ariaLabel={btnIconOnly ? btnLabel : undefined}
                          onClick={() => pushBtnLog('onClick')}
                          onFocus={() => pushBtnLog('onFocus')}
                          onBlur={() => pushBtnLog('onBlur')}
                          onMouseEnter={() => pushBtnLog('onMouseEnter')}
                          onMouseLeave={() => pushBtnLog('onMouseLeave')}
                          onKeyDown={(e) => pushBtnLog(`onKeyDown: ${e.key}`)}
                        >
                          {btnIconOnly ? <ChevronDownIcon size={16} /> : btnLabel}
                        </Button>
                      </div>
                      <div className="events">
                        {btnLog.length === 0 ? '— no events yet —' : btnLog.join('\n')}
                      </div>
                    </section>

                    <section>
                      <h2>LinkButton</h2>
                      <p className="stage-note">
                        Provide an <code>href</code> to render as <code>&lt;a&gt;</code>; leave empty for <code>&lt;button&gt;</code>.
                      </p>
                      <div className="preview">
                        <LinkButton state={lbState} size={lbSize} href={lbHref || undefined} onClick={() => pushLbLog('onClick')}>
                          {lbLabel}
                        </LinkButton>
                      </div>
                      <div className="events">
                        {lbLog.length === 0 ? '— no events yet —' : lbLog.join('\n')}
                      </div>
                    </section>

                    <section>
                      <h2>DropdownButton + _BaseMenu</h2>
                      <p className="stage-note">
                        When <code>isOpen=true</code>, the floating menu drops below. Click outside or press <code>Escape</code> to dismiss.
                      </p>
                      <div className="preview" style={{ minHeight: 180, alignItems: 'flex-start' }}>
                        <DropdownButton
                          variant={dbVariant}
                          size={dbSize}
                          isDisabled={dbDisabled}
                          isOpen={dbOpen}
                          onToggle={(next) => { setDbOpen(next); pushDbLog(`onToggle: ${next}`); }}
                          onSelect={(id) => pushDbLog(`onSelect: ${id}`)}
                          onClick={() => pushDbLog('onClick')}
                          menuItems={[{ id: 'opt-1', label: 'Option 1' }, { id: 'opt-2', label: 'Option 2' }]}
                        >
                          {dbLabel}
                        </DropdownButton>
                      </div>
                      <div className="events">
                        {dbLog.length === 0 ? '— no events yet —' : dbLog.join('\n')}
                      </div>
                    </section>

                    <section>
                      <h2>ButtonGroup — paired action layout</h2>
                      <p className="stage-note">
                        Pairs related action buttons with a consistent gap. Each child retains its own rounded corners.
                      </p>
                      <div className="preview">
                        <ButtonGroup Style={bgStyle} ariaLabel="Paired actions">
                          {bgStyle === 'Link' ? (
                            <>
                              <LinkButton size="M" href="#">Link ↗</LinkButton>
                              <Button variant="Primary" color="Primary" size="M">Button</Button>
                            </>
                          ) : (
                            <>
                              <Button variant="Secondary" color="Primary" size="M">Cancel</Button>
                              <Button variant="Primary" color="Primary" size="M">Save</Button>
                            </>
                          )}
                        </ButtonGroup>
                      </div>
                      <p className="stage-note" style={{ marginTop: 'var(--gap-16)' }}>Large size:</p>
                      <div className="preview">
                        <ButtonGroup Style={bgStyle} ariaLabel="Paired actions large">
                          {bgStyle === 'Link' ? (
                            <>
                              <LinkButton size="L" href="#">Link ↗</LinkButton>
                              <Button variant="Primary" color="Primary" size="L">Button</Button>
                            </>
                          ) : (
                            <>
                              <Button variant="Secondary" color="Primary" size="L">Cancel</Button>
                              <Button variant="Primary" color="Primary" size="L">Save</Button>
                            </>
                          )}
                        </ButtonGroup>
                      </div>
                    </section>
                  </>
                )}

                {/* ============================================================
                 * SELECTION TAB
                 * ============================================================ */}
                {activeTab === 'selection' && (
                  <>
                    <section>
                      <h2>Switch</h2>
                      <div className="preview">
                        <Switch
                          State={swState}
                          checked={swChecked}
                          label="Email notifications"
                          onChange={(next) => { setSwChecked(next); pushSwLog(`onChange: ${next}`); }}
                        />
                      </div>
                      <div className="events">
                        {swLog.length === 0 ? '— no events yet —' : swLog.join('\n')}
                      </div>
                    </section>

                    <section>
                      <h2>RadioButton — group</h2>
                      <p className="stage-note">
                        Always wrap in <code>&lt;fieldset&gt;</code> + <code>&lt;legend&gt;</code> with a shared <code>name</code>.
                      </p>
                      <div className="preview">
                        <fieldset style={{ border: '1px solid var(--color-stroke-subdued)', borderRadius: 'var(--rd-S)', padding: 'var(--gap-12)', display: 'flex', flexDirection: 'column', gap: 'var(--gap-8)' }}>
                          <legend style={{ padding: '0 var(--gap-8)', color: 'var(--color-text-subdued)', fontSize: 'var(--font-size-body-small)' }}>
                            Repayment frequency
                          </legend>
                          {['monthly', 'quarterly', 'annual'].map((v) => (
                            <RadioButton key={v} name="freq" value={v} label={v[0].toUpperCase() + v.slice(1)} State={rbState} checked={rbValue === v} onChange={() => setRbValue(v)} />
                          ))}
                        </fieldset>
                      </div>
                    </section>

                    <section>
                      <h2>Checkbox</h2>
                      <p className="stage-note">
                        Toggling <code>indeterminate</code> sets <code>aria-checked="mixed"</code> for select-all patterns.
                      </p>
                      <div className="preview">
                        <Checkbox
                          State={cbState}
                          label="I agree to the terms and conditions"
                          checked={cbChecked}
                          indeterminate={cbIndeterminate}
                          onChange={(next) => setCbChecked(next)}
                        />
                      </div>
                    </section>
                  </>
                )}

                {/* ============================================================
                 * FEEDBACK TAB
                 * ============================================================ */}
                {activeTab === 'feedback' && (
                  <>
                    {/* Interactive playground — TOP */}
                    <section>
                      <h2>Alert — Interactive Playground</h2>
                      <p className="stage-note">Adjust props in the left panel to preview any combination.</p>
                      <div className="preview" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                        {alertClosed ? (
                          <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
                            <span>Alert dismissed.</span>
                            <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontFamily: 'inherit', fontSize: 'var(--font-size-body-small)', padding: 0 }} onClick={() => setAlertClosed(false)}>
                              Restore
                            </button>
                          </div>
                        ) : (
                          <Alert
                            state={alertState}
                            emphasis={alertEmphasis}
                            isFlag={alertIsFlag}
                            title={alertShowTitle ? (alertTitle || undefined) : undefined}
                            onClose={alertShowClose ? () => setAlertClosed(true) : undefined}
                            actions={alertShowActions ? (
                              <>
                                <Button variant="Secondary" color="Primary" size="S">Button</Button>
                                <LinkButton size="S">Link</LinkButton>
                              </>
                            ) : undefined}
                          >
                            {alertMessage}
                          </Alert>
                        )}
                      </div>
                    </section>

                    {/* All 4 states — subtle emphasis */}
                    <section>
                      <h2>Alert — All States · subtle</h2>
                      <p className="stage-note">
                        <code>emphasis="subtle"</code>: light background tint + 1 px coloured border. Default for most usage.
                      </p>
                      <div className="alert-grid">
                        {STATES.map((s) => (
                          <Alert key={s} state={s} emphasis="subtle" title={ALERT_TITLES[s]}>
                            {ALERT_MESSAGES[s]}
                          </Alert>
                        ))}
                      </div>
                    </section>

                    {/* All 4 states — subtler emphasis */}
                    <section>
                      <h2>Alert — All States · subtler</h2>
                      <p className="stage-note">
                        <code>emphasis="subtler"</code>: white background + 2 px coloured border. Use when the Alert is secondary to surrounding content.
                      </p>
                      <div className="alert-grid">
                        {STATES.map((s) => (
                          <Alert key={s} state={s} emphasis="subtler" title={ALERT_TITLES[s]}>
                            {ALERT_MESSAGES[s]}
                          </Alert>
                        ))}
                      </div>
                    </section>

                    {/* Dismiss demo */}
                    <section>
                      <h2>Alert — Dismiss (onClose)</h2>
                      <p className="stage-note">
                        <code>emphasis="subtle"</code> shows a dismiss button when <code>onClose</code> is supplied. <code>emphasis="subtler"</code> never shows one.
                      </p>
                      <div className="alert-grid">
                        {STATES.map((s) => <DismissableAlert key={s} state={s} />)}
                      </div>
                    </section>

                    {/* Toast / isFlag demo */}
                    <section>
                      <h2>Alert — Toast (isFlag)</h2>
                      <p className="stage-note">
                        <code>isFlag=true</code>: floating snackbar with left-border accent + shadow. Auto-dismisses after 5 s.
                      </p>
                      <div className="alert-toast-triggers">
                        <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('success')}>Success toast</Button>
                        <Button variant="Secondary" color="Error"    size="M" onClick={() => showToast('error')}>Error toast</Button>
                        <Button variant="Secondary" color="Warning"  size="M" onClick={() => showToast('warning')}>Warning toast</Button>
                        <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('info')}>Info toast</Button>
                      </div>
                      {toasts.length > 0 && (
                        <p className="stage-note" style={{ marginTop: 'var(--gap-8)' }}>
                          {toasts.length} active toast{toasts.length > 1 ? 's' : ''} — bottom-right corner.
                        </p>
                      )}
                    </section>
                  </>
                )}
              </main>
            </div>

            {/* ---- Toast overlay (fixed bottom-right) ---- */}
            <div className="toast-container" aria-live="polite" aria-atomic="false">
              {toasts.map((t) => (
                <Alert key={t.id} state={t.state} emphasis="subtle" isFlag={true} title={ALERT_TITLES[t.state]} onClose={() => dismissToast(t.id)}>
                  {ALERT_MESSAGES[t.state]}
                </Alert>
              ))}
            </div>
          </>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Playground />);
    </script>
  </body>
</html>
