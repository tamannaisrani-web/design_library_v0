      function getBpForWidth(w, navExpanded, noNav) {
        if (w < 576)  return 'Mobile';
        if (w < 992)  return 'Tablet';
        if (noNav) return w < 1200 ? 'Desktop-S-No-Nav' : 'Desktop-L-No-Nav';
        const exp = navExpanded !== false;
        if (w < 1200) return exp ? 'Desktop-S-Expanded' : 'Desktop-S-Collapsed';
        return exp ? 'Desktop-L-Expanded' : 'Desktop-L-Collapsed';
      }

      function GridSection() {
        const [activeBp,     setActiveBp]     = useState('Mobile');
        const [resizeWidth,  setResizeWidth]  = useState(360);
        const [isResizing,   setIsResizing]   = useState(false);
        const [navExpanded,  setNavExpanded]  = useState(true);
        const [noNav,        setNoNav]        = useState(false);
        const { setOpen } = React.useContext(PanelContext);
        const isDesktop = resizeWidth >= 992 && !noNav;
        const autoBp = getBpForWidth(resizeWidth, navExpanded, noNav);

        const startResize = (e) => {
          e.preventDefault();
          const startX = e.clientX;
          const startW = resizeWidth;
          const onMove = (me) => {
            const next = Math.round(Math.max(320, Math.min(1920, startW + me.clientX - startX)));
            setResizeWidth(next);
          };
          const onUp = () => {
            setIsResizing(false);
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
          };
          setIsResizing(true);
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        };

        const bpSnapBtns = (
          <div style={{ display:'flex', flexDirection:'column', gap:'var(--gap-4)', marginBottom:'var(--gap-8)' }}>
            {GRID_BREAKPOINTS.map(bp => (
              <button key={bp.id}
                className={`grid-bp-btn${activeBp === bp.id ? ' grid-bp-btn--active' : ''}`}
                onClick={() => {
                setActiveBp(bp.id);
                setResizeWidth(GRID_CONFIGS[bp.id].viewport);
                setNoNav(bp.id.includes('No-Nav'));
                setNavExpanded(!bp.id.includes('Collapsed'));
                setOpen(false);
              }}>
                <span style={{ display:'block', fontWeight:'inherit' }}>{bp.label}</span>
                <span style={{ display:'block', fontSize:'var(--font-size-validation)', color:'var(--color-text-subdued)', fontWeight:400 }}>{bp.sub}</span>
              </button>
            ))}
          </div>
        );

        const panelContent = (
          <>
            <h1 style={{ fontFamily:'var(--font-family)', fontSize:'var(--font-size-h4)', margin:'0 0 var(--gap-4)', color:'var(--color-text-primary)' }}>Grids</h1>
            <p style={{ fontFamily:'var(--font-family)', fontSize:'var(--font-size-body-small)', color:'var(--color-text-subdued)', margin:'0 0 var(--gap-16)' }}>
              Columns, gutters &amp; margins per breakpoint
            </p>
            <h2>Breakpoint</h2>
            {bpSnapBtns}
          </>
        );

        return (
          <PanelLayout panelContent={panelContent}>
            <main className="stage">

              {/* ── Interactive resizable playground ── */}
              <section>
                <h2>Columns, Gutters &amp; Margins — Interactive</h2>
                <p className="stage-note">
                  Drag the handle on the right to resize. The grid adapts across breakpoints.
                  Current auto-detected breakpoint: <strong>{autoBp.replace(/-/g,' ')}</strong>.
                </p>

                <div className="grid-width-badge">
                  <span className="grid-width-num">{resizeWidth}px</span>
                  <span className="grid-bp-pill">{autoBp.replace(/-/g,' ')}</span>
                </div>

                {/* Scrollable container — handle lives inside at the frame's right edge */}
                <div style={{ overflowX:'auto' }}>
                  <div style={{ display:'flex', alignItems:'stretch', width:'max-content' }}>
                    <Grid
                      breakpoint={autoBp}
                      viewportWidth={resizeWidth}
                      onNavToggle={isDesktop ? () => { setNoNav(false); setNavExpanded(e => !e); } : undefined}
                    />
                    <div
                      className="grid-resize-handle"
                      onMouseDown={startResize}
                      title="Drag to resize"
                    />
                  </div>
                </div>
              </section>

              {/* ── Static breakpoint sections ── */}
              {GRID_BREAKPOINTS.map(bp => (
                <section key={bp.id} style={{ scrollMarginTop: 'var(--gap-24)' }} id={`grid-${bp.id}`}>
                  <h2>{bp.label} — {bp.sub}</h2>
                  <div style={{ overflowX:'auto', paddingBottom:'var(--gap-4)' }}>
                    <Grid breakpoint={bp.id} />
                  </div>
                </section>
              ))}

            </main>
          </PanelLayout>

                        validationText={ddValText}
                        validationType={ddValType}
                        onFileSelect={(files) => pushFuLog(`UploadDragDrop onFileSelect: ${files[0].name}`)}
                        onDragEnter={() => pushFuLog('UploadDragDrop onDragEnter')}
                        onDragLeave={() => pushFuLog('UploadDragDrop onDragLeave')}
                        onDrop={() => pushFuLog('UploadDragDrop onDrop')}
                        onClick={() => pushFuLog('UploadDragDrop onClick')}
                      />
                    </div>
                    <div className="events">
                      {fuLog.length === 0 ? '— interact with the drop zone to see events —' : fuLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>UploadDragDrop — All States</h2>
                    <div style={{ display:'flex', flexDirection:'column', gap:'var(--gap-24)' }}>
                      <div>
                        <p className="stage-note" style={{ marginBottom:'var(--gap-8)' }}><strong>Default</strong></p>
                        <UploadDragDrop states="Default" label="Upload Statement" requirementsText="PDF only, max 50MB, no password protection" validationText="Validation" />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom:'var(--gap-8)' }}><strong>Hover</strong></p>
                        <UploadDragDrop states="Hover" label="Upload Statement" requirementsText="PDF only, max 50MB, no password protection" validationText="Validation" />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom:'var(--gap-8)' }}><strong>Disabled</strong> (isDisabled=true syncs state)</p>
                        <UploadDragDrop states="Disabled" isDisabled={true} label="Upload Statement" requirementsText="PDF only, max 50MB, no password protection" validationText="Validation" />
                      </div>
                    </div>
                  </section>

                  <section>
                    <h2>UploadCTA — Interactive Playground</h2>
                    <p className="stage-note">Adjust props in the left panel.</p>
                    <div className="preview" style={{ maxWidth:360 }}>
                      <UploadCTA
                        size={ctaSize}
                        state={ctaState}
                        isDisabled={ctaIsDisabled}
                        isFullWidth={ctaIsFullWidth}
                        label={ctaLabel}
                        onFileSelect={(files) => pushFuLog(`UploadCTA onFileSelect: ${files[0].name}`)}
                        onClick={() => pushFuLog('UploadCTA onClick')}
                      />
                    </div>
                    <div className="events">
                      {fuLog.length === 0 ? '— interact with the button to see events —' : fuLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>UploadCTA — All Sizes × States</h2>
                    <div style={{ display:'flex', flexDirection:'column', gap:'var(--gap-24)' }}>
                      {['XS','S','M','L'].map((sz) => (
                        <div key={sz} style={{ display:'flex', flexDirection:'column', gap:'var(--gap-12)' }}>
                          <p className="stage-note"><strong>Size {sz}</strong></p>
                          <div style={{ display:'flex', flexWrap:'wrap', gap:'var(--gap-16)', alignItems:'center' }}>
                            <UploadCTA size={sz} state="Default"  label="Upload statement" isFullWidth={false} />
                            <UploadCTA size={sz} state="Hover"    label="Upload statement" isFullWidth={false} />
                            <UploadCTA size={sz} state="Disabled" label="Upload statement" isFullWidth={false} isDisabled />
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>UploadDocument — Interactive Playground</h2>
                    <p className="stage-note">Adjust props in the left panel. Click view/delete to fire events.</p>
                    <div className="preview" style={{ flexDirection:'column', alignItems:'flex-start' }}>
                      <UploadDocument
                        status={docStatus}
                        loaderType={docLoaderType}
                        documentName={docName}
                        helperText={docHelperText}
                        displayHelperText={docDisplayHelperText}
                        displayPercentage={docDisplayPercentage}
                        loaderSize={docLoaderSize}
                        displayStatus={docDisplayStatus}
                        statusText={docStatusText}
                        badgeState={docBadgeState}
                        badgeEmphasis={docBadgeEmphasis}
                        showBadgeIcon={docShowBadgeIcon}
                        displayView={docDisplayView}
                        isViewDisabled={docIsViewDisabled}
                        displayDelete={docDisplayDelete}
                        isDeleteDisabled={docIsDeleteDisabled}
                        progress={docProgress}
                        onView={(name) => pushFuLog(`UploadDocument onView: ${name}`)}
                        onDelete={(name) => pushFuLog(`UploadDocument onDelete: ${name}`)}
                      />
                    </div>
                    <div className="events">
                      {fuLog.length === 0 ? '— click view or delete to see events —' : fuLog.join('\n')}
                    </div>
                  </section>

                  <AccordionExample
                    ctaSize={ctaSize} ctaState={ctaState} ctaIsDisabled={ctaIsDisabled} ctaLabel={ctaLabel}
                    docStatus={docStatus} docLoaderType={docLoaderType} docName={docName}
                    docHelperText={docHelperText} docDisplayHelperText={docDisplayHelperText} docDisplayPercentage={docDisplayPercentage}
                    docDisplayStatus={docDisplayStatus} docStatusText={docStatusText}
                    docBadgeState={docBadgeState} docBadgeEmphasis={docBadgeEmphasis} docShowBadgeIcon={docShowBadgeIcon}
                    docDisplayView={docDisplayView} docIsViewDisabled={docIsViewDisabled}
                    docDisplayDelete={docDisplayDelete} docIsDeleteDisabled={docIsDeleteDisabled}
                    docProgress={docProgress} docLoaderSize={docLoaderSize}
                    pushFuLog={pushFuLog} fuLog={fuLog}
                  />

                  <ModalExample
                    ddStates={ddStates} ddIsDisabled={ddIsDisabled} ddShowLabel={ddShowLabel} ddLabel={ddLabel}
                    ddDisplayReqs={ddDisplayReqs} ddReqsText={ddReqsText}
                    ddDisplayVal={ddDisplayVal} ddValText={ddValText} ddValType={ddValType}
                    docStatus={docStatus} docLoaderType={docLoaderType} docName={docName}
                    docHelperText={docHelperText} docDisplayHelperText={docDisplayHelperText} docDisplayPercentage={docDisplayPercentage}
                    docDisplayStatus={docDisplayStatus} docStatusText={docStatusText}
                    docBadgeState={docBadgeState} docBadgeEmphasis={docBadgeEmphasis} docShowBadgeIcon={docShowBadgeIcon}
                    docDisplayView={docDisplayView} docIsViewDisabled={docIsViewDisabled}
                    docDisplayDelete={docDisplayDelete} docIsDeleteDisabled={docIsDeleteDisabled}
                    docProgress={docProgress} docLoaderSize={docLoaderSize}
                    pushFuLog={pushFuLog} fuLog={fuLog}
                  />
                </>
              )}



            </main>

            </PanelLayout>)}

            {/* ---- Toast overlay (fixed bottom-right) ---- */}
            <div className="toast-container" aria-live="polite" aria-atomic="false">
              {toasts.map((t) => (
                <Alert key={t.id} state={t.state} emphasis="subtle" isFlag={true} title={ALERT_TITLES[t.state]} onClose={() => dismissToast(t.id)}>
                  {ALERT_MESSAGES[t.state]}
                </Alert>
              ))}
            </div>
          </div>
          </PanelContext.Provider>
        );
      }

      /* ── minimal error boundary so crashes surface instead of going blank ── */
      class ErrorBoundary extends React.Component {
        constructor(props) { super(props); this.state = { error: null }; }
        static getDerivedStateFromError(e) { return { error: e }; }
        render() {
          if (this.state.error) {
            return (
              <div style={{ padding: 32, fontFamily: 'monospace', color: 'crimson' }}>
                <strong>Render error</strong>
                <pre style={{ whiteSpace: 'pre-wrap', marginTop: 8 }}>{String(this.state.error)}</pre>
              </div>
            );
          }
          return this.props.children;
        }
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<ErrorBoundary><Playground /></ErrorBoundary>);
    </script>
  </body>
</html>
