 * ============================================================ */

.dcds-Switch { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-Switch__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-Switch__track { position:relative; width:40px; height:20px; background-color:var(--color-surface-1); border:2px solid var(--color-stroke-action); border-radius:var(--rd-Max); transition:background-color 150ms ease,border-color 150ms ease; flex-shrink:0; }
.dcds-Switch__thumb { position:absolute; top:50%; left:2px; width:12px; height:12px; margin-top:-6px; background-color:var(--color-fill-action); border-radius:var(--rd-Max); transition:transform 150ms ease,background-color 150ms ease; }
.dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Switch__input:checked + .dcds-Switch__track .dcds-Switch__thumb { transform:translateX(20px); background-color:var(--color-surface-1); }
.dcds-Switch__input:focus-visible + .dcds-Switch__track { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Switch__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-Switch--State-Disabled, .dcds-Switch--State-Disabled .dcds-Switch__label { cursor:not-allowed; }
.dcds-Switch--State-Disabled .dcds-Switch__track { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-stroke-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__thumb { background-color:var(--dcds-cool-grey-400); }
.dcds-Switch--State-Disabled .dcds-Switch__label { color:var(--color-text-disabled); }

/* ============================================================
 * RadioButton.css
 * ============================================================ */
.dcds-RadioButton { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-RadioButton__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-RadioButton__indicator { position:relative; width:24px; height:24px; border:2px solid var(--color-stroke-neutral); border-radius:var(--rd-Max); background-color:var(--color-surface-1); transition:border-color 120ms ease,background-color 120ms ease; flex-shrink:0; }
.dcds-RadioButton__indicator::after { content:''; position:absolute; top:50%; left:50%; width:10px; height:10px; margin:-5px 0 0 -5px; border-radius:var(--rd-Max); background-color:transparent; transition:background-color 120ms ease; }
.dcds-RadioButton:hover .dcds-RadioButton__indicator { border-color:var(--color-stroke-action); }
.dcds-RadioButton__input:checked + .dcds-RadioButton__indicator { border-color:var(--color-stroke-action); }
.dcds-RadioButton__input:checked + .dcds-RadioButton__indicator::after { background-color:var(--color-fill-action); }
.dcds-RadioButton__input:focus-visible + .dcds-RadioButton__indicator { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-RadioButton__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-RadioButton--State-Disabled { cursor:not-allowed; }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__indicator { border-color:var(--color-stroke-disabled); background-color:var(--color-surface-disabled); }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__input:checked + .dcds-RadioButton__indicator::after { background-color:var(--color-text-disabled); }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__label { color:var(--color-text-disabled); }

/* ============================================================
 * Checkbox.css
 * ============================================================ */
.dcds-Checkbox { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-Checkbox__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-Checkbox__indicator { position:relative; width:24px; height:24px; border:2px solid var(--color-stroke-neutral); border-radius:var(--rd-XS); background-color:var(--color-surface-1); transition:background-color 120ms ease,border-color 120ms ease; flex-shrink:0; }
.dcds-Checkbox__indicator::after { content:''; position:absolute; top:3px; left:7px; width:5px; height:11px; border:solid var(--color-text-invert); border-width:0 2px 2px 0; transform:rotate(45deg) scale(0); transition:transform 120ms ease; }
.dcds-Checkbox__indicator::before { content:''; position:absolute; top:50%; left:4px; right:4px; height:2px; margin-top:-1px; background-color:var(--color-text-invert); transform:scaleX(0); transition:transform 120ms ease; }
.dcds-Checkbox:hover .dcds-Checkbox__indicator { border-color:var(--color-stroke-focus); }
.dcds-Checkbox__input:checked + .dcds-Checkbox__indicator { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Checkbox__input:checked + .dcds-Checkbox__indicator::after { transform:rotate(45deg) scale(1); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator::after { transform:rotate(45deg) scale(0); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator::before { transform:scaleX(1); }
.dcds-Checkbox__input:focus-visible + .dcds-Checkbox__indicator { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Checkbox__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-Checkbox--State-Disabled { cursor:not-allowed; }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__indicator { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__input:checked + .dcds-Checkbox__indicator { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__input:checked + .dcds-Checkbox__indicator::after { border-color:var(--color-text-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__label { color:var(--color-text-disabled); }

/* ============================================================
 * Breadcrumbs.css
 * ============================================================ */
.dcds-Breadcrumbs { display:inline-flex; align-items:center; }
.dcds-Breadcrumbs__list { display:inline-flex; align-items:center; list-style:none; margin:0; padding:0; gap:var(--gap-4); }
.dcds-Breadcrumbs__list > li { display:inline-flex; align-items:center; }
.dcds-BaseHomeIcon, .dcds-BaseHomeIcon--current { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; text-decoration:none; border-radius:var(--rd-XS); }
.dcds-BaseHomeIcon { color:var(--color-icon-secondary); }
.dcds-BaseHomeIcon--current { color:var(--color-icon-primary); cursor:default; }
.dcds-BaseHomeIcon:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-BaseHomeIcon svg, .dcds-BaseHomeIcon--current svg { width:16px; height:16px; }
.dcds-BaseHomeIcon__linear, .dcds-BaseHomeIcon--current .dcds-BaseHomeIcon__linear { display:flex; align-items:center; justify-content:center; }
.dcds-BaseHomeIcon__bold, .dcds-BaseHomeIcon--current .dcds-BaseHomeIcon__bold { display:none; align-items:center; justify-content:center; }
.dcds-BaseHomeIcon:hover .dcds-BaseHomeIcon__linear, .dcds-BaseHomeIcon--current:hover .dcds-BaseHomeIcon__linear { display:none; }
.dcds-BaseHomeIcon:hover .dcds-BaseHomeIcon__bold, .dcds-BaseHomeIcon--current:hover .dcds-BaseHomeIcon__bold { display:flex; }
.dcds-BaseBreadcrumbItems--previous { display:inline-flex; align-items:center; font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; color:var(--color-text-secondary); text-decoration:none; border-radius:var(--rd-XS); cursor:pointer; background:none; border:none; padding:0; }
.dcds-BaseBreadcrumbItems--previous:hover { color:var(--color-text-secondary); text-decoration:underline; }
.dcds-BaseBreadcrumbItems--previous:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-BaseBreadcrumbItems--current { display:inline-flex; align-items:center; font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; color:var(--color-text-primary); cursor:default; }
.dcds-BaseBreadcrumbItems--current:hover { color:var(--color-text-primary); text-decoration:underline; }
.dcds-Breadcrumbs__separator { display:inline-flex; align-items:center; justify-content:center; width:5px; height:18px; font-size:12px; line-height:18px; color:var(--color-text-neutral); flex-shrink:0; user-select:none; }

/* ============================================================
 * Pagination.css
 * ============================================================ */
.dcds-Pagination { display:inline-flex; align-items:center; gap:var(--gap-4); }
.dcds-Pagination__btn { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; padding:var(--gap-8); border:none; border-radius:var(--rd-S); cursor:pointer; flex-shrink:0; background:none; transition:background-color 120ms ease,color 120ms ease; color:var(--color-icon-primary); }
.dcds-Pagination__btn:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Pagination__nav { background-color:var(--color-surface-3); }
.dcds-Pagination__nav:hover:not(:disabled):not([aria-disabled='true']) { background-color:var(--color-fill-secondary-0); }
.dcds-Pagination__nav:active:not(:disabled):not([aria-disabled='true']) { background-color:var(--color-surface-3); }
.dcds-Pagination__nav:active:not(:disabled):not([aria-disabled='true']) .dcds-Pagination__icon svg path { stroke-width:2; }
.dcds-Pagination__nav:disabled, .dcds-Pagination__nav[aria-disabled='true'] { color:var(--color-text-disabled); cursor:not-allowed; pointer-events:none; }
.dcds-Pagination__page-numbers { display:inline-flex; align-items:center; gap:var(--gap-4); }
.dcds-Pagination__page { background-color:var(--color-surface-1); color:var(--color-text-primary); font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; }
.dcds-Pagination__page:hover:not(:disabled) { background-color:var(--color-fill-secondary-0); }
.dcds-Pagination__page--active { background-color:var(--color-fill-action); color:var(--color-text-invert); font-weight:var(--font-weight-bold); cursor:default; pointer-events:none; }
.dcds-Pagination__page--active:hover { background-color:var(--color-fill-action); }
.dcds-Pagination__truncation { background-color:var(--color-surface-1); color:var(--color-text-primary); cursor:default; pointer-events:none; }
.dcds-Pagination__icon { display:flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; }
.dcds-Pagination__icon svg { width:16px; height:16px; }

/* ============================================================
 * Alert.css
 * ============================================================ */
.dcds-Alert { display:flex; align-items:flex-start; padding:var(--gap-12); border-radius:var(--rd-S); font-family:var(--font-family); overflow:hidden; width:100%; }
.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { border:1px solid transparent; }
.dcds-Alert--emphasis-subtle.dcds-Alert--flag { border:none; border-left:4px solid transparent; box-shadow:var(--shadow-S); }
.dcds-Alert--emphasis-subtler { background-color:var(--color-surface-1); border:2px solid transparent; }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-success); border-color:var(--color-stroke-success); }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-success); border-left-color:var(--color-stroke-success); }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-success); }
.dcds-Alert--state-success .dcds-Alert__icon { color:var(--color-stroke-success); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-error); border-color:var(--color-stroke-error); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-error); border-left-color:var(--color-stroke-error); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-error); }
.dcds-Alert--state-error .dcds-Alert__icon { color:var(--color-stroke-error); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-warning); border-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-warning); border-left-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning .dcds-Alert__icon { color:var(--color-stroke-warning); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-info); border-color:var(--color-stroke-info); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-info); border-left-color:var(--color-stroke-info); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-info); }
.dcds-Alert--state-info .dcds-Alert__icon { color:var(--color-stroke-info); }
.dcds-Alert__inner { display:flex; flex:1; gap:var(--gap-8); align-items:flex-start; min-width:0; }
.dcds-Alert--flag .dcds-Alert__inner { align-items:center; }
.dcds-Alert__content { display:flex; flex:1; flex-direction:column; gap:var(--gap-8); min-width:0; }
.dcds-Alert--flag .dcds-Alert__content { flex-direction:row; align-items:center; }
.dcds-Alert__header { display:flex; flex:1; gap:var(--gap-8); align-items:flex-start; min-width:0; }
.dcds-Alert__icon { flex-shrink:0; width:16px; height:16px; display:flex; align-items:center; justify-content:center; }
.dcds-Alert__header--has-title .dcds-Alert__icon { height:20px; }
.dcds-Alert__text { display:flex; flex-direction:column; gap:4px; flex:1; min-width:0; }
.dcds-Alert__title { font-size:var(--font-size-label); font-weight:var(--font-weight-bold); color:var(--color-text-primary); line-height:normal; margin:0; }
.dcds-Alert__message { font-size:var(--font-size-body-small); font-weight:400; color:var(--color-text-subdued); line-height:normal; margin:0; }
.dcds-Alert__actions { display:flex; gap:var(--gap-8); align-items:center; flex-shrink:0; }
.dcds-Alert__close { display:flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; align-self:flex-start; background:none; border:none; cursor:pointer; color:var(--color-text-subdued); padding:0; border-radius:var(--rd-XS); transition:color 120ms ease; }
.dcds-Alert__close:hover { color:var(--color-text-primary); }
.dcds-Alert__close:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }

/* ============================================================
 * Tooltip.css — Figma node 478:30949
 * bg: color/surface/4 (#F0F0F0) · text: color/text/primary (#0A2E57)
 * max-width: 224px · padding: gap-16 · radius: rd-S
 * ============================================================ */
.dcds-Tooltip__wrapper { position:relative; display:inline-flex; align-items:center; justify-content:center; }
.dcds-Tooltip__overlay { position:absolute; z-index:1000; display:flex; align-items:center; pointer-events:none; opacity:0; visibility:hidden; transition:opacity 120ms ease,visibility 120ms ease; }
.dcds-Tooltip__overlay--visible { opacity:1; visibility:visible; }
.dcds-Tooltip__overlay--Top { flex-direction:column; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%); }
.dcds-Tooltip__overlay--Bottom { flex-direction:column; top:calc(100% + 4px); left:50%; transform:translateX(-50%); }
.dcds-Tooltip__overlay--Left { flex-direction:row; right:calc(100% + 4px); top:50%; transform:translateY(-50%); }
.dcds-Tooltip__overlay--Right { flex-direction:row; left:calc(100% + 4px); top:50%; transform:translateY(-50%); }
.dcds-Tooltip__bubble { display:flex; flex-direction:column; gap:var(--gap-0); width:224px; padding:var(--gap-16); background-color:var(--color-surface-4); color:var(--color-text-primary); border-radius:var(--rd-S); word-break:break-word; line-height:normal; }
.dcds-Tooltip__heading { font-family:var(--font-family); font-size:var(--font-size-caption); font-weight:var(--font-weight-bold); line-height:normal; min-width:100%; margin:0; }
.dcds-Tooltip__body { font-family:var(--font-family); font-size:var(--font-size-body); font-weight:var(--font-weight-regular); line-height:normal; margin:0; }
.dcds-Tooltip__arrow { display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--color-surface-4); }
.dcds-Tooltip__info-trigger { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; background:none; border:none; padding:0; cursor:pointer; color:var(--color-icon-secondary); border-radius:var(--rd-XS); }
.dcds-Tooltip__info-trigger:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }

/* ============================================================
 * Stepper.css — Figma node 776:61667
 * Step states: active | completed | upcoming | pending | disabled
 * Modes: normal (circles) | compact (bars)
 * Orientations: Horizontal | Vertical
 * ============================================================ */
.dcds-Stepper { list-style:none; margin:0; padding:0; display:flex; }
.dcds-Stepper--Horizontal { flex-direction:row; align-items:flex-start; width:100%; }
.dcds-Stepper--Vertical { flex-direction:column; align-items:flex-start; }
.dcds-Step { display:flex; position:relative; }

/* Normal containers: gap-4 between step NODES (Figma "gap-[var(--gap-4)]" on Stepper flex container) */
.dcds-Stepper--Horizontal.dcds-Stepper--normal { gap:var(--gap-4); }
.dcds-Stepper--Vertical.dcds-Stepper--normal   { gap:var(--gap-4); }

/* Normal + Horizontal: gap-8 between track row and label (Figma "flex-col gap-[var(--gap-8)]" on BaseStepper) */
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step { flex:1; flex-direction:column; align-items:flex-start; gap:var(--gap-8); min-width:0; }
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step--last { flex:0 0 auto; }
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step__track { display:flex; flex-direction:row; align-items:center; width:100%; height:24px; gap:var(--gap-4); }

/* Normal + Vertical: gap-8 between track column and content, gap-4 between circle and connector */
.dcds-Stepper--Vertical.dcds-Stepper--normal .dcds-Step { flex-direction:row; align-items:flex-start; gap:var(--gap-8); }
.dcds-Stepper--Vertical.dcds-Stepper--normal .dcds-Step__track { display:flex; flex-direction:column; align-items:center; align-self:stretch; flex-shrink:0; gap:var(--gap-4); }

/* Step circle (Normal mode) */
.dcds-Step__circle { width:24px; height:24px; border-radius:var(--rd-Max); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
/* Fix #3 — Active: SVG provides the visual (white ring + NB-400 stroke + NB-500 disc) */
.dcds-Step__circle--active { background:transparent; }
/* Inactive: white bg + Noble Blue-200 border */
.dcds-Step__circle--upcoming { background-color:var(--color-surface-1); border:1.5px solid var(--color-stroke-focus-subtle); }
/* Fix #5 — Complete: Spring Green-100 bg (matches Figma fallback #b9ebc9 ≈ dcds-spring-green-100 #b9dec8) */
.dcds-Step__circle--completed { background-color:var(--dcds-spring-green-100); padding:3px; }
.dcds-Step__circle--pending { background-color:var(--color-fill-light-warning); padding:3px; }
.dcds-Step__circle--disabled { background:transparent; border:1.5px solid var(--color-stroke-subdued); }
.dcds-Step__circle-icon { display:flex; align-items:center; justify-content:center; width:18px; height:18px; flex-shrink:0; }
/* Fix: complete icon uses #0e8436 (verified from Figma tick-circle SVG asset) */
.dcds-Step__circle-icon--completed { color:var(--color-fill-invert-success); }
.dcds-Step__circle-icon--pending { color:var(--color-fill-invert-warning); }

/* Connector line (Normal mode) — 1.5 px matches Figma line asset stroke */
.dcds-Stepper--Horizontal .dcds-Step__connector { flex:1; height:1.5px; min-width:var(--gap-16); }
.dcds-Stepper--Vertical .dcds-Step__connector { flex:1; width:1.5px; min-height:var(--gap-32); }
/* Connector colours — verified from Figma SVG line assets (node 759:13098 etc.) */
.dcds-Step--active    .dcds-Step__connector { background-color:var(--color-stroke-focus); }   /* NB-400 #1355a1 */
.dcds-Step--completed .dcds-Step__connector { background-color:var(--color-stroke-action); }  /* Wealthy Green-500 #26B67F */
.dcds-Step--upcoming  .dcds-Step__connector { background-color:var(--color-stroke-focus-subtle); } /* NB-200 #6ba8ee */
.dcds-Step--pending   .dcds-Step__connector { background-color:var(--color-stroke-warning); }
.dcds-Step--disabled  .dcds-Step__connector { background-color:var(--color-stroke-disabled); }

/* Compact + Horizontal: gap-8 between bar and label (matches Figma "flex-col gap-[var(--gap-8)]") */
.dcds-Stepper--Horizontal.dcds-Stepper--compact { gap:var(--gap-8); align-items:flex-start; }
.dcds-Stepper--Horizontal.dcds-Stepper--compact .dcds-Step { flex:1; flex-direction:column; align-items:flex-start; gap:var(--gap-8); min-width:0; }
/* Fix #7 — horizontal compact bar: full width, 4 px tall, NO border-radius on any state */
.dcds-Stepper--Horizontal.dcds-Stepper--compact .dcds-Step__bar { width:100%; height:4px; border-radius:0; }

/* Compact + Vertical — Fix #7: bar is direct child of <li>, align-self:stretch grows with content */
.dcds-Stepper--Vertical.dcds-Stepper--compact { gap:var(--gap-12); }
.dcds-Stepper--Vertical.dcds-Stepper--compact .dcds-Step { flex-direction:row; align-items:flex-start; gap:var(--gap-8); }
.dcds-Stepper--Vertical.dcds-Stepper--compact .dcds-Step__bar { width:4px; align-self:stretch; flex-shrink:0; border-radius:0; }

/* Compact bar colours */
.dcds-Step__bar--active    { background-color:var(--color-fill-primary-9); }
.dcds-Step__bar--completed { background-color:var(--color-fill-invert-success); }
.dcds-Step__bar--upcoming  { background-color:var(--color-fill-primary-2); }
.dcds-Step__bar--pending   { background-color:var(--color-fill-invert-warning); }
.dcds-Step__bar--disabled  { background-color:var(--color-surface-disabled); }

/* Content — label + description. Spacing from track handled by gap-8 on the step container. */
.dcds-Step__content { display:flex; flex-direction:column; gap:var(--gap-0); }
/* Vertical normal: 2px optical alignment with circle top edge */
.dcds-Stepper--Vertical.dcds-Stepper--normal .dcds-Step__content { padding-top:2px; }
/* Label — 16px Regular by default */

    <div id="root"></div>

    <!--

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useId } = React;

      /* ============================================================
       * Alert

      /* Paths mirrored exactly from assets/icons/bold/ and assets/icons/linear/ */
      /* All states use InfoCircleBold — color applied via CSS on .dcds-Alert__icon */
      const ALERT_ICON_SVG = (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22ZM12.75 16C12.75 16.41 12.41 16.75 12 16.75C11.59 16.75 11.25 16.41 11.25 16L11.25 11C11.25 10.59 11.59 10.25 12 10.25C12.41 10.25 12.75 10.59 12.75 11L12.75 16ZM11.08 7.62C11.13 7.49 11.2 7.39 11.29 7.29C11.39 7.2 11.5 7.13 11.62 7.08C11.74 7.03 11.87 7 12 7C12.13 7 12.26 7.03 12.38 7.08C12.5 7.13 12.61 7.2 12.71 7.29C12.8 7.39 12.87 7.49 12.92 7.62C12.97 7.74 13 7.87 13 8C13 8.13 12.97 8.26 12.92 8.38C12.87 8.5 12.8 8.61 12.71 8.71C12.61 8.8 12.5 8.87 12.38 8.92C12.14 9.02 11.86 9.02 11.62 8.92C11.5 8.87 11.39 8.8 11.29 8.71C11.2 8.61 11.13 8.5 11.08 8.38C11.03 8.26 11 8.13 11 8C11 7.87 11.03 7.74 11.08 7.62Z" fill="currentColor" />
        </svg>
      );
      const ALERT_ICONS = {
        success: ALERT_ICON_SVG,
        error:   ALERT_ICON_SVG,
        warning: ALERT_ICON_SVG,
        info:    ALERT_ICON_SVG,
      };

      const AlertCloseIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M5.00098 5L19 18.9991" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
          <path d="M4.99996 18.9991L18.999 5" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />

      /* Mirrors icons/svg/linear/send.svg — transform matches Figma: scaleY(-1) rotate(180deg) = scaleX(-1) */

        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">

      function Alert({
        state = 'info',
        emphasis = 'subtle',
        isFlag = false,
        title,
        children,
        onClose,
        actions,
        className,
        onClick,       // Task 3
        onFocus,       // Task 3
        onBlur,        // Task 3
        onMouseEnter,  // Task 3
        onMouseLeave,  // Task 3
        onKeyDown,     // Task 3
      }) {
        const timerRef = useRef(null);

        useEffect(() => {
          if (!isFlag || !onClose) return;
          timerRef.current = setTimeout(onClose, 5000);
          return () => { if (timerRef.current) clearTimeout(timerRef.current); };
        }, [isFlag, onClose]);

        const role = (state === 'error' || state === 'warning') ? 'alert' : 'status';
        const ariaLive = state === 'error' ? 'assertive' : 'polite';
        const showClose = emphasis === 'subtle' && !!onClose;

        const classes = [
          'dcds-Alert',
          `dcds-Alert--state-${state}`,
          `dcds-Alert--emphasis-${emphasis}`,
          isFlag ? 'dcds-Alert--flag' : '',
          className || '',
        ].filter(Boolean).join(' ');

        const headerClasses = [
          'dcds-Alert__header',
          title ? 'dcds-Alert__header--has-title' : '',
        ].filter(Boolean).join(' ');

        return (
          <div className={classes} role={role} aria-live={ariaLive}
            onClick={onClick} onFocus={onFocus} onBlur={onBlur}
            onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown}
          >
            <div className="dcds-Alert__inner">
              <div className="dcds-Alert__content">
                <div className={headerClasses}>
                  <span className="dcds-Alert__icon">{ALERT_ICONS[state]}</span>
                  <div className="dcds-Alert__text">
                    {title && <p className="dcds-Alert__title">{title}</p>}
                    {children && <p className="dcds-Alert__message">{children}</p>}
                  </div>
                </div>
                {actions && emphasis === 'subtle' && (
                  <div className="dcds-Alert__actions">{actions}</div>
                )}
              </div>
              {showClose && (
                <button type="button" className="dcds-Alert__close" aria-label="Dismiss" onClick={onClose}>
                  <AlertCloseIcon />
                </button>
              )}
            </div>
          </div>
        );
      }

      /* ============================================================
       * Button
       * ============================================================ */
      function Button({
        variant = 'Primary',
        color = 'Primary',
        size = 'M',
        isDisabled = false,
        isFullWidth = false,
        isIconOnly = false,
        ariaLabel,
        ariaBusy,
        type = 'button',
        className,
        children,
        onClick,
        onFocus,
        onBlur,
        onMouseEnter,
        onMouseLeave,
        onKeyDown,
        fixedWidth,
      }) {
        const classes = [
          'dcds-Button',
          `dcds-Button--variant-${variant}`,
          `dcds-Button--color-${color}`,
          `dcds-Button--size-${size}`,
          isIconOnly ? 'dcds-Button--icon-only' : '',
          isFullWidth ? 'dcds-Button--full-width' : '',
          className || '',
        ].filter(Boolean).join(' ');
        const overrideStyle = fixedWidth != null
          ? { width: typeof fixedWidth === 'number' ? `${fixedWidth}px` : fixedWidth }
          : undefined;
        return (
          <button
            type={type}
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-busy={ariaBusy || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            style={overrideStyle}
            onClick={onClick}
            onFocus={onFocus}
            onBlur={onBlur}
            onMouseEnter={onMouseEnter}
            onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * LinkButton
       * ============================================================ */
      function LinkButton({
        state = 'Default',
        size = 'M',
        isIconOnly = false,
        ariaLabel,
        href,
        target,
        rel,
        className,
        children,
        showIcon = true,
        fixedWidth,
        onClick,
      }) {
        const isDisabled = state === 'Disabled';
        const overrideStyle = fixedWidth != null
          ? { width: typeof fixedWidth === 'number' ? `${fixedWidth}px` : fixedWidth }
          : undefined;
        const iconSize = size === 'L' ? 16 : size === 'M' ? 14 : 12;
        const icon = <span className="dcds-LinkButton__icon" aria-hidden="true" style={{ transform: 'scaleY(-1) rotate(180deg)' }}><SendLinearIcon size={iconSize} /></span>;
        const trailingIcon = (isIconOnly || showIcon) ? icon : null;
        const classes = [
          'dcds-LinkButton',
          `dcds-LinkButton--state-${state}`,
          `dcds-LinkButton--size-${size}`,
          className || '',
        ].filter(Boolean).join(' ');
        if (href) {
          return (
            <a
              className={classes}
              href={isDisabled ? undefined : href}
              target={target}
              rel={rel}
              aria-disabled={isDisabled || undefined}
              aria-label={isIconOnly ? ariaLabel : undefined}
              style={overrideStyle}
              onClick={onClick}
            >
              {children}{trailingIcon}
            </a>
          );
        }
        return (
          <button
            type="button"
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            style={overrideStyle}
            onClick={onClick}
          >
            {children}{trailingIcon}
          </button>
        );
      }

      /* ============================================================
       * ArrowDownLinearIcon (replaces ChevronDownIcon — Task 2)
       * ============================================================ */
      const ArrowDownLinearIcon = ({ size = 16 }) => (
        <svg width={size} height={size} viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M19.9201 8.95007L13.4001 15.4701C12.6301 16.2401 11.3701 16.2401 10.6001 15.4701L4.08008 8.95007" stroke="currentColor" strokeWidth="1.5" strokeMiterlimit="10" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );

      /* ============================================================
       * _BaseMenuItem leading SVGs — sourced from icons/svg and Figma
       * node 788:68291. currentColor = color-icon-action (default)
       * or color-icon-success (hover) or color-icon-disabled (disabled).
       * ============================================================ */
      const MenuCheckboxEmpty = () => (
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <rect x="1" y="1" width="22" height="22" rx="4" fill="white" stroke="currentColor" strokeWidth="2" />
        </svg>
      );
      const MenuCheckboxChecked = () => (

      /*
       * _BaseTabs — internal single-tab button.
       *
       * Props:
       *   leading  : { icon: ReactNode } — Leading slot (16×16). Icon sourced from
       *              icons/svg/linear/tick-circle.svg (Borderless) or
       *              icons/svg/bold/tick-circle.svg (Filled) via icons/src/ React wrappers.
       *   trailing : { type: 'counter'|'tag', value: string|number } — Trailing badge slot.
       *              'counter' = numeric (e.g. 33), 'tag' = keyword (e.g. 'new').
       *
       * showLeading / showTrailing (Figma prop names) map to: leading !== undefined / trailing !== undefined.
       */
      const _BaseTabs = React.memo(function _BaseTabs({ label, isSelected = false, isDisabled = false, tabStyle = 'Borderless', size = 'M', leading, trailing, onClick, onKeyDown, id, 'aria-controls': ariaControls, tabIndex = -1, dataTestId }) {
        const isFilled = tabStyle === 'Filled';
        const cls = [
          'dcds-BaseTabs',
          isFilled ? 'dcds-BaseTabs--filled' : 'dcds-BaseTabs--borderless',
          `dcds-BaseTabs--size-${size}`,
          isSelected  ? 'dcds-BaseTabs--selected'  : '',
          isDisabled  ? 'dcds-BaseTabs--disabled'  : '',
        ].filter(Boolean).join(' ');
        return (
          <button role="tab" type="button" id={id} aria-selected={isSelected} aria-controls={ariaControls} aria-disabled={isDisabled} disabled={isDisabled} tabIndex={tabIndex} className={cls} onClick={onClick} onKeyDown={onKeyDown} data-testid={dataTestId}>
            <span className="dcds-BaseTabs__content">
              {/* Leading slot — icon from icons/svg/{linear,bold}/tick-circle.svg */}
              {leading !== undefined && <span className="dcds-BaseTabs__icon" aria-hidden="true">{leading.icon}</span>}
              <span className="dcds-BaseTabs__label">{label}</span>
              {/* Trailing slot — counter (numeric) or tag (text keyword) */}
              {trailing !== undefined && <span className={`dcds-BaseTabs__badge dcds-BaseTabs__badge--${trailing.type}`}>{trailing.value}</span>}
            </span>
          </button>
        );
      });

      /* ============================================================
       * Tabs — public tablist component
       * ============================================================ */
      function Tabs({ tabs, activeIndex, defaultActiveIndex = 0, isFullwidth = false, tabStyle = 'Borderless', size = 'M', onChange, className, id, dataTestId }) {
        const instanceId = React.useId();
        const isControlled = activeIndex !== undefined;
        const [internalActive, setInternalActive] = useState(defaultActiveIndex);
        const currentActive = isControlled ? activeIndex : internalActive;
        const enabledIndices = tabs.map((tab, i) => (tab.disabled ? -1 : i)).filter((i) => i !== -1);

        const handleTabClick = React.useCallback((index, event) => {
          if (!isControlled) setInternalActive(index);
          onChange && onChange(index, event);
        }, [isControlled, onChange]);

        const handleKeyDown = React.useCallback((event) => {
          const { key } = event;
          if (!['ArrowRight', 'ArrowLeft', 'ArrowDown', 'ArrowUp', 'Home', 'End'].includes(key)) return;
          event.preventDefault();
          const currentPos = enabledIndices.indexOf(currentActive);
          let nextPos = currentPos;
          if (key === 'ArrowRight' || key === 'ArrowDown') nextPos = (currentPos + 1) % enabledIndices.length;
          else if (key === 'ArrowLeft' || key === 'ArrowUp') nextPos = (currentPos - 1 + enabledIndices.length) % enabledIndices.length;
          else if (key === 'Home') nextPos = 0;
          else if (key === 'End') nextPos = enabledIndices.length - 1;
          const nextIndex = enabledIndices[nextPos];
          if (!isControlled) setInternalActive(nextIndex);
          onChange && onChange(nextIndex, event);
          document.getElementById(`dcds-tab-${instanceId}-${nextIndex}`) && document.getElementById(`dcds-tab-${instanceId}-${nextIndex}`).focus();
        }, [enabledIndices, currentActive, isControlled, onChange, instanceId]);

        const containerClass = ['dcds-Tabs', `dcds-Tabs--${tabStyle.toLowerCase()}`, isFullwidth ? 'dcds-Tabs--fullwidth' : '', className].filter(Boolean).join(' ');

        return (
          <div role="tablist" id={id} className={containerClass} onKeyDown={handleKeyDown} data-testid={dataTestId}>
            {tabs.map((tab, index) => (
              <_BaseTabs
                key={`${tab.label}-${index}`}
                label={tab.label}
                isSelected={currentActive === index}
                isDisabled={tab.disabled}
                tabStyle={tabStyle}
                size={size}
                leading={tab.leading}
                trailing={tab.trailing}
                onClick={(e) => handleTabClick(index, e)}
                id={`dcds-tab-${instanceId}-${index}`}
                aria-controls={`dcds-tabpanel-${instanceId}-${index}`}
                tabIndex={currentActive === index ? 0 : -1}
                dataTestId={tab.dataTestId}
              />
            ))}
          </div>
        );
      }

      /* ============================================================

          <path d="M12.0002 14.5C6.99016 14.5 2.91016 17.86 2.91016 22C2.91016 22.28 3.13016 22.5 3.41016 22.5H20.5902C20.8702 22.5 21.0902 22.28 21.0902 22C21.0902 17.86 17.0102 14.5 12.0002 14.5Z" fill="currentColor" />

      const AVATAR_ICON_SIZES = { Small: 16, Medium: 16, Large: 24, 'Extra Large': 32 };

      function Avatar({
        shape = 'Initial Circle',
        size = 'Medium',

        country,
        flagSrc,
        ariaLabel,
        role,
        className,
        id,
        dataTestId,
        onClick,
        onFocus,
        onBlur,
        onMouseEnter,
        onMouseLeave,
        onKeyDown,
        onKeyUp,
      }) {
        const shapeKey = shape.replace(/ /g, '-');
        const sizeKey  = size.replace(/ /g, '-');
        const classes  = ['dcds-Avatar', `dcds-Avatar--shape-${shapeKey}`, `dcds-Avatar--size-${sizeKey}`, className].filter(Boolean).join(' ');
        const isInitial = shape === 'Initial Circle' || shape === 'Initial Square';
        const isIcon    = shape === 'Icon Circle'    || shape === 'Icon Square';
        const isFlag    = shape === 'Flag Circle';
        const iconSize  = AVATAR_ICON_SIZES[size] || 16;
        const resolvedFlagSrc = flagSrc || (country ? `../dcds-flags/flags/${country.toUpperCase()}.svg` : undefined);
        const isInteractive   = !!(onClick || role === 'button');
        const resolvedRole    = role || (isInteractive ? 'button' : undefined);
        return (
          <div
            id={id} className={classes} role={resolvedRole} aria-label={ariaLabel}
            data-testid={dataTestId} tabIndex={isInteractive ? 0 : undefined}
            onClick={onClick} onFocus={onFocus} onBlur={onBlur}
            onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown} onKeyUp={onKeyUp}
          >
            {isInitial && <span className="dcds-Avatar__initials" aria-hidden="true">{initials}</span>}
            {isIcon && (
              <span className="dcds-Avatar__icon" aria-hidden="true">
                {icon || <AvatarUserIcon size={iconSize} />}
              </span>
            )}
            {isFlag && resolvedFlagSrc && (
              <img className="dcds-Avatar__flag" src={resolvedFlagSrc} alt={ariaLabel || country || ''} />
            )}
            {isFlag && !resolvedFlagSrc && icon && (
              <span className="dcds-Avatar__icon" aria-hidden="true">{icon}</span>

       * Modal, ModalHeader, ModalBody, ModalFooter

      const ModalContext = React.createContext(null);

      function Modal({ isOpen, size = 'M', onClose, closeOnBackdrop = true, closeOnEscape = true, children, id, dataTestId, className }) {
        const instanceId = useId();
        const headerId = `dcds-modal-header-${instanceId}`;
        const bodyId   = `dcds-modal-body-${instanceId}`;
        const dialogRef = useRef(null);

        /* Prevent body scroll while open */
        useEffect(() => {
          if (!isOpen) return;
          const prev = document.body.style.overflow;
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = prev; };
        }, [isOpen]);

        /* Focus trap + Escape key */
        useEffect(() => {
          if (!isOpen) return;
          const dialogEl = dialogRef.current;
          if (!dialogEl) return;

          const getFocusable = () => Array.from(
            dialogEl.querySelectorAll(
              'button:not(:disabled),[href],input:not(:disabled),select:not(:disabled),' +
              'textarea:not(:disabled),[tabindex]:not([tabindex="-1"])'
            )
          );

          const prevFocused = document.activeElement;
          const focusable = getFocusable();
          if (focusable.length > 0) focusable[0].focus();
          else dialogEl.focus();

          const handleKeyDown = (e) => {
            if (e.key === 'Escape' && closeOnEscape) { onClose?.(); return; }
            if (e.key === 'Tab') {
              const els = getFocusable();
              if (els.length === 0) { e.preventDefault(); return; }
              const first = els[0];
              const last = els[els.length - 1];
              if (e.shiftKey) {
                if (document.activeElement === first) { e.preventDefault(); last.focus(); }
              } else {
                if (document.activeElement === last) { e.preventDefault(); first.focus(); }
              }
            }
          };

          document.addEventListener('keydown', handleKeyDown);
          return () => {
            document.removeEventListener('keydown', handleKeyDown);
            prevFocused?.focus();
          };
        }, [isOpen, closeOnEscape, onClose]);

        if (!isOpen) return null;

        const dialogClass = [
          'dcds-Modal__dialog',
          `dcds-Modal__dialog--size-${size}`,
          className,
        ].filter(Boolean).join(' ');

        const handleOverlayClick = (e) => {
          if (closeOnBackdrop && e.target === e.currentTarget) onClose?.();
        };

        return ReactDOM.createPortal(
          <ModalContext.Provider value={{ headerId, bodyId, onClose }}>
            <div className="dcds-Modal__overlay" onClick={handleOverlayClick}>
              <div
                ref={dialogRef}
                role="dialog"
                aria-modal="true"
                aria-labelledby={headerId}
                aria-describedby={bodyId}
                id={id}
                data-testid={dataTestId}
                className={dialogClass}
                tabIndex={-1}
                onClick={(e) => e.stopPropagation()}
              >
                {children}
              </div>
            </div>
          </ModalContext.Provider>,
          document.body
        );
      }

      function ModalHeader({ children, icon, subtitle, badge, onClose: onCloseProp, id: idProp, className }) {
        const { headerId, onClose: ctxClose } = React.useContext(ModalContext);

                  <CloseIcon size={20} />
                </button>
              )}
            </div>
          </div>
        );
      }

        const { bodyId } = React.useContext(ModalContext);
        return (

      /* ============================================================
       * DeterminateLoader — mirrors DeterminateLoader.tsx 1:1
       * ============================================================ */
      function DeterminateLoader({
        progress, displayHelperText = true, displayPercentage = true,
        helperText = 'Helper text...', 'aria-label': ariaLabel,
        'aria-labelledby': ariaLabelledBy, onProgressComplete, onProgressChange,
        onMouseEnter, onMouseLeave, onFocus, onBlur, className, id, dataTestId,
      }) {
        const clamped = Math.min(100, Math.max(0, Math.round(progress)));
        const prevRef = useRef(clamped);
        useEffect(() => {
          if (clamped === 100 && prevRef.current < 100 && onProgressComplete) onProgressComplete();
          prevRef.current = clamped;
        }, [clamped, onProgressComplete]);
        useEffect(() => { if (onProgressChange) onProgressChange(clamped); }, [clamped, onProgressChange]);
        const resolvedAriaLabel = ariaLabel ?? `${clamped}% complete`;
        return (
          <div id={id} className={['dcds-DeterminateLoader', className].filter(Boolean).join(' ')}
            data-testid={dataTestId} onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
            onFocus={onFocus} onBlur={onBlur}
          >
            <div role="progressbar" aria-valuenow={clamped} aria-valuemin={0} aria-valuemax={100}
              aria-valuetext={resolvedAriaLabel}
              aria-label={ariaLabel ?? (ariaLabelledBy ? undefined : resolvedAriaLabel)}
              aria-labelledby={ariaLabelledBy} className="dcds-DeterminateLoader__track"
            >
              <div className="dcds-DeterminateLoader__fill" style={{ width: `${clamped}%` }} />
            </div>
            {(displayHelperText || displayPercentage) && (
              <div className="dcds-DeterminateLoader__labels">
                {displayHelperText && <span className="dcds-DeterminateLoader__helper-text">{helperText}</span>}
                {displayPercentage && <span className="dcds-DeterminateLoader__percentage" aria-hidden="true">{clamped}%</span>}
              </div>
            )}
          </div>
        );
      }

      /* ============================================================
       * IndeterminateLoader — mirrors IndeterminateLoader.tsx 1:1
       * ============================================================ */
      function IndeterminateLoader({
        size = 'Small', helperText: showHelperText = true, label = 'Helper text...',
        'aria-label': ariaLabel, 'aria-labelledby': ariaLabelledBy,
        onMouseEnter, onMouseLeave, onFocus, onBlur, className, id, dataTestId,
      }) {
        const resolvedAriaLabel = ariaLabel ?? (showHelperText ? label : 'Loading');
        return (
          <div id={id} className={['dcds-IndeterminateLoader', `dcds-IndeterminateLoader--size-${size}`, className].filter(Boolean).join(' ')}
            data-testid={dataTestId} onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
            onFocus={onFocus} onBlur={onBlur}
          >
            <div role="progressbar" aria-busy="true"
              aria-label={ariaLabel ?? (ariaLabelledBy ? undefined : resolvedAriaLabel)}
              aria-labelledby={ariaLabelledBy} className="dcds-IndeterminateLoader__track"
            >
              <div className="dcds-IndeterminateLoader__segment" aria-hidden="true" />
            </div>
            {showHelperText && <span className="dcds-IndeterminateLoader__label">{label}</span>}
          </div>
        );
      }

              {activeComponent === 'stepper' && (() => {

                return (
                  <>
                    <section>
                      <h2>Stepper — Interactive Playground</h2>
                      <p className="stage-note">
                        Set each step's <code>state</code> individually via the left panel (mirrors Figma <code>_BaseStepper.state</code>).
                        Toggle <code>showDescription</code> to hide descriptions without clearing them.

                      </p>
                      <div className="preview" style={{ flexDirection:'column', alignItems:'stretch', padding:'var(--gap-24)' }}>
                        <Stepper
                          isCompact={stIsCompact}
                          Orientation={stOrientation}
                          onStepClick={(i, s) => pushStLog(`onStepClick: index=${i} state=${s}`)}
                          onMouseEnter={() => pushStLog('onMouseEnter (container)')}
                          onMouseLeave={() => pushStLog('onMouseLeave (container)')}
                        >
                          {STEP_LABELS.map((lbl, i) => (
                            <Step
                              key={i}
                              state={stStepStates[i]}
                              label={lbl}
                              description={STEP_DESCS[i]}
                              showDescription={stShowDescription}
                              onMouseEnter={() => pushStLog(`step onMouseEnter: ${lbl}`)}
                              onMouseLeave={() => pushStLog(`step onMouseLeave: ${lbl}`)}
                            />
                          ))}
                        </Stepper>

                          <div key={orient}>
                            <p className="stage-note" style={{ marginBottom:'var(--gap-8)' }}>
                              <code>Orientation="{orient}" isCompact=false</code>
                            </p>
                            <div style={{ background:'var(--color-surface-1)', padding:'var(--gap-16)', borderRadius:'var(--rd-S)' }}>
                              <Stepper isCompact={false} Orientation={orient}>
                                <Step state="completed" label="Completed" description="Step done" />
                                <Step state="active"    label="Active"    description="In progress" />
                                <Step state="upcoming"  label="Upcoming"  description="Not started" />
                                <Step state="pending"   label="Pending"   description="Needs review" />
                                <Step state="disabled"  label="Disabled"  description="Unavailable" />
                              </Stepper>
                            </div>
                          </div>
                        ))}
                      </div>
                    </section>

                    <section>
                      <h2>Stepper — Compact Mode</h2>
                      <p className="stage-note"><code>isCompact=true</code> — bar indicators replace circles. Labels and descriptions still show.</p>

                              <code>Orientation="{orient}" isCompact=true</code>
                            </p>
                            <div style={{ background:'var(--color-surface-1)', padding:'var(--gap-16)', borderRadius:'var(--rd-S)' }}>
                              <Stepper isCompact={true} Orientation={orient}>
                                <Step state="completed" label="Completed" description="Step done" />
                                <Step state="active"    label="Active"    description="In progress" />

                      <Pagination
                        pageStatus={pgStatus}
                        showPageNumber={pgShowNumbers}
                        currentPage={pgCurrentPage}
                        totalPages={pgTotalPages}
                        onPageChange={(p) => { setPgCurrentPage(p); pushPgLog(`onPageChange: ${p}`); if (p === 1) setPgStatus('First page'); else if (p === pgTotalPages) setPgStatus('Last pages'); else setPgStatus('Middle pages'); }}
                        onPageMouseEnter={(p) => pushPgLog(`onPageMouseEnter: ${p}`)}
                        onPageMouseLeave={(p) => pushPgLog(`onPageMouseLeave: ${p}`)}
                        onPrev={() => { const p = Math.max(1, pgCurrentPage - 1); setPgCurrentPage(p); if (p === 1) setPgStatus('First page'); else setPgStatus('Middle pages'); pushPgLog('onPrev'); }}
                        onPrevMouseEnter={() => pushPgLog('onPrevMouseEnter')}
                        onPrevMouseLeave={() => pushPgLog('onPrevMouseLeave')}
                        onNext={() => { const p = Math.min(pgTotalPages, pgCurrentPage + 1); setPgCurrentPage(p); if (p === pgTotalPages) setPgStatus('Last pages'); else setPgStatus('Middle pages'); pushPgLog('onNext'); }}
                        onNextMouseEnter={() => pushPgLog('onNextMouseEnter')}
                        onNextMouseLeave={() => pushPgLog('onNextMouseLeave')}
                        onSkipFirst={() => { setPgCurrentPage(1); setPgStatus('First page'); pushPgLog('onSkipFirst'); }}
                        onSkipFirstMouseEnter={() => pushPgLog('onSkipFirstMouseEnter')}
                        onSkipFirstMouseLeave={() => pushPgLog('onSkipFirstMouseLeave')}
                        onSkipLast={() => { setPgCurrentPage(pgTotalPages); setPgStatus('Last pages'); pushPgLog('onSkipLast'); }}

                        onSkipLastMouseLeave={() => pushPgLog('onSkipLastMouseLeave')}

                    </div>
                  </section>
                </>
              )}

              {activeComponent === 'alert' && (

                  <section>

                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                      {alertClosed ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
                          <span>Alert dismissed.</span>
                          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontFamily: 'inherit', fontSize: 'var(--font-size-body-small)', padding: 0 }} onClick={() => setAlertClosed(false)}>
                            Restore

                      ) : (
                        <Alert
                          state={alertState}
                          emphasis={alertEmphasis}

                          onClose={alertShowClose ? () => setAlertClosed(true) : undefined}

                            <>
                              <Button variant="Secondary" color="Primary" size="S">Button</Button>
                              <LinkButton size="S">Link</LinkButton>

                          ) : undefined}

                          {alertMessage}
                        </Alert>
                      )}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtle</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code>: light background tint + 1 px coloured border. Default for most usage.

                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtle" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtler</h2>
                    <p className="stage-note">
                      <code>emphasis="subtler"</code>: white background + 2 px coloured border. Use when the Alert is secondary to surrounding content.

                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtler" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Dismiss (onClose)</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code> shows a dismiss button when <code>onClose</code> is supplied. <code>emphasis="subtler"</code> never shows one.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => <DismissableAlert key={s} state={s} />)}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Toast (isFlag)</h2>
                    <p className="stage-note">
                      <code>isFlag=true</code>: floating snackbar with left-border accent + shadow. Auto-dismisses after 5 s.
                    </p>
                    <div className="alert-toast-triggers">
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('success')}>Success toast</Button>
                      <Button variant="Secondary" color="Error"    size="M" onClick={() => showToast('error')}>Error toast</Button>
                      <Button variant="Secondary" color="Warning"  size="M" onClick={() => showToast('warning')}>Warning toast</Button>
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('info')}>Info toast</Button>
                    </div>
                    {toasts.length > 0 && (
                      <p className="stage-note" style={{ marginTop: 'var(--gap-8)' }}>
                        {toasts.length} active toast{toasts.length > 1 ? 's' : ''} — bottom-right corner.
                      </p>
                    )}
                  </section>
                </>
              )}


            </main>

            </> /* end aside+main conditional */}

            {/* ---- Toast overlay (fixed bottom-right) ---- */}
            <div className="toast-container" aria-live="polite" aria-atomic="false">
              {toasts.map((t) => (
                <Alert key={t.id} state={t.state} emphasis="subtle" isFlag={true} title={ALERT_TITLES[t.state]} onClose={() => dismissToast(t.id)}>
                  {ALERT_MESSAGES[t.state]}
                </Alert>
              ))}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Playground />);
    </script>
  </body>
