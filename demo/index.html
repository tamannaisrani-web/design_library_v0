 * ============================================================ */

.dcds-Switch { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-Switch__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-Switch__track { position:relative; width:40px; height:20px; background-color:var(--color-surface-1); border:2px solid var(--color-stroke-action); border-radius:var(--rd-Max); transition:background-color 150ms ease,border-color 150ms ease; flex-shrink:0; }
.dcds-Switch__thumb { position:absolute; top:50%; left:2px; width:12px; height:12px; margin-top:-6px; background-color:var(--color-fill-action); border-radius:var(--rd-Max); transition:transform 150ms ease,background-color 150ms ease; }
.dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Switch__input:checked + .dcds-Switch__track .dcds-Switch__thumb { transform:translateX(20px); background-color:var(--color-surface-1); }
.dcds-Switch__input:focus-visible + .dcds-Switch__track { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Switch__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-Switch--State-Disabled, .dcds-Switch--State-Disabled .dcds-Switch__label { cursor:not-allowed; }
.dcds-Switch--State-Disabled .dcds-Switch__track { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-stroke-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__thumb { background-color:var(--dcds-cool-grey-400); }
.dcds-Switch--State-Disabled .dcds-Switch__label { color:var(--color-text-disabled); }

/* ============================================================
 * RadioButton.css
 * ============================================================ */
.dcds-RadioButton { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-RadioButton__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-RadioButton__indicator { position:relative; width:24px; height:24px; border:2px solid var(--color-stroke-neutral); border-radius:var(--rd-Max); background-color:var(--color-surface-1); transition:border-color 120ms ease,background-color 120ms ease; flex-shrink:0; }
.dcds-RadioButton__indicator::after { content:''; position:absolute; top:50%; left:50%; width:10px; height:10px; margin:-5px 0 0 -5px; border-radius:var(--rd-Max); background-color:transparent; transition:background-color 120ms ease; }
.dcds-RadioButton:hover .dcds-RadioButton__indicator { border-color:var(--color-stroke-action); }
.dcds-RadioButton__input:checked + .dcds-RadioButton__indicator { border-color:var(--color-stroke-action); }
.dcds-RadioButton__input:checked + .dcds-RadioButton__indicator::after { background-color:var(--color-fill-action); }
.dcds-RadioButton__input:focus-visible + .dcds-RadioButton__indicator { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-RadioButton__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-RadioButton--State-Disabled { cursor:not-allowed; }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__indicator { border-color:var(--color-stroke-disabled); background-color:var(--color-surface-disabled); }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__input:checked + .dcds-RadioButton__indicator::after { background-color:var(--color-text-disabled); }
.dcds-RadioButton--State-Disabled .dcds-RadioButton__label { color:var(--color-text-disabled); }

/* ============================================================
 * Checkbox.css
 * ============================================================ */
.dcds-Checkbox { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-Checkbox__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-Checkbox__indicator { position:relative; width:24px; height:24px; border:2px solid var(--color-stroke-neutral); border-radius:var(--rd-XS); background-color:var(--color-surface-1); transition:background-color 120ms ease,border-color 120ms ease; flex-shrink:0; }
.dcds-Checkbox__indicator::after { content:''; position:absolute; top:3px; left:7px; width:5px; height:11px; border:solid var(--color-text-invert); border-width:0 2px 2px 0; transform:rotate(45deg) scale(0); transition:transform 120ms ease; }
.dcds-Checkbox__indicator::before { content:''; position:absolute; top:50%; left:4px; right:4px; height:2px; margin-top:-1px; background-color:var(--color-text-invert); transform:scaleX(0); transition:transform 120ms ease; }
.dcds-Checkbox:hover .dcds-Checkbox__indicator { border-color:var(--color-stroke-focus); }
.dcds-Checkbox__input:checked + .dcds-Checkbox__indicator { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Checkbox__input:checked + .dcds-Checkbox__indicator::after { transform:rotate(45deg) scale(1); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator::after { transform:rotate(45deg) scale(0); }
.dcds-Checkbox--indeterminate .dcds-Checkbox__indicator::before { transform:scaleX(1); }
.dcds-Checkbox__input:focus-visible + .dcds-Checkbox__indicator { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Checkbox__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-Checkbox--State-Disabled { cursor:not-allowed; }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__indicator { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__input:checked + .dcds-Checkbox__indicator { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__input:checked + .dcds-Checkbox__indicator::after { border-color:var(--color-text-disabled); }
.dcds-Checkbox--State-Disabled .dcds-Checkbox__label { color:var(--color-text-disabled); }

/* ============================================================
 * Breadcrumbs.css
 * ============================================================ */
.dcds-Breadcrumbs { display:inline-flex; align-items:center; }
.dcds-Breadcrumbs__list { display:inline-flex; align-items:center; list-style:none; margin:0; padding:0; gap:var(--gap-4); }
.dcds-Breadcrumbs__list > li { display:inline-flex; align-items:center; }
.dcds-BaseHomeIcon, .dcds-BaseHomeIcon--current { display:inline-flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; text-decoration:none; border-radius:var(--rd-XS); }
.dcds-BaseHomeIcon { color:var(--color-icon-secondary); }
.dcds-BaseHomeIcon--current { color:var(--color-icon-primary); cursor:default; }
.dcds-BaseHomeIcon:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-BaseHomeIcon svg, .dcds-BaseHomeIcon--current svg { width:16px; height:16px; }
.dcds-BaseHomeIcon__linear, .dcds-BaseHomeIcon--current .dcds-BaseHomeIcon__linear { display:flex; align-items:center; justify-content:center; }
.dcds-BaseHomeIcon__bold, .dcds-BaseHomeIcon--current .dcds-BaseHomeIcon__bold { display:none; align-items:center; justify-content:center; }
.dcds-BaseHomeIcon:hover .dcds-BaseHomeIcon__linear, .dcds-BaseHomeIcon--current:hover .dcds-BaseHomeIcon__linear { display:none; }
.dcds-BaseHomeIcon:hover .dcds-BaseHomeIcon__bold, .dcds-BaseHomeIcon--current:hover .dcds-BaseHomeIcon__bold { display:flex; }
.dcds-BaseBreadcrumbItems--previous { display:inline-flex; align-items:center; font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; color:var(--color-text-secondary); text-decoration:none; border-radius:var(--rd-XS); cursor:pointer; background:none; border:none; padding:0; }
.dcds-BaseBreadcrumbItems--previous:hover { color:var(--color-text-secondary); text-decoration:underline; }
.dcds-BaseBreadcrumbItems--previous:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-BaseBreadcrumbItems--current { display:inline-flex; align-items:center; font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; color:var(--color-text-primary); cursor:default; }
.dcds-BaseBreadcrumbItems--current:hover { color:var(--color-text-primary); text-decoration:underline; }
.dcds-Breadcrumbs__separator { display:inline-flex; align-items:center; justify-content:center; width:5px; height:18px; font-size:12px; line-height:18px; color:var(--color-text-neutral); flex-shrink:0; user-select:none; }

/* ============================================================
 * Pagination.css
 * ============================================================ */
.dcds-Pagination { display:inline-flex; align-items:center; gap:var(--gap-4); }
.dcds-Pagination__btn { display:inline-flex; align-items:center; justify-content:center; width:32px; height:32px; padding:var(--gap-8); border:none; border-radius:var(--rd-S); cursor:pointer; flex-shrink:0; background:none; transition:background-color 120ms ease,color 120ms ease; color:var(--color-icon-primary); }
.dcds-Pagination__btn:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Pagination__nav { background-color:var(--color-surface-3); }
.dcds-Pagination__nav:hover:not(:disabled):not([aria-disabled='true']) { background-color:var(--color-fill-secondary-0); }
.dcds-Pagination__nav:active:not(:disabled):not([aria-disabled='true']) { background-color:var(--color-surface-3); }
.dcds-Pagination__nav:active:not(:disabled):not([aria-disabled='true']) .dcds-Pagination__icon svg path { stroke-width:2; }
.dcds-Pagination__nav:disabled, .dcds-Pagination__nav[aria-disabled='true'] { color:var(--color-text-disabled); cursor:not-allowed; pointer-events:none; }
.dcds-Pagination__page-numbers { display:inline-flex; align-items:center; gap:var(--gap-4); }
.dcds-Pagination__page { background-color:var(--color-surface-1); color:var(--color-text-primary); font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); line-height:normal; }
.dcds-Pagination__page:hover:not(:disabled) { background-color:var(--color-fill-secondary-0); }
.dcds-Pagination__page--active { background-color:var(--color-fill-action); color:var(--color-text-invert); font-weight:var(--font-weight-bold); cursor:default; pointer-events:none; }
.dcds-Pagination__page--active:hover { background-color:var(--color-fill-action); }
.dcds-Pagination__truncation { background-color:var(--color-surface-1); color:var(--color-text-primary); cursor:default; pointer-events:none; }
.dcds-Pagination__icon { display:flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; }
.dcds-Pagination__icon svg { width:16px; height:16px; }

/* ============================================================
 * Alert.css
 * ============================================================ */
.dcds-Alert { display:flex; align-items:flex-start; padding:var(--gap-12); border-radius:var(--rd-S); font-family:var(--font-family); overflow:hidden; width:100%; }
.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { border:1px solid transparent; }
.dcds-Alert--emphasis-subtle.dcds-Alert--flag { border:none; border-left:4px solid transparent; box-shadow:var(--shadow-S); }
.dcds-Alert--emphasis-subtler { background-color:var(--color-surface-1); border:2px solid transparent; }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-success); border-color:var(--color-stroke-success); }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-success); border-left-color:var(--color-stroke-success); }
.dcds-Alert--state-success.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-success); }
.dcds-Alert--state-success .dcds-Alert__icon { color:var(--color-stroke-success); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-error); border-color:var(--color-stroke-error); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-error); border-left-color:var(--color-stroke-error); }
.dcds-Alert--state-error.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-error); }
.dcds-Alert--state-error .dcds-Alert__icon { color:var(--color-stroke-error); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-warning); border-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-warning); border-left-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-warning); }
.dcds-Alert--state-warning .dcds-Alert__icon { color:var(--color-stroke-warning); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtle:not(.dcds-Alert--flag) { background-color:var(--color-fill-light-info); border-color:var(--color-stroke-info); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtle.dcds-Alert--flag { background-color:var(--color-fill-light-info); border-left-color:var(--color-stroke-info); }
.dcds-Alert--state-info.dcds-Alert--emphasis-subtler { border-color:var(--color-stroke-info); }
.dcds-Alert--state-info .dcds-Alert__icon { color:var(--color-stroke-info); }
.dcds-Alert__inner { display:flex; flex:1; gap:var(--gap-8); align-items:flex-start; min-width:0; }
.dcds-Alert--flag .dcds-Alert__inner { align-items:center; }
.dcds-Alert__content { display:flex; flex:1; flex-direction:column; gap:var(--gap-8); min-width:0; }
.dcds-Alert--flag .dcds-Alert__content { flex-direction:row; align-items:center; }
.dcds-Alert__header { display:flex; flex:1; gap:var(--gap-8); align-items:flex-start; min-width:0; }
.dcds-Alert__icon { flex-shrink:0; width:16px; height:16px; display:flex; align-items:center; justify-content:center; }
.dcds-Alert__header--has-title .dcds-Alert__icon { height:20px; }
.dcds-Alert__text { display:flex; flex-direction:column; gap:4px; flex:1; min-width:0; }
.dcds-Alert__title { font-size:var(--font-size-label); font-weight:var(--font-weight-bold); color:var(--color-text-primary); line-height:normal; margin:0; }
.dcds-Alert__message { font-size:var(--font-size-body-small); font-weight:400; color:var(--color-text-subdued); line-height:normal; margin:0; }
.dcds-Alert__actions { display:flex; gap:var(--gap-8); align-items:center; flex-shrink:0; }
.dcds-Alert__close { display:flex; align-items:center; justify-content:center; width:16px; height:16px; flex-shrink:0; align-self:flex-start; background:none; border:none; cursor:pointer; color:var(--color-text-subdued); padding:0; border-radius:var(--rd-XS); transition:color 120ms ease; }
.dcds-Alert__close:hover { color:var(--color-text-primary); }
.dcds-Alert__close:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }

/* ============================================================
 * Tooltip.css — Figma node 478:30949
 * bg: color/surface/4 (#F0F0F0) · text: color/text/primary (#0A2E57)
 * max-width: 224px · padding: gap-16 · radius: rd-S
 * ============================================================ */
.dcds-Tooltip__wrapper { position:relative; display:inline-flex; align-items:center; justify-content:center; }
.dcds-Tooltip__overlay { position:absolute; z-index:1000; display:flex; align-items:center; pointer-events:none; opacity:0; visibility:hidden; transition:opacity 120ms ease,visibility 120ms ease; }
.dcds-Tooltip__overlay--visible { opacity:1; visibility:visible; }
.dcds-Tooltip__overlay--Top { flex-direction:column; bottom:calc(100% + 4px); left:50%; transform:translateX(-50%); }
.dcds-Tooltip__overlay--Bottom { flex-direction:column; top:calc(100% + 4px); left:50%; transform:translateX(-50%); }
.dcds-Tooltip__overlay--Left { flex-direction:row; right:calc(100% + 4px); top:50%; transform:translateY(-50%); }
.dcds-Tooltip__overlay--Right { flex-direction:row; left:calc(100% + 4px); top:50%; transform:translateY(-50%); }
.dcds-Tooltip__bubble { display:flex; flex-direction:column; gap:var(--gap-0); width:224px; padding:var(--gap-8) var(--gap-12); background-color:var(--color-surface-4); color:var(--color-text-primary); border-radius:var(--rd-S); word-break:break-word; line-height:normal; }
.dcds-Tooltip__heading { font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-bold); line-height:normal; min-width:100%; margin:0; }
.dcds-Tooltip__body { font-family:var(--font-family); font-size:var(--font-size-body-small); font-weight:var(--font-weight-regular); line-height:normal; margin:0; }
.dcds-Tooltip__arrow { display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--color-surface-4); }
.dcds-Tooltip__info-trigger { display:inline-flex; align-items:center; justify-content:center; background:none; border:none; padding:0; cursor:pointer; color:var(--color-icon-secondary); border-radius:var(--rd-XS); }
.dcds-Tooltip__info-trigger--small { width:16px; height:16px; }
.dcds-Tooltip__info-trigger--medium { width:24px; height:24px; }
.dcds-Tooltip__info-trigger:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }

/* ============================================================
 * Stepper.css — Figma node 776:61667
 * Step states: active | completed | upcoming | pending | disabled
 * Modes: normal (circles) | compact (bars)
 * Orientations: Horizontal | Vertical
 * ============================================================ */
.dcds-Stepper { list-style:none; margin:0; padding:0; display:flex; }
.dcds-Stepper--Horizontal { flex-direction:row; align-items:flex-start; width:100%; }
.dcds-Stepper--Vertical { flex-direction:column; align-items:flex-start; }
.dcds-Step { display:flex; position:relative; }

/* Normal containers: gap-4 between step NODES (Figma "gap-[var(--gap-4)]" on Stepper flex container) */
.dcds-Stepper--Horizontal.dcds-Stepper--normal { gap:var(--gap-4); }
.dcds-Stepper--Vertical.dcds-Stepper--normal   { gap:var(--gap-4); }

/* Normal + Horizontal: gap-8 between track row and label (Figma "flex-col gap-[var(--gap-8)]" on BaseStepper) */
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step { flex:1; flex-direction:column; align-items:flex-start; gap:var(--gap-8); min-width:0; }
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step--last { flex:0 0 auto; }
.dcds-Stepper--Horizontal.dcds-Stepper--normal .dcds-Step__track { display:flex; flex-direction:row; align-items:center; width:100%; height:24px; gap:var(--gap-4); }

/* Normal + Vertical: gap-8 between track column and content, gap-4 between circle and connector */
.dcds-Stepper--Vertical.dcds-Stepper--normal .dcds-Step { flex-direction:row; align-items:flex-start; gap:var(--gap-8); }
.dcds-Stepper--Vertical.dcds-Stepper--normal .dcds-Step__track { display:flex; flex-direction:column; align-items:center; align-self:stretch; flex-shrink:0; gap:var(--gap-4); }

/* Step circle (Normal mode) */
.dcds-Step__circle { width:24px; height:24px; border-radius:var(--rd-Max); flex-shrink:0; overflow:hidden; display:flex; align-items:center; justify-content:center; position:relative; }
/* Fix #3 — Active: SVG provides the visual (white ring + NB-400 stroke + NB-500 disc) */
.dcds-Step__circle--active { background:transparent; }
/* Inactive: white bg + Noble Blue-200 border */
.dcds-Step__circle--upcoming { background-color:var(--color-surface-1); border:1.5px solid var(--color-stroke-focus-subtle); }
/* Fix #5 — Complete: Spring Green-100 bg (matches Figma fallback #b9ebc9 ≈ dcds-spring-green-100 #b9dec8) */
.dcds-Step__circle--completed { background-color:var(--dcds-spring-green-100); padding:3px; }
.dcds-Step__circle--pending { background-color:var(--color-fill-light-warning); padding:3px; }
.dcds-Step__circle--disabled { background:transparent; border:1.5px solid var(--color-stroke-subdued); }
.dcds-Step__circle-icon { display:flex; align-items:center; justify-content:center; width:18px; height:18px; flex-shrink:0; }
/* Fix: complete icon uses #0e8436 (verified from Figma tick-circle SVG asset) */
.dcds-Step__circle-icon--completed { color:var(--color-fill-invert-success); }
.dcds-Step__circle-icon--pending { color:var(--color-fill-invert-warning); }

/* Connector line (Normal mode) — 1.5 px matches Figma line asset stroke */
.dcds-Stepper--Horizontal .dcds-Step__connector { flex:1; height:1.5px; min-width:var(--gap-16); }
.dcds-Stepper--Vertical .dcds-Step__connector { flex:1; width:1.5px; min-height:var(--gap-32); }
/* Connector colours — verified from Figma SVG line assets (node 759:13098 etc.) */
.dcds-Step--active    .dcds-Step__connector { background-color:var(--color-stroke-focus); }   /* NB-400 #1355a1 */
.dcds-Step--completed .dcds-Step__connector { background-color:var(--color-stroke-action); }  /* Wealthy Green-500 #26B67F */
.dcds-Step--upcoming  .dcds-Step__connector { background-color:var(--color-stroke-focus-subtle); } /* NB-200 #6ba8ee */
.dcds-Step--pending   .dcds-Step__connector { background-color:var(--color-stroke-warning); }
.dcds-Step--disabled  .dcds-Step__connector { background-color:var(--color-stroke-disabled); }

/* Compact + Horizontal: gap-8 between bar and label (matches Figma "flex-col gap-[var(--gap-8)]") */
.dcds-Stepper--Horizontal.dcds-Stepper--compact { gap:var(--gap-8); align-items:flex-start; }
.dcds-Stepper--Horizontal.dcds-Stepper--compact .dcds-Step { flex:1; flex-direction:column; align-items:flex-start; gap:var(--gap-8); min-width:0; }
/* Fix #7 — horizontal compact bar: full width, 4 px tall, NO border-radius on any state */
.dcds-Stepper--Horizontal.dcds-Stepper--compact .dcds-Step__bar { width:100%; height:4px; border-radius:0; }

/* Compact + Vertical — Fix #7: bar is direct child of <li>, align-self:stretch grows with content */
.dcds-Stepper--Vertical.dcds-Stepper--compact { gap:var(--gap-12); }
.dcds-Stepper--Vertical.dcds-Stepper--compact .dcds-Step { flex-direction:row; align-items:flex-start; gap:var(--gap-8); }
.dcds-Stepper--Vertical.dcds-Stepper--compact .dcds-Step__bar { width:4px; align-self:stretch; flex-shrink:0; border-radius:0; }

/* Compact bar colours */
.dcds-Step__bar--active    { background-color:var(--color-fill-primary-9); }
.dcds-Step__bar--completed { background-color:var(--color-fill-invert-success); }
.dcds-Step__bar--upcoming  { background-color:var(--color-fill-primary-2); }
.dcds-Step__bar--pending   { background-color:var(--color-fill-invert-warning); }
.dcds-Step__bar--disabled  { background-color:var(--color-surface-disabled); }

/* Content — label + description. Spacing from track handled by gap-8 on the step container. */
.dcds-Step__content { display:flex; flex-direction:column; gap:var(--gap-0); }
/* Vertical normal: 2px optical alignment with circle top edge */

      .dcds-AvatarGroup__arrow { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; width:var(--gap-24); height:var(--gap-24); color:var(--color-icon-primary); transition:transform 200ms ease; }
      .dcds-AvatarGroup--expanded .dcds-AvatarGroup__arrow { transform:rotate(180deg); }
      .dcds-AvatarGroup--inverse { background-color:var(--color-fill-primary-9); }
      .dcds-AvatarGroup--inverse .dcds-AvatarGroup__info,.dcds-AvatarGroup--inverse .dcds-AvatarGroup__designation,.dcds-AvatarGroup--inverse .dcds-AvatarGroup__name { color:var(--color-text-invert); }
      .dcds-AvatarGroup--inverse .dcds-AvatarGroup__arrow { color:var(--color-icon-invert); }
      .dcds-AvatarGroup--inverse:hover,.dcds-AvatarGroup--inverse:focus-visible { background-color:var(--color-fill-dark-info); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded { background-color:var(--color-fill-secondary-0); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded .dcds-AvatarGroup__info,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded .dcds-AvatarGroup__designation,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded .dcds-AvatarGroup__name { color:var(--color-text-primary); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded .dcds-AvatarGroup__arrow { color:var(--color-icon-primary); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:hover,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:focus-visible { background-color:var(--color-fill-dark-info); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:hover .dcds-AvatarGroup__info,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:hover .dcds-AvatarGroup__designation,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:hover .dcds-AvatarGroup__name,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:focus-visible .dcds-AvatarGroup__info,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:focus-visible .dcds-AvatarGroup__designation,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:focus-visible .dcds-AvatarGroup__name { color:var(--color-text-invert); }
      .dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:hover .dcds-AvatarGroup__arrow,.dcds-AvatarGroup--inverse.dcds-AvatarGroup--expanded:focus-visible .dcds-AvatarGroup__arrow { color:var(--color-icon-invert); }

      /* ============================================================
       * Chip / Badge / Tag — stage helpers
       * ============================================================ */
      .chip-row { display:flex; flex-wrap:wrap; gap:var(--gap-8); align-items:center; padding:var(--gap-16); background:var(--color-surface-2); border-radius:var(--rd-S); margin-top:var(--gap-8); }
      .badge-grid { display:flex; flex-wrap:wrap; gap:var(--gap-8); align-items:center; padding:var(--gap-16); background:var(--color-surface-2); border-radius:var(--rd-S); margin-top:var(--gap-8); }
      .tag-row { display:flex; flex-wrap:wrap; gap:var(--gap-8); align-items:center; padding:var(--gap-16); background:var(--color-surface-2); border-radius:var(--rd-S); margin-top:var(--gap-8); }

      /* ============================================================
       * _BaseTabs — internal single-tab-item styles
       * ============================================================ */
      .dcds-BaseTabs { display:inline-flex; align-items:center; justify-content:flex-start; font-family:var(--font-family); background:transparent; border:none; cursor:pointer; position:relative; flex-shrink:0; outline:none; box-sizing:border-box; transition:background-color 120ms ease,border-color 120ms ease; -webkit-tap-highlight-color:transparent; }
      .dcds-BaseTabs:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; border-radius:var(--rd-XS); }
      .dcds-BaseTabs__content { display:flex; align-items:center; gap:var(--gap-8); pointer-events:none; }
      .dcds-BaseTabs__icon { display:inline-flex; align-items:center; flex-shrink:0; width:16px; height:16px; transition:color 120ms ease; }
      .dcds-BaseTabs__label { white-space:nowrap; line-height:normal; transition:color 120ms ease; }
      .dcds-BaseTabs__badge { display:inline-flex; align-items:center; justify-content:center; height:16px; min-width:16px; padding:var(--gap-2) var(--gap-4); font-family:var(--font-family); font-size:var(--font-size-body-small); font-weight:var(--font-weight-regular); line-height:1; white-space:nowrap; flex-shrink:0; }
      .dcds-BaseTabs__badge--counter { border-radius:var(--rd-S); color:var(--color-text-invert); }
      .dcds-BaseTabs__badge--tag { border-radius:var(--rd-Max); color:var(--color-text-invert); }

      /* Borderless */
      .dcds-BaseTabs--borderless { height:64px; padding:var(--gap-8); border-bottom:4px solid transparent; }
      .dcds-BaseTabs--borderless .dcds-BaseTabs__label { font-size:var(--font-size-label); font-weight:var(--font-weight-regular); color:var(--color-text-subdued); }
      .dcds-BaseTabs--borderless .dcds-BaseTabs__icon { color:var(--color-text-subdued); }
      .dcds-BaseTabs--borderless .dcds-BaseTabs__badge { background-color:var(--color-fill-action); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--size-M .dcds-BaseTabs__label { font-size:var(--font-size-body); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected { border-bottom-color:var(--color-stroke-action); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected .dcds-BaseTabs__label { color:var(--color-text-action); font-weight:var(--font-weight-bold); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected .dcds-BaseTabs__icon { color:var(--color-text-action); }
      .dcds-BaseTabs--borderless:not(.dcds-BaseTabs--selected):not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__label { color:var(--color-text-action); font-weight:var(--font-weight-bold); }
      .dcds-BaseTabs--borderless:not(.dcds-BaseTabs--selected):not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__icon { color:var(--color-text-action); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected:not(.dcds-BaseTabs--disabled):hover { border-bottom-color:var(--color-stroke-success); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected:not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__label { color:var(--color-text-success); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--selected:not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__icon { color:var(--color-text-success); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--disabled { cursor:not-allowed; }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--disabled .dcds-BaseTabs__label { color:var(--color-text-disabled); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--disabled .dcds-BaseTabs__icon { color:var(--color-text-disabled); }
      .dcds-BaseTabs--borderless.dcds-BaseTabs--disabled .dcds-BaseTabs__badge { background-color:var(--color-surface-disabled); }

      /* Filled */
      .dcds-BaseTabs--filled { padding:var(--gap-8) var(--gap-32); border-radius:var(--rd-S) var(--rd-S) 0 0; border:1px solid var(--color-stroke-focus-subtle); background:transparent; }
      .dcds-BaseTabs--filled.dcds-BaseTabs--size-S { height:32px; }
      .dcds-BaseTabs--filled.dcds-BaseTabs--size-M { height:48px; }
      .dcds-BaseTabs--filled .dcds-BaseTabs__label { font-size:var(--font-size-label); font-weight:var(--font-weight-regular); color:var(--color-text-primary); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--size-M .dcds-BaseTabs__label { font-size:var(--font-size-body); }
      .dcds-BaseTabs--filled .dcds-BaseTabs__icon { color:var(--color-text-primary); }
      .dcds-BaseTabs--filled .dcds-BaseTabs__badge { background-color:var(--color-fill-invert-info); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--selected { background-color:var(--color-fill-primary-9); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--selected .dcds-BaseTabs__label { color:var(--color-text-invert); font-weight:var(--font-weight-bold); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--selected .dcds-BaseTabs__icon { color:var(--color-text-invert); }
      .dcds-BaseTabs--filled:not(.dcds-BaseTabs--selected):not(.dcds-BaseTabs--disabled):hover { background-color:var(--color-fill-primary-1); }
      .dcds-BaseTabs--filled:not(.dcds-BaseTabs--selected):not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__label { color:var(--color-text-primary); font-weight:var(--font-weight-bold); }
      .dcds-BaseTabs--filled:not(.dcds-BaseTabs--selected):not(.dcds-BaseTabs--disabled):hover .dcds-BaseTabs__icon { color:var(--color-text-primary); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--disabled { cursor:not-allowed; border-color:var(--color-stroke-disabled); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--disabled .dcds-BaseTabs__label { color:var(--color-text-disabled); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--disabled .dcds-BaseTabs__icon { color:var(--color-text-disabled); }
      .dcds-BaseTabs--filled.dcds-BaseTabs--disabled .dcds-BaseTabs__badge { background-color:var(--color-surface-disabled); }

      /* ============================================================
       * Tabs — outer tablist container
       * ============================================================ */
      .dcds-Tabs { display:flex; align-items:center; position:relative; box-sizing:border-box; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none; }
      .dcds-Tabs::-webkit-scrollbar { display:none; }
      .dcds-Tabs--borderless { gap:var(--gap-24); }
      .dcds-Tabs--borderless.dcds-Tabs--fullwidth { width:100%; }
      .dcds-Tabs--filled { gap:0; border-bottom:1px solid var(--color-stroke-focus-subtle); width:100%; }
      .dcds-Tabs--filled.dcds-Tabs--fullwidth > .dcds-BaseTabs--filled { flex:1; justify-content:center; }

      /* Tabs demo helpers */
      .tabs-demo-row { display:flex; flex-direction:column; gap:var(--gap-16); padding:var(--gap-16); background:var(--color-surface-2); border-radius:var(--rd-S); margin-top:var(--gap-8); }

      /* ============================================================
       * Modal — overlay, dialog shell, and sub-component styles
       * ============================================================ */
      .dcds-Modal__overlay { position:fixed; inset:0; z-index:1000; background:var(--color-overlay-50); display:flex; align-items:center; justify-content:center; padding:var(--gap-24); }
      .dcds-Modal__dialog { position:relative; background:var(--color-surface-1); border:1px solid var(--color-stroke-subdued); border-radius:var(--rd-S); box-shadow:var(--shadow-S); display:flex; flex-direction:column; max-height:calc(100vh - var(--gap-48)); width:100%; animation:dcds-modal-in 160ms ease-out; }
      @keyframes dcds-modal-in { from { opacity:0; transform:translateY(-8px) scale(0.98); } to { opacity:1; transform:translateY(0) scale(1); } }
      .dcds-Modal__dialog--size-S { max-width:400px; }
      .dcds-Modal__dialog--size-M { max-width:760px; }
      .dcds-Modal__dialog--size-L { max-width:1024px; }
      .dcds-Modal__dialog:focus { outline:none; }
      .dcds-Modal__dialog:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
      .dcds-Modal__header { display:flex; align-items:center; justify-content:space-between; gap:var(--gap-16); padding:var(--gap-8) var(--gap-12); border-bottom:1px solid var(--color-stroke-subdued); flex-shrink:0; border-radius:var(--rd-S) var(--rd-S) 0 0; }
      .dcds-Modal__header-left { display:flex; align-items:flex-start; gap:var(--gap-8); flex:1; min-width:0; }
      .dcds-Modal__header-icon { display:flex; align-items:center; flex-shrink:0; color:var(--color-icon-subdued); height:var(--font-size-caption); margin-top:2px; }
      .dcds-Modal__header-text { display:flex; flex-direction:column; min-width:0; }
      .dcds-Modal__header-title { font-family:var(--font-family); font-size:var(--font-size-caption); font-weight:var(--font-weight-bold); color:var(--color-text-primary); line-height:normal; margin:0; }
      .dcds-Modal__header-subtitle { font-family:var(--font-family); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); color:var(--color-text-subdued); line-height:normal; margin:0; }
      .dcds-Modal__header-end { display:flex; align-items:center; gap:var(--gap-4); flex-shrink:0; }
      .dcds-Modal__header-badge { display:flex; align-items:center; height:var(--gap-20,20px); }
      .dcds-Modal__close-btn { display:flex; align-items:center; justify-content:center; width:40px; height:40px; flex-shrink:0; background:none; border:none; cursor:pointer; color:var(--color-icon-subdued); border-radius:var(--rd-S); transition:color 120ms ease,background-color 120ms ease; padding:0; }
      .dcds-Modal__close-btn:hover { color:var(--color-icon-primary); background-color:var(--color-surface-3); }
      .dcds-Modal__close-btn:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
      .dcds-Modal__body { flex:1; overflow-y:auto; padding:var(--gap-12); font-family:var(--font-family); font-size:var(--font-size-body); font-weight:var(--font-weight-regular); color:var(--color-text-primary); line-height:1.5; min-height:0; }
      .dcds-Modal__body--no-padding { padding:0; }
      .dcds-Modal__body::-webkit-scrollbar { width:4px; }
      .dcds-Modal__body::-webkit-scrollbar-track { background:transparent; }
      .dcds-Modal__body::-webkit-scrollbar-thumb { background:var(--color-stroke-subdued); border-radius:var(--rd-Max); }
      .dcds-Modal__footer { display:flex; align-items:center; justify-content:flex-end; gap:var(--gap-12); padding:var(--gap-12); border-top:1px solid var(--color-stroke-subdued); flex-shrink:0; border-radius:0 0 var(--rd-S) var(--rd-S); }
      .dcds-Modal__footer-link { margin-right:auto; display:flex; align-items:center; }
      .dcds-Modal__footer-actions { display:flex; align-items:center; gap:var(--gap-12); }

      /* Modal demo helpers */
      .modal-variant-row { display:flex; flex-wrap:wrap; gap:var(--gap-12); padding:var(--gap-16); background:var(--color-surface-2); border-radius:var(--rd-S); margin-top:var(--gap-8); }

      /* ── Foundation pages ───────────────────────────────────────── */
      .fnd-stage { padding: 32px; overflow-y: auto; }
      .fnd-section { margin-bottom: 48px; }
      .fnd-section h2 { font-size: 13px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-secondary, #6b7280); margin: 0 0 16px; }
      /* Typography */
      .type-scale { display: flex; flex-direction: column; gap: 6px; }
      .type-row { display: flex; align-items: baseline; gap: 16px; padding: 8px 12px; border-radius: 8px; background: var(--color-surface-secondary, #f9fafb); }
      .type-token { font-size: 11px; font-family: monospace; color: var(--color-text-secondary, #6b7280); min-width: 180px; flex-shrink: 0; }
      .type-meta  { font-size: 11px; color: var(--color-text-tertiary, #9ca3af); min-width: 120px; flex-shrink: 0; }
      .type-sample { color: var(--color-text-primary, #111827); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      /* Spacing */
      .gap-rows { display: flex; flex-direction: column; gap: 4px; }
      .gap-row { display: flex; align-items: center; gap: 12px; padding: 6px 0; }
      .gap-label { font-size: 11px; font-family: monospace; min-width: 100px; color: var(--color-text-secondary, #6b7280); }
      .gap-val   { font-size: 11px; color: var(--color-text-tertiary, #9ca3af); min-width: 40px; }
      .gap-bar   { height: 12px; background: var(--color-fill-action, #26b67f); border-radius: 3px; min-width: 2px; }
      .rd-grid   { display: flex; flex-wrap: wrap; gap: 16px; margin-top: 8px; }
      .rd-box    { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      .rd-swatch { width: 48px; height: 48px; background: var(--color-fill-action, #26b67f); }
      .rd-name   { font-size: 11px; font-family: monospace; color: var(--color-text-secondary, #6b7280); }
      .rd-val    { font-size: 10px; color: var(--color-text-tertiary, #9ca3af); }
      .tc-rows   { display: flex; flex-direction: column; gap: 4px; }
      .tc-row    { display: flex; align-items: center; gap: 12px; }
      .tc-label  { font-size: 11px; font-family: monospace; min-width: 80px; color: var(--color-text-secondary, #6b7280); }
      .tc-bar    { height: 10px; background: var(--color-surface-4, #e5e7eb); border-radius: 3px; }
      /* Colors */
      .color-grid  { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
      .color-swatch { display: flex; flex-direction: column; align-items: flex-start; gap: 6px; cursor: default; }
      .color-dot   { width: 100%; height: 48px; border-radius: 8px; border: 1px solid rgba(0,0,0,.08); }
      .color-cname { font-size: 11px; font-weight: 600; color: var(--color-text-primary, #121212); word-break: break-all; }
      .color-hex   { font-size: 10px; font-family: monospace; color: var(--color-text-subdued, #4b4b4b); }
      /* Icons */
      .icon-chips { display: flex; flex-wrap: wrap; gap: 8px; }
      .icon-chip  { display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 10px; border-radius: 8px; background: var(--color-surface-2, #f9f9f9); min-width: 72px; cursor: pointer; }
      .icon-chip svg { width: 24px; height: 24px; }
      .icon-name  { font-size: 9px; font-family: monospace; color: var(--color-text-subdued, #6b7280); text-align: center; }
      /* Flags */
      .flag-grid { display: flex; flex-wrap: wrap; gap: 10px; }
      .flag-item { display: flex; align-items: center; gap: 6px; padding: 4px 8px; border-radius: 6px; background: var(--color-surface-2, #f9f9f9); min-width: 160px; }
      .flag-code { font-size: 11px; font-family: monospace; font-weight: 600; color: var(--color-text-primary, #111827); min-width: 36px; }
      .flag-cname { font-size: 11px; color: var(--color-text-subdued, #6b7280); }
      /* Nav separator */
      .primary-nav__item--sep { font-size: 10px; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--color-text-subdued, #6b7280); padding: 16px 12px 4px; pointer-events: none; }

      /* dcds-Grid visualisation component */
      .dcds-Grid__section-label { font-size:var(--font-size-h3); font-weight:var(--font-weight-bold); color:var(--color-text-neutral); line-height:normal; margin:0; }
      .dcds-Grid__spec-list { margin:0; padding:0 0 0 var(--gap-20); font-size:var(--font-size-label); font-weight:var(--font-weight-regular); color:var(--color-text-secondary); line-height:1.6; }
      .dcds-Grid__viewport { position:relative; height:300px; border:0.5px solid var(--color-text-secondary); background-color:var(--color-surface-1); overflow:hidden; box-sizing:border-box; flex-shrink:0; }
      .dcds-Grid__ruler { position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:center; z-index:4; pointer-events:none; }
      .dcds-Grid__ruler-line { position:absolute; top:50%; left:0; right:0; height:1px; background-color:var(--color-text-secondary); transform:translateY(-50%); }
      .dcds-Grid__ruler-value { position:relative; background-color:var(--color-surface-1); padding:0 var(--gap-8); font-size:var(--font-size-body); font-weight:var(--font-weight-bold); color:var(--color-text-secondary); z-index:1; white-space:nowrap; }
      .dcds-Grid__topbar { position:absolute; left:0; right:0; background-color:var(--color-fill-primary-2); border-bottom:0.5px solid var(--color-text-secondary); display:flex; align-items:center; padding:0 var(--gap-16); box-sizing:border-box; z-index:3; }
      .dcds-Grid__topbar-label { font-size:var(--font-size-validation); font-weight:var(--font-weight-bold); color:var(--color-text-primary); opacity:0.6; letter-spacing:0.04em; text-transform:uppercase; }
      .dcds-Grid__bottombar { position:absolute; left:0; right:0; bottom:0; background-color:var(--color-fill-primary-2); border-top:0.5px solid var(--color-text-secondary); display:flex; align-items:center; justify-content:center; box-sizing:border-box; z-index:3; }
      .dcds-Grid__bottombar-label { font-size:var(--font-size-validation); font-weight:var(--font-weight-bold); color:var(--color-text-primary); opacity:0.6; letter-spacing:0.04em; text-transform:uppercase; }
      .dcds-Grid__body { position:absolute; left:0; right:0; display:flex; }
      .dcds-Grid__nav-sidebar { flex-shrink:0; background-color:var(--color-fill-primary-1); border-right:0.5px solid var(--color-text-secondary); box-sizing:border-box; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:space-between; padding:var(--gap-12) var(--gap-4) var(--gap-8); transition:background-color 120ms ease; }
      .dcds-Grid__nav-sidebar--clickable { cursor:pointer; }
      .dcds-Grid__nav-sidebar--clickable:hover { background-color:var(--color-fill-primary-2); }
      .dcds-Grid__nav-label { font-size:var(--font-size-validation); font-weight:var(--font-weight-bold); color:var(--color-text-secondary); white-space:nowrap; }
      .dcds-Grid__nav-chevron { font-size:14px; color:var(--color-text-secondary); opacity:0.5; line-height:1; user-select:none; }
      .dcds-Grid__content-area { flex:1; position:relative; min-width:0; overflow:hidden; box-sizing:border-box; }
      .dcds-Grid__content-ruler { position:absolute; top:0; left:0; right:0; height:28px; display:flex; align-items:center; justify-content:center; z-index:4; pointer-events:none; }
      .dcds-Grid__content-ruler-line { position:absolute; top:50%; left:0; right:0; height:1px; background-color:var(--color-text-secondary); transform:translateY(-50%); }
      .dcds-Grid__content-ruler-value { position:relative; background-color:var(--color-surface-1); padding:0 var(--gap-4); font-size:var(--font-size-body-small); font-weight:var(--font-weight-bold); color:var(--color-text-secondary); z-index:1; white-space:nowrap; }
      .dcds-Grid__cols { display:grid; position:absolute; left:0; right:0; align-items:stretch; box-sizing:border-box; }

      function Tooltip({ heading, bodyText, children, Placement = 'Top', iconSize = 'small', forceVisible = false, displayI = true, onShow, onHide, onMouseEnter, onMouseLeave, onFocus, onBlur, onKeyDown, className }) {
        const [visible, setVisible] = React.useState(false);
        const tooltipId = useId();
        const hideTimer = useRef(null);

        const show = () => {
          if (hideTimer.current) { clearTimeout(hideTimer.current); hideTimer.current = null; }

          if (onShow) onShow();

        const hide = () => {
          hideTimer.current = setTimeout(() => { setVisible(false); if (onHide) onHide(); }, 80);
        };

        const trigger = children ?? (
          <button type="button" className={`dcds-Tooltip__info-trigger dcds-Tooltip__info-trigger--${iconSize}`} aria-label="More information">
            <InfoCircleIcon size={iconSize} />

          ? React.cloneElement(trigger, { 'aria-describedby': tooltipId })

          'dcds-Tooltip__overlay',
          `dcds-Tooltip__overlay--${Placement}`,
          isVisible ? 'dcds-Tooltip__overlay--visible' : '',

          <div className="dcds-Tooltip__bubble">

        );

          <div
            className={['dcds-Tooltip__wrapper', className || ''].filter(Boolean).join(' ')}
            onMouseEnter={(e) => { show(); if (onMouseEnter) onMouseEnter(e); }}
            onMouseLeave={(e) => { hide(); if (onMouseLeave) onMouseLeave(e); }}
            onFocus={(e) => { show(); if (onFocus) onFocus(e); }}
            onBlur={(e) => { hide(); if (onBlur) onBlur(e); }}

        if (currentPage >= totalPages - 3)

      function Stepper({ isCompact = false, Orientation = 'Horizontal', children, onStepClick, onMouseEnter, onMouseLeave, className }) {
        const stepChildren = React.Children.toArray(children);
        const totalSteps = stepChildren.length;
        const olClasses = [
          'dcds-Stepper',
          `dcds-Stepper--${Orientation}`,
          isCompact ? 'dcds-Stepper--compact' : 'dcds-Stepper--normal',

          <ol className={olClasses} role="list" aria-label="Progress steps"

                orientation: Orientation,
                stepIndex: index,
                totalSteps,
                showConnector: !isCompact && index < totalSteps - 1,
                onStepClick,

        info: 'Read-only mode',

      const STATES = ['success', 'error', 'warning', 'info'];

      /* ============================================================
       * Chip
       * ============================================================ */
      /* icons/src/linear/InfoCircleLinear */
      const ChipIconLinear = () => (

      /* ============================================================

       * ============================================================ */
      function ChipFilterBarDemo() {
        const filters = ['All', 'Active', 'Pending', 'Closed', 'Rejected'];
        const [active, setActive] = useState('All');
        return (
          <ChipGroup aria-label="Filter by status">
            {filters.map((f) => (

          </ChipGroup>
        );

      /* ============================================================

       * ============================================================ */
      function PanelLayout({ panelContent, children }) {
        const { open, setOpen } = React.useContext(PanelContext);
        const chevron = (
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
            style={{ transform: open ? 'rotate(0deg)' : 'rotate(180deg)' }}>
            <polyline points="15 18 9 12 15 6" />
          </svg>
        );
        return (
          <div style={{ gridColumn: '2 / 4', display: 'grid', gridTemplateColumns: open ? '300px 1fr' : '44px 1fr', transition: 'grid-template-columns 200ms ease', height: '100%', overflow: 'hidden' }}>
            <aside className={`panel${open ? '' : ' panel--collapsed'}`}>
              <div className="panel__header">
                {open && (
                  <div>
                    <h1 style={{ margin: 0 }}>Props</h1>
                    <p style={{ fontSize: 12, color: 'var(--color-text-subdued)', margin: '4px 0 0' }}>Adjust and see live on the right.</p>

                )}

                  aria-label={open ? 'Collapse panel' : 'Expand panel'}
                  title={open ? 'Collapse panel' : 'Expand panel'}>
                  {chevron}
                </button>
              </div>
              {open && panelContent}
            </aside>
            {children}
          </div>
        );
      }

      /* ============================================================
       * ChipSection — self-contained chip playground (panel + stage)
       * ============================================================ */
      function ChipSection() {
        const [chip, setChip] = useState({ size: 'M', state: 'Default', selected: false, showIcon: false, label: 'Active' });
        const setChipSize     = (v) => setChip((p) => ({ ...p, size: v }));
        const setChipState    = (v) => setChip((p) => ({ ...p, state: v }));
        const setChipSelected = (v) => setChip((p) => ({ ...p, selected: v }));
        const setChipShowIcon = (v) => setChip((p) => ({ ...p, showIcon: v }));
        const setChipLabel    = (v) => setChip((p) => ({ ...p, label: v }));
        const { size: chipSize, state: chipState, selected: chipSelected, showIcon: chipShowIcon, label: chipLabel } = chip;
        const [chipLog, pushChipLog] = useEventLog();
        return (
          <PanelLayout panelContent={<>
            <h2>Chip</h2>
            <CtrlSelect label="size"       value={chipSize}       onChange={setChipSize}     options={['S', 'M', 'L']} />
            <CtrlSelect label="state"      value={chipState}      onChange={setChipState}    options={['Default', 'Disabled']} />
            <CtrlToggle label="isSelected" checked={chipSelected} onChange={setChipSelected} />
            <CtrlToggle label="showIcon"   checked={chipShowIcon} onChange={setChipShowIcon} />
            <CtrlText   label="label"      value={chipLabel}      onChange={setChipLabel} />
          </>}>
            <main className="stage">
              <section>
                <h2>Chip — Interactive Playground</h2>
                <p className="stage-note">Adjust props in the left panel. Click the chip to toggle <code>isSelected</code> and fire events.</p>
                <div className="preview">
                  <Chip
                    size={chipSize}
                    state={chipState}
                    isSelected={chipSelected}
                    showIcon={chipShowIcon}
                    tooltip={chipState === 'Disabled' ? 'This filter is unavailable' : undefined}
                    onChange={(sel) => { setChipSelected(sel); pushChipLog(`onChange · isSelected=${sel}`); }}
                    onClick={() => pushChipLog('onClick')}
                    onFocus={() => pushChipLog('onFocus')}
                    onBlur={() => pushChipLog('onBlur')}
                    onKeyDown={(e) => pushChipLog(`onKeyDown · ${e.key}`)}
                  >
                    {chipLabel}
                  </Chip>
                </div>
                <div className="events">{chipLog.length === 0 ? '— no events yet —' : chipLog.join('   ')}</div>
              </section>
              <section>
                <h2>Chip — Sizes</h2>
                <p className="stage-note">S (10px) / M (32px, 14px) / L (40px, 16px) — unselected and selected.</p>
                <div className="chip-row" style={{ alignItems: 'center' }}>
                  <Chip size="S" isSelected={false}>Small</Chip>
                  <Chip size="S" isSelected={true}>Small</Chip>
                  <Chip size="M" isSelected={false}>Medium</Chip>
                  <Chip size="M" isSelected={true}>Medium</Chip>
                  <Chip size="L" isSelected={false}>Large</Chip>
                  <Chip size="L" isSelected={true}>Large</Chip>
                </div>
              </section>
              <section>
                <h2>Chip — With Icon</h2>
                <p className="stage-note">Leading info-circle icon: linear (outline) when unselected, bold (filled) when selected.</p>

      /*

       *              icons/svg/linear/tick-circle.svg (Borderless) or

       *   trailing : { type: 'counter'|'tag', value: string|number } — Trailing badge slot.
       *              'counter' = numeric (e.g. 33), 'tag' = keyword (e.g. 'new').
       *
       * showLeading / showTrailing (Figma prop names) map to: leading !== undefined / trailing !== undefined.
       */
      const _BaseTabs = React.memo(function _BaseTabs({ label, isSelected = false, isDisabled = false, tabStyle = 'Borderless', size = 'M', leading, trailing, onClick, onKeyDown, id, 'aria-controls': ariaControls, tabIndex = -1, dataTestId }) {
        const isFilled = tabStyle === 'Filled';
        const cls = [
          'dcds-BaseTabs',
          isFilled ? 'dcds-BaseTabs--filled' : 'dcds-BaseTabs--borderless',
          `dcds-BaseTabs--size-${size}`,
          isSelected  ? 'dcds-BaseTabs--selected'  : '',
          isDisabled  ? 'dcds-BaseTabs--disabled'  : '',
        ].filter(Boolean).join(' ');
        return (
          <button role="tab" type="button" id={id} aria-selected={isSelected} aria-controls={ariaControls} aria-disabled={isDisabled} disabled={isDisabled} tabIndex={tabIndex} className={cls} onClick={onClick} onKeyDown={onKeyDown} data-testid={dataTestId}>
            <span className="dcds-BaseTabs__content">
              {/* Leading slot — icon from icons/svg/{linear,bold}/tick-circle.svg */}
              {leading !== undefined && <span className="dcds-BaseTabs__icon" aria-hidden="true">{React.createElement(leading.icon, { size: 16 })}</span>}
              <span className="dcds-BaseTabs__label">{label}</span>
              {/* Trailing slot — counter (numeric) or tag (text keyword) */}
              {trailing !== undefined && <span className={`dcds-BaseTabs__badge dcds-BaseTabs__badge--${trailing.type}`}>{trailing.value}</span>}
            </span>
          </button>
        );
      });

      /* ============================================================
       * Tabs — public tablist component
       * ============================================================ */
      function Tabs({ tabs, activeIndex, defaultActiveIndex = 0, isFullwidth = false, tabStyle = 'Borderless', size = 'M', onChange, className, id, dataTestId }) {
        const instanceId = React.useId();
        const isControlled = activeIndex !== undefined;
        const [internalActive, setInternalActive] = useState(defaultActiveIndex);
        const currentActive = isControlled ? activeIndex : internalActive;
        const enabledIndices = tabs.map((tab, i) => (tab.disabled ? -1 : i)).filter((i) => i !== -1);

        const handleTabClick = React.useCallback((index, event) => {
          if (!isControlled) setInternalActive(index);
          onChange && onChange(index, event);
        }, [isControlled, onChange]);

        const handleKeyDown = React.useCallback((event) => {
          const { key } = event;
          if (!['ArrowRight', 'ArrowLeft', 'ArrowDown', 'ArrowUp', 'Home', 'End'].includes(key)) return;
          event.preventDefault();
          const currentPos = enabledIndices.indexOf(currentActive);
          let nextPos = currentPos;
          if (key === 'ArrowRight' || key === 'ArrowDown') nextPos = (currentPos + 1) % enabledIndices.length;
          else if (key === 'ArrowLeft' || key === 'ArrowUp') nextPos = (currentPos - 1 + enabledIndices.length) % enabledIndices.length;
          else if (key === 'Home') nextPos = 0;
          else if (key === 'End') nextPos = enabledIndices.length - 1;
          const nextIndex = enabledIndices[nextPos];
          if (!isControlled) setInternalActive(nextIndex);
          onChange && onChange(nextIndex, event);
          document.getElementById(`dcds-tab-${instanceId}-${nextIndex}`) && document.getElementById(`dcds-tab-${instanceId}-${nextIndex}`).focus();
        }, [enabledIndices, currentActive, isControlled, onChange, instanceId]);

        const containerClass = ['dcds-Tabs', `dcds-Tabs--${tabStyle.toLowerCase()}`, isFullwidth ? 'dcds-Tabs--fullwidth' : '', className].filter(Boolean).join(' ');

        return (
          <div role="tablist" id={id} className={containerClass} onKeyDown={handleKeyDown} data-testid={dataTestId}>
            {tabs.map((tab, index) => (
              <_BaseTabs
                key={`${tab.label}-${index}`}
                label={tab.label}
                isSelected={currentActive === index}
                isDisabled={tab.disabled}
                tabStyle={tabStyle}
                size={size}
                leading={tab.leading}
                trailing={tab.trailing}
                onClick={(e) => handleTabClick(index, e)}
                id={`dcds-tab-${instanceId}-${index}`}
                aria-controls={`dcds-tabpanel-${instanceId}-${index}`}
                tabIndex={currentActive === index ? 0 : -1}
                dataTestId={tab.dataTestId}
              />
            ))}
          </div>
        );
      }

       * Mirrors src/components/Modal/Modal.tsx

      const ModalContext = React.createContext({ headerId: '', bodyId: '', onClose: undefined, showFooter: true });

      function Modal({ isOpen, size = 'M', onClose, closeOnBackdrop = true, closeOnEscape = true, showFooter = true, children, id, dataTestId, className }) {
        const instanceId = useId();
        const headerId = `dcds-modal-header-${instanceId}`;
        const bodyId   = `dcds-modal-body-${instanceId}`;
        const dialogRef = useRef(null);

        /* Prevent body scroll while open */
        useEffect(() => {
          if (!isOpen) return;
          const prev = document.body.style.overflow;
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = prev; };
        }, [isOpen]);

        /* Focus trap + Escape key */
        useEffect(() => {
          if (!isOpen) return;
          const dialogEl = dialogRef.current;
          if (!dialogEl) return;

          const getFocusable = () => Array.from(
            dialogEl.querySelectorAll(
              'button:not(:disabled),[href],input:not(:disabled),select:not(:disabled),' +
              'textarea:not(:disabled),[tabindex]:not([tabindex="-1"])'
            )
          );

          const prevFocused = document.activeElement;
          const focusable = getFocusable();
          if (focusable.length > 0) focusable[0].focus();
          else dialogEl.focus();

          const handleKeyDown = (e) => {
            if (e.key === 'Escape' && closeOnEscape) { onClose?.(); return; }
            if (e.key === 'Tab') {
              const els = getFocusable();
              if (els.length === 0) { e.preventDefault(); return; }
              const first = els[0];
              const last = els[els.length - 1];
              if (e.shiftKey) {
                if (document.activeElement === first) { e.preventDefault(); last.focus(); }
              } else {
                if (document.activeElement === last) { e.preventDefault(); first.focus(); }
              }
            }
          };

          document.addEventListener('keydown', handleKeyDown);
          return () => {
            document.removeEventListener('keydown', handleKeyDown);
            prevFocused?.focus();
          };
        }, [isOpen, closeOnEscape, onClose]);

        if (!isOpen) return null;

        const dialogClass = [
          'dcds-Modal__dialog',
          `dcds-Modal__dialog--size-${size}`,
          className,
        ].filter(Boolean).join(' ');

        const handleOverlayClick = (e) => {
          if (closeOnBackdrop && e.target === e.currentTarget) onClose?.();
        };

        return ReactDOM.createPortal(
          <ModalContext.Provider value={{ headerId, bodyId, onClose, showFooter }}>
            <div className="dcds-Modal__overlay" onClick={handleOverlayClick}>
              <div
                ref={dialogRef}
                role="dialog"
                aria-modal="true"
                aria-labelledby={headerId}
                aria-describedby={bodyId}
                id={id}
                data-testid={dataTestId}
                className={dialogClass}
                tabIndex={-1}
                onClick={(e) => e.stopPropagation()}
              >
                {children}
              </div>
            </div>
          </ModalContext.Provider>,
          document.body
        );
      }

      const DrawerContext = React.createContext(null);

      function Drawer({ isOpen, variant = 'Partial', onClose, closeOnBackdrop, closeOnEscape = true, children, id, dataTestId, className }) {
        const instanceId = React.useId();
        const headerId = `dcds-drawer-header-${instanceId}`;
        const bodyId   = `dcds-drawer-body-${instanceId}`;
        const panelRef = React.useRef(null);
        const resolvedCloseOnBackdrop = closeOnBackdrop !== undefined ? closeOnBackdrop : variant === 'Partial';

        React.useEffect(() => {
          if (!isOpen) return;
          const prev = document.body.style.overflow;
          document.body.style.overflow = 'hidden';
          return () => { document.body.style.overflow = prev; };
        }, [isOpen]);

        React.useEffect(() => {
          if (!isOpen) return;
          const panelEl = panelRef.current;
          if (!panelEl) return;
          const getFocusable = () => Array.from(panelEl.querySelectorAll(
            'button:not(:disabled),[href],input:not(:disabled),select:not(:disabled),textarea:not(:disabled),[tabindex]:not([tabindex="-1"])'
          ));
          const prevFocused = document.activeElement;
          const focusable = getFocusable();
          if (focusable.length > 0) focusable[0].focus(); else panelEl.focus();
          const handleKeyDown = (e) => {
            if (e.key === 'Escape' && closeOnEscape) { onClose?.(); return; }
            if (e.key === 'Tab') {
              const els = getFocusable();
              if (!els.length) { e.preventDefault(); return; }
              const first = els[0], last = els[els.length - 1];
              if (e.shiftKey) { if (document.activeElement === first) { e.preventDefault(); last.focus(); } }
              else { if (document.activeElement === last) { e.preventDefault(); first.focus(); } }
            }
          };
          document.addEventListener('keydown', handleKeyDown);
          return () => { document.removeEventListener('keydown', handleKeyDown); prevFocused?.focus(); };
        }, [isOpen, closeOnEscape, onClose]);

        if (!isOpen) return null;
        const overlayClass = ['dcds-Drawer__overlay', variant === 'Full' && 'dcds-Drawer__overlay--full'].filter(Boolean).join(' ');
        const panelClass   = ['dcds-Drawer__panel', variant === 'Partial' ? 'dcds-Drawer__panel--partial' : 'dcds-Drawer__panel--full', className].filter(Boolean).join(' ');
        const handleOverlayClick = (e) => { if (resolvedCloseOnBackdrop && e.target === e.currentTarget) onClose?.(); };

        return ReactDOM.createPortal(
          React.createElement(DrawerContext.Provider, { value: { headerId, bodyId, onClose } },
            React.createElement('div', { className: overlayClass, onClick: handleOverlayClick },
              React.createElement('div', {
                ref: panelRef, role: 'dialog', 'aria-modal': 'true',
                'aria-labelledby': headerId, 'aria-describedby': bodyId,
                id, 'data-testid': dataTestId, className: panelClass, tabIndex: -1,
                onClick: (e) => e.stopPropagation(),
              }, children)
            )
          ),
          document.body
        );
      }

      /* ============================================================
       * DeterminateLoader — mirrors DeterminateLoader.tsx 1:1
       * ============================================================ */
      function DeterminateLoader({
        progress, displayHelperText = true, displayPercentage = true,
        helperText = 'Helper text...', 'aria-label': ariaLabel,
        'aria-labelledby': ariaLabelledBy, onProgressComplete, onProgressChange,
        onMouseEnter, onMouseLeave, onFocus, onBlur, className, id, dataTestId,
      }) {
        const clamped = Math.min(100, Math.max(0, Math.round(progress)));
        const prevRef = useRef(clamped);
        useEffect(() => {
          if (clamped === 100 && prevRef.current < 100 && onProgressComplete) onProgressComplete();
          prevRef.current = clamped;
        }, [clamped, onProgressComplete]);
        useEffect(() => { if (onProgressChange) onProgressChange(clamped); }, [clamped, onProgressChange]);
        const resolvedAriaLabel = ariaLabel ?? `${clamped}% complete`;
        return (
          <div id={id} className={['dcds-DeterminateLoader', className].filter(Boolean).join(' ')}
            data-testid={dataTestId} onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
            onFocus={onFocus} onBlur={onBlur}
          >
            <div role="progressbar" aria-valuenow={clamped} aria-valuemin={0} aria-valuemax={100}
              aria-valuetext={resolvedAriaLabel}
              aria-label={ariaLabel ?? (ariaLabelledBy ? undefined : resolvedAriaLabel)}
              aria-labelledby={ariaLabelledBy} className="dcds-DeterminateLoader__track"
            >
              <div className="dcds-DeterminateLoader__fill" style={{ width: `${clamped}%` }} />
            </div>
            {(displayHelperText || displayPercentage) && (
              <div className="dcds-DeterminateLoader__labels">
                {displayHelperText && <span className="dcds-DeterminateLoader__helper-text">{helperText}</span>}
                {displayPercentage && <span className="dcds-DeterminateLoader__percentage" aria-hidden="true">{clamped}%</span>}
              </div>
            )}
          </div>
        );
      }

      /* ============================================================
       * IndeterminateLoader — mirrors IndeterminateLoader.tsx 1:1

      function IndeterminateLoader({

      /* ============================================================
       * FileUploadLiveDemo — picks real files, simulates upload progress
       * ============================================================ */
      function FileUploadLiveDemo() {
        const [files, setFiles] = React.useState([]);

        /* Add newly selected files to the list */
        function handleFileSelect(fileList) {
          const newEntries = Array.from(fileList).map(f => ({
            id: `${f.name}-${Date.now()}-${Math.random()}`,
            name: f.name,
            progress: 0,
            status: 'Uploading',
          }));
          setFiles(prev => [...prev, ...newEntries]);
        }

        /* Auto-increment progress for every uploading file */
        React.useEffect(() => {
          const hasUploading = files.some(f => f.status === 'Uploading');
          if (!hasUploading) return;
          const timer = setTimeout(() => {
            setFiles(prev => prev.map(f => {
              if (f.status !== 'Uploading') return f;
              /* Random 2–6% tick per ~80ms → ~2–5s full upload */
              const inc = Math.random() * 4 + 2;
              const next = Math.min(100, f.progress + inc);
              return { ...f, progress: next, status: next >= 100 ? 'Uploaded' : 'Uploading' };
            }));
          }, 80);
          return () => clearTimeout(timer);
        }, [files]);

        function removeFile(id) {
          setFiles(prev => prev.filter(f => f.id !== id));
        }

        function clearAll() {
          setFiles([]);
        }

        return (
          <section>
            <h2>Live Upload Demo</h2>
            <p className="stage-note">
              Select or drag real files onto the zone — each file appears as an
              <strong> UploadDocument</strong> row with animated progress.
              Progress auto-advances; rows switch to <em>Uploaded</em> at 100%.
            </p>

            <div style={{ display:'flex', flexDirection:'column', gap:'var(--gap-12)' }}>
              {/* Drop zone */}
              <UploadDragDrop
                states="Default"
                label="Upload files"
                requirementsText="Any file type — progress is simulated"
                displayValidation={false}
                multiple={true}
                onFileSelect={handleFileSelect}
              />

              {/* File rows */}
              {files.length > 0 && (
                <div style={{ display:'flex', flexDirection:'column', gap:'var(--gap-8)' }}>
                  {files.map(f => (
                    <UploadDocument
                      key={f.id}
                      status={f.status}
                      loaderType={f.status === 'Uploading' ? 'Determinate' : 'Determinate'}
                      documentName={f.name}
                      progress={f.progress}
                      helperText={f.status === 'Uploading' ? `Uploading ${f.name}…` : `${f.name} uploaded`}
                      displayHelperText={true}
                      displayPercentage={f.status === 'Uploading'}
                      badgeState={f.status === 'Uploaded' ? 'success' : 'neutral'}
                      statusText={f.status === 'Uploaded' ? 'Uploaded' : 'Uploading'}
                      showBadgeIcon={true}
                      displayView={f.status === 'Uploaded'}
                      displayDelete={true}
                      onDelete={() => removeFile(f.id)}
                      onView={() => {}}
                      style={{ width:'350px' }}
                    />
                  ))}
                </div>
              )}

              {/* Clear button */}
              {files.length > 0 && (
                <div style={{ display:'flex', gap:'var(--gap-8)', alignItems:'center' }}>
                  <button
                    type="button"
                    onClick={clearAll}
                    style={{ height:32, padding:'0 var(--gap-12)', background:'var(--color-surface-1)', border:'1px solid var(--color-stroke-neutral)', borderRadius:'var(--rd-XS)', fontFamily:'var(--font-family)', fontSize:'var(--font-size-body-small)', fontWeight:'var(--font-weight-regular)', color:'var(--color-text-subdued)', cursor:'pointer' }}
                  >
                    Clear all
                  </button>
                  <span style={{ fontFamily:'var(--font-family)', fontSize:'var(--font-size-body-small)', color:'var(--color-text-subdued)' }}>
                    {files.filter(f => f.status === 'Uploaded').length} / {files.length} uploaded
                  </span>
                </div>
              )}
            </div>
          </section>
        );
      }

function IconsSection() {

    if (!search) return ICON_CATS;
    const q = search.toLowerCase();
    const result = {};
    Object.entries(ICON_CATS).forEach(([cat, names]) => {
      const matches = names.filter(n => n.includes(q));
      if (matches.length) result[cat] = matches;

      };
      const FRAME_H = 300;

      function Grid({ breakpoint = 'Mobile', viewportWidth, onNavToggle, className, id, dataTestId }) {
        const cfg      = GRID_CONFIGS[breakpoint];
        const hasNav   = cfg.navWidth > 0;
        const isMobile = breakpoint === 'Mobile';

        const displayWidth = viewportWidth != null ? viewportWidth : cfg.viewport;
        const scale        = displayWidth / cfg.viewport;

        /* Heights */
        const rulerH     = 32;
        const topbarH    = isMobile ? 0 : cfg.navHeight;
        const bottombarH = isMobile ? cfg.navHeight : 0;
        const bodyTop    = rulerH + topbarH;
        const bodyH      = FRAME_H - bodyTop - bottombarH;

        /* Margin, gutter, nav are absolute — only columns flex */
        const navPx    = cfg.navWidth; // absolute
        const marginPx = cfg.margin;   // absolute
        const gutterPx = cfg.gutter;   // absolute — 16px all breakpoints
        const contentDivPx = hasNav ? displayWidth - navPx : displayWidth;
        const colAreaPx    = contentDivPx - 2 * marginPx;
        const colWidthPx   = Math.max(0, (colAreaPx - (cfg.columns - 1) * gutterPx) / cfg.columns);

        const liveContentWidth     = Math.round(contentDivPx - 2 * marginPx);
        const marginLabelPx        = marginPx / 2;
        const gutterLabelPx        = marginPx + colWidthPx + gutterPx / 2;
        const dimLabelTop          = bodyH * 0.28;
        const contentWidthRulerTop = dimLabelTop + 36;

        const rootClass = ['dcds-Grid', className].filter(Boolean).join(' ');

        return (
          <figure className={rootClass} id={id} data-testid={dataTestId}
            aria-label={`${cfg.label} — ${cfg.viewport}px viewport, ${cfg.columns} columns`}>
            <p className="dcds-Grid__section-label">{cfg.label}</p>
            <ul className="dcds-Grid__spec-list">
              {GRID_SPEC_ITEMS[breakpoint].map(item => <li key={item}>{item}</li>)}
            </ul>

            <div className="dcds-Grid__viewport" style={{ width: displayWidth }}>
              {/* Width ruler */}
              <div className="dcds-Grid__ruler" style={{ height: rulerH }}>
                <span className="dcds-Grid__ruler-line" />
                <span className="dcds-Grid__ruler-value">{displayWidth}px</span>
              </div>

              {/* Top nav bar — tablet / desktop */}
              {!isMobile && (
                <div className="dcds-Grid__topbar" style={{ top: rulerH, height: topbarH }}>
                  <span className="dcds-Grid__topbar-label">TopBar · {cfg.navHeight}px</span>
                </div>
              )}

              {/* Bottom nav bar — mobile */}
              {isMobile && (
                <div className="dcds-Grid__bottombar" style={{ height: bottombarH }}>
                  <span className="dcds-Grid__bottombar-label">Bottom nav · {cfg.navHeight}px</span>
                </div>
              )}

              {/* Body */}
              <div className="dcds-Grid__body" style={{ top: bodyTop, height: bodyH }}>
                {hasNav && (
                  <div
                    className={['dcds-Grid__nav-sidebar', onNavToggle ? 'dcds-Grid__nav-sidebar--clickable' : ''].filter(Boolean).join(' ')}
                    style={{ width: navPx, height: bodyH }}
                    onClick={onNavToggle}
                    role={onNavToggle ? 'button' : undefined}
                    title={onNavToggle ? (cfg.navWidth > 100 ? 'Click to collapse' : 'Click to expand') : undefined}
                  >
                    <span className="dcds-Grid__nav-label">{cfg.navWidth}px</span>
                    {onNavToggle && (
                      <span className="dcds-Grid__nav-chevron" aria-hidden="true">
                        {cfg.navWidth > 100 ? '‹' : '›'}
                      </span>
                    )}
                  </div>
                )}
                <div className="dcds-Grid__content-area" style={{ width: hasNav ? contentDivPx : '100%', height: bodyH }}>
