/* ============================================================
 * Button.css
 * ============================================================ */
.dcds-Button { display:inline-flex; align-items:center; justify-content:center; gap:var(--gap-8); font-family:var(--font-family); font-weight:var(--font-weight-bold); border:1px solid transparent; cursor:pointer; transition:background-color 120ms ease,border-color 120ms ease,color 120ms ease; white-space:nowrap; user-select:none; text-decoration:none; background:none; }
.dcds-Button:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Button--size-L { height:48px; padding:0 var(--gap-20); font-size:var(--font-size-body); border-radius:var(--rd-S); }
.dcds-Button--size-M { height:40px; padding:0 var(--gap-16); font-size:var(--font-size-body); border-radius:var(--rd-S); }
.dcds-Button--size-S { height:32px; padding:0 var(--gap-12); font-size:var(--font-size-body-small); border-radius:var(--rd-XS); }
.dcds-Button--size-XS { height:var(--gap-24); padding:0 var(--gap-8); font-size:var(--font-size-body-small); border-radius:var(--rd-XS); }
.dcds-Button__icon { display:inline-flex; align-items:center; justify-content:center; flex-shrink:0; }
.dcds-Button--size-L .dcds-Button__icon, .dcds-Button--size-M .dcds-Button__icon { width:16px; height:16px; }
.dcds-Button--size-S .dcds-Button__icon, .dcds-Button--size-XS .dcds-Button__icon { width:12px; height:12px; }
.dcds-Button--icon-only.dcds-Button--size-L { width:48px; padding:0; }
.dcds-Button--icon-only.dcds-Button--size-M { width:40px; padding:0; }
.dcds-Button--icon-only.dcds-Button--size-S { width:32px; padding:0; }
.dcds-Button--icon-only.dcds-Button--size-XS { width:var(--gap-24); padding:0; }
.dcds-Button--full-width { width:100%; }
.dcds-Button--variant-Primary.dcds-Button--color-Primary { background-color:var(--color-fill-action); color:var(--color-text-invert); }
.dcds-Button--variant-Primary.dcds-Button--color-Primary:hover:not(:disabled) { background-color:var(--color-fill-dark-action); }
.dcds-Button--variant-Primary.dcds-Button--color-Error { background-color:var(--color-fill-invert-error); color:var(--color-text-invert); }
.dcds-Button--variant-Primary.dcds-Button--color-Error:hover:not(:disabled) { background-color:var(--color-fill-dark-error); }
.dcds-Button--variant-Primary.dcds-Button--color-Warning { background-color:var(--color-fill-invert-warning); color:var(--color-text-invert-warning); }
.dcds-Button--variant-Primary.dcds-Button--color-Warning:hover:not(:disabled) { background-color:var(--color-fill-dark-warning); }
.dcds-Button--variant-Secondary { background-color:var(--color-surface-1); }
.dcds-Button--variant-Secondary.dcds-Button--color-Primary { border-color:var(--color-stroke-action); color:var(--color-text-action); }
.dcds-Button--variant-Secondary.dcds-Button--color-Primary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }
.dcds-Button--variant-Secondary.dcds-Button--color-Error { border-color:var(--color-stroke-error); color:var(--color-text-error); }
.dcds-Button--variant-Secondary.dcds-Button--color-Error:hover:not(:disabled) { background-color:var(--color-fill-light-error); }
.dcds-Button--variant-Secondary.dcds-Button--color-Warning { border-color:var(--color-stroke-warning); color:var(--color-text-warning); }
.dcds-Button--variant-Secondary.dcds-Button--color-Warning:hover:not(:disabled) { background-color:var(--color-fill-light-warning); }
.dcds-Button--variant-Tertiary { background-color:transparent; border-color:transparent; }
.dcds-Button--variant-Tertiary.dcds-Button--color-Primary { color:var(--color-text-action); }
.dcds-Button--variant-Tertiary.dcds-Button--color-Primary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }
.dcds-Button--variant-Tertiary.dcds-Button--color-Error { color:var(--color-text-error); }
.dcds-Button--variant-Tertiary.dcds-Button--color-Error:hover:not(:disabled) { background-color:var(--color-fill-light-error); }

.dcds-Button--variant-Tertiary.dcds-Button--color-Warning:hover:not(:disabled) { background-color:var(--color-fill-light-warning); }

/* ============================================================
 * LinkButton.css

.dcds-LinkButton { display:inline-flex; align-items:center; gap:var(--gap-4); font-family:var(--font-family); font-weight:var(--font-weight-regular); background:none; border:none; padding:0; cursor:pointer; color:var(--color-hyperlink-default); text-decoration:underline; text-underline-position:from-font; text-decoration-skip-ink:none; transition:color 120ms ease; }
.dcds-LinkButton:hover:not(:disabled):not([aria-disabled='true']) { color:var(--color-hyperlink-hover); }
.dcds-LinkButton:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; border-radius:var(--rd-XS); }
.dcds-LinkButton--size-L { font-size:var(--font-size-body); }
.dcds-LinkButton--size-M { font-size:var(--font-size-label); }
.dcds-LinkButton--size-S { font-size:var(--font-size-body-small); }
.dcds-LinkButton--size-XS { font-size:var(--font-size-validation); }
.dcds-LinkButton--state-Disabled, .dcds-LinkButton:disabled, .dcds-LinkButton[aria-disabled='true'] { color:var(--color-hyperlink-disabled); cursor:not-allowed; pointer-events:none; }

.dcds-LinkButton--size-L .dcds-LinkButton__icon { width:16px; height:16px; }
.dcds-LinkButton--size-M .dcds-LinkButton__icon { width:14px; height:14px; }
.dcds-LinkButton--size-S .dcds-LinkButton__icon { width:12px; height:12px; }
.dcds-LinkButton--size-XS .dcds-LinkButton__icon { width:12px; height:12px; }

/* ============================================================
 * DropdownButton.css
 * ============================================================ */
.dcds-DropdownButton__wrapper { position:relative; display:inline-block; }
.dcds-DropdownButton { display:inline-flex; align-items:center; justify-content:space-between; gap:var(--gap-8); font-family:var(--font-family); font-weight:var(--font-weight-bold); border-radius:var(--rd-S); border:1px solid transparent; cursor:pointer; transition:background-color 120ms ease,border-color 120ms ease,color 120ms ease; white-space:nowrap; width:100%; }
.dcds-DropdownButton:focus-visible { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-DropdownButton--size-L { height:48px; padding:0 var(--gap-16); font-size:var(--font-size-body); }
.dcds-DropdownButton--size-M { height:40px; padding:0 var(--gap-16); font-size:var(--font-size-body); }
.dcds-DropdownButton--size-S { height:32px; padding:0 var(--gap-12); font-size:var(--font-size-label); }
.dcds-DropdownButton--size-XS { height:28px; padding:0 var(--gap-8); font-size:var(--font-size-label); }
.dcds-DropdownButton--variant-Primary { background-color:var(--color-fill-action); color:var(--color-text-invert); }
.dcds-DropdownButton--variant-Primary:hover:not(:disabled) { background-color:var(--color-fill-dark-action); }
.dcds-DropdownButton--variant-Secondary { background-color:var(--color-surface-1); border-color:var(--color-stroke-action); color:var(--color-text-action); }
.dcds-DropdownButton--variant-Secondary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }
.dcds-DropdownButton--variant-Tertiary { background-color:transparent; border-color:transparent; color:var(--color-text-action); }
.dcds-DropdownButton--variant-Tertiary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }
/* Open state: no background change — only chevron rotates. */
.dcds-DropdownButton:disabled, .dcds-DropdownButton[aria-disabled='true'] { cursor:not-allowed; pointer-events:none; background-color:var(--color-surface-disabled); border-color:transparent; color:var(--color-text-disabled); }
.dcds-DropdownButton__chevron { transition:transform 150ms ease; display:inline-flex; }
.dcds-DropdownButton--state-Open .dcds-DropdownButton__chevron { transform:rotate(180deg); }
.dcds-DropdownButton__menu { position:absolute; top:calc(100% + var(--gap-4)); left:0; min-width:100%; background-color:var(--color-surface-1); border-radius:var(--rd-S); box-shadow:var(--shadow-S); padding:0; margin:0; list-style:none; z-index:10; overflow:hidden; animation:dcds-DropdownButton__menu-in 120ms ease-out; }
@keyframes dcds-DropdownButton__menu-in { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.dcds-DropdownButton__menu-item { display:block; width:100%; text-align:left; padding:var(--gap-16); background:none; border:none; color:var(--color-text-primary); font-family:var(--font-family); font-size:var(--font-size-body); font-weight:var(--font-weight-regular); cursor:pointer; transition:background-color 120ms ease; }
.dcds-DropdownButton__menu-item + .dcds-DropdownButton__menu-item, .dcds-DropdownButton__menu li + li .dcds-DropdownButton__menu-item { border-top:1px solid var(--color-stroke-subdued); }
.dcds-DropdownButton__menu-item:hover:not(:disabled) { background-color:var(--color-fill-primary-1); }
.dcds-DropdownButton__menu-item:focus-visible { outline:none; background-color:var(--color-fill-primary-1); box-shadow:inset 0 0 0 2px var(--color-stroke-focus); }
.dcds-DropdownButton__menu-item:disabled, .dcds-DropdownButton__menu-item[aria-disabled='true'] { color:var(--color-text-disabled); cursor:not-allowed; }

/* ============================================================
 * ButtonGroup.css
 * ============================================================ */
.dcds-ButtonGroup { display:inline-flex; flex-direction:row; align-items:center; gap:var(--gap-16); }
.dcds-ButtonGroup--Style-Default {}
.dcds-ButtonGroup--Style-Link { gap:var(--gap-16); }
.dcds-ButtonGroup--stack { flex-direction:column; align-items:stretch; }

/* ============================================================
 * Switch.css
 * ============================================================ */
.dcds-Switch { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }
.dcds-Switch__input { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }
.dcds-Switch__track { position:relative; width:40px; height:20px; background-color:var(--color-surface-1); border:2px solid var(--color-stroke-action); border-radius:var(--rd-Max); transition:background-color 150ms ease,border-color 150ms ease; flex-shrink:0; }
.dcds-Switch__thumb { position:absolute; top:50%; left:2px; width:12px; height:12px; margin-top:-6px; background-color:var(--color-fill-action); border-radius:var(--rd-Max); transition:transform 150ms ease,background-color 150ms ease; }
.dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }
.dcds-Switch__input:checked + .dcds-Switch__track .dcds-Switch__thumb { transform:translateX(20px); background-color:var(--color-surface-1); }
.dcds-Switch__input:focus-visible + .dcds-Switch__track { outline:2px solid var(--color-stroke-focus); outline-offset:2px; }
.dcds-Switch__label { font-size:var(--font-size-label); color:var(--color-text-primary); }
.dcds-Switch--State-Disabled, .dcds-Switch--State-Disabled .dcds-Switch__label { cursor:not-allowed; }
.dcds-Switch--State-Disabled .dcds-Switch__track { background-color:var(--color-surface-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-stroke-disabled); border-color:var(--color-stroke-disabled); }
.dcds-Switch--State-Disabled .dcds-Switch__thumb { background-color:var(--dcds-cool-grey-400); }
.dcds-Switch--State-Disabled .dcds-Switch__label { color:var(--color-text-disabled); }

/* ============================================================

          <path d="M12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22ZM12.75 16C12.75 16.41 12.41 16.75 12 16.75C11.59 16.75 11.25 16.41 11.25 16L11.25 11C11.25 10.59 11.59 10.25 12 10.25C12.41 10.25 12.75 10.59 12.75 11L12.75 16ZM11.08 7.62C11.13 7.49 11.2 7.39 11.29 7.29C11.39 7.2 11.5 7.13 11.62 7.08C11.74 7.03 11.87 7 12 7C12.13 7 12.26 7.03 12.38 7.08C12.5 7.13 12.61 7.2 12.71 7.29C12.8 7.39 12.87 7.49 12.92 7.62C12.97 7.74 13 7.87 13 8C13 8.13 12.97 8.26 12.92 8.38C12.87 8.5 12.8 8.61 12.71 8.71C12.61 8.8 12.5 8.87 12.38 8.92C12.14 9.02 11.86 9.02 11.62 8.92C11.5 8.87 11.39 8.8 11.29 8.71C11.2 8.61 11.13 8.5 11.08 8.38C11.03 8.26 11 8.13 11 8C11 7.87 11.03 7.74 11.08 7.62Z" fill="currentColor" />

      const ALERT_ICONS = {
        success: ALERT_ICON_SVG,

      const AlertCloseIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">

      function Alert({
        state = 'info',
        emphasis = 'subtle',
        isFlag = false,
        title,
        children,
        onClose,
        actions,
        className,
        onClick,       // Task 3
        onFocus,       // Task 3
        onBlur,        // Task 3
        onMouseEnter,  // Task 3
        onMouseLeave,  // Task 3
        onKeyDown,     // Task 3
      }) {
        const timerRef = useRef(null);

        useEffect(() => {
          if (!isFlag || !onClose) return;
          timerRef.current = setTimeout(onClose, 5000);
          return () => { if (timerRef.current) clearTimeout(timerRef.current); };
        }, [isFlag, onClose]);

        const role = (state === 'error' || state === 'warning') ? 'alert' : 'status';
        const ariaLive = state === 'error' ? 'assertive' : 'polite';
        const showClose = emphasis === 'subtle' && !!onClose;

        const classes = [
          'dcds-Alert',
          `dcds-Alert--state-${state}`,
          `dcds-Alert--emphasis-${emphasis}`,
          isFlag ? 'dcds-Alert--flag' : '',
          className || '',
        ].filter(Boolean).join(' ');

        const headerClasses = [
          'dcds-Alert__header',
          title ? 'dcds-Alert__header--has-title' : '',

        return (
          <div className={classes} role={role} aria-live={ariaLive}

                  <div className="dcds-Alert__actions">{actions}</div>

              {showClose && (
                <button type="button" className="dcds-Alert__close" aria-label="Dismiss" onClick={onClose}>
                  <AlertCloseIcon />
                </button>

      /* ============================================================
       * Button
       * ============================================================ */
      function Button({
        variant = 'Primary',
        color = 'Primary',
        size = 'M',
        isDisabled = false,
        isFullWidth = false,
        isIconOnly = false,
        ariaLabel,
        ariaBusy,
        type = 'button',
        className,
        children,
        onClick,
        onFocus,
        onBlur,
        onMouseEnter,
        onMouseLeave,
        onKeyDown,
        fixedWidth,
      }) {
        const classes = [
          'dcds-Button',
          `dcds-Button--variant-${variant}`,
          `dcds-Button--color-${color}`,
          `dcds-Button--size-${size}`,
          isIconOnly ? 'dcds-Button--icon-only' : '',
          isFullWidth ? 'dcds-Button--full-width' : '',
          className || '',
        ].filter(Boolean).join(' ');
        const overrideStyle = fixedWidth != null
          ? { width: typeof fixedWidth === 'number' ? `${fixedWidth}px` : fixedWidth }
          : undefined;
        return (
          <button
            type={type}
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-busy={ariaBusy || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            style={overrideStyle}
            onClick={onClick}
            onFocus={onFocus}
            onBlur={onBlur}
            onMouseEnter={onMouseEnter}
            onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * LinkButton
       * ============================================================ */
      function LinkButton({
        state = 'Default',
        size = 'M',
        isIconOnly = false,
        ariaLabel,
        href,
        target,
        rel,
        className,
        children,
        showIcon = true,
        fixedWidth,
        onClick,
      }) {
        const isDisabled = state === 'Disabled';
        const overrideStyle = fixedWidth != null
          ? { width: typeof fixedWidth === 'number' ? `${fixedWidth}px` : fixedWidth }
          : undefined;
        const iconSize = size === 'L' ? 16 : size === 'M' ? 14 : 12;
        const icon = <span className="dcds-LinkButton__icon" aria-hidden="true" style={{ transform: 'scaleY(-1) rotate(180deg)' }}><SendLinearIcon size={iconSize} /></span>;
        const trailingIcon = (isIconOnly || showIcon) ? icon : null;
        const classes = [
          'dcds-LinkButton',
          `dcds-LinkButton--state-${state}`,
          `dcds-LinkButton--size-${size}`,
          className || '',
        ].filter(Boolean).join(' ');
        if (href) {
          return (
            <a
              className={classes}
              href={isDisabled ? undefined : href}
              target={target}
              rel={rel}
              aria-disabled={isDisabled || undefined}
              aria-label={isIconOnly ? ariaLabel : undefined}
              style={overrideStyle}
              onClick={onClick}
            >
              {children}{trailingIcon}
            </a>
          );
        }
        return (
          <button
            type="button"
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            style={overrideStyle}
            onClick={onClick}
          >
            {children}{trailingIcon}
          </button>
        );

      /* ============================================================
       * DropdownButton (with floating _BaseMenu)
       * ============================================================ */
      function DropdownButton({
        variant = 'Secondary',
        state = 'Default',
        size = 'M',
        isOpen = false,
        isDisabled = false,
        menuItems = [],
        onToggle,
        onSelect,
        className,
        children,
        onClick,
        fixedWidth,
      }) {
        const wrapperRef = useRef(null);
        const resolvedState = isDisabled ? 'Disabled' : isOpen ? 'Open' : state;
        const overrideStyle = fixedWidth != null
          ? { width: typeof fixedWidth === 'number' ? `${fixedWidth}px` : fixedWidth }
          : undefined;

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => {
            if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
              if (onToggle) onToggle(false);
            }
          };
          document.addEventListener('mousedown', handler);
          return () => document.removeEventListener('mousedown', handler);
        }, [isOpen, onToggle]);

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => { if (e.key === 'Escape' && onToggle) onToggle(false); };
          document.addEventListener('keydown', handler);
          return () => document.removeEventListener('keydown', handler);
        }, [isOpen, onToggle]);

        const buttonClasses = [
          'dcds-DropdownButton',
          `dcds-DropdownButton--variant-${variant}`,
          `dcds-DropdownButton--state-${resolvedState}`,
          `dcds-DropdownButton--size-${size}`,
        ].filter(Boolean).join(' ');
        const wrapperClasses = ['dcds-DropdownButton__wrapper', className || ''].filter(Boolean).join(' ');

        return (
          <div ref={wrapperRef} className={wrapperClasses} style={overrideStyle}>
            <button
              type="button"
              className={buttonClasses}
              disabled={isDisabled || resolvedState === 'Disabled'}
              aria-disabled={isDisabled || undefined}
              aria-haspopup="menu"
              aria-expanded={isOpen}
              onClick={(e) => {
                if (onToggle) onToggle(!isOpen);
                if (onClick) onClick(e);

              <ul role="menu" className="dcds-DropdownButton__menu">

                  <li role="none" key={item.id}>
                    <button
                      type="button"
                      role="menuitem"
                      className="dcds-DropdownButton__menu-item"
                      disabled={item.disabled}
                      onClick={() => {
                        if (item.disabled) return;
                        if (item.onClick) item.onClick();
                        if (onSelect) onSelect(item.id);
                        if (onToggle) onToggle(false);
                      }}
                    >
                      {item.label}
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      }

      function ButtonGroup({ Style = 'Default', isLink = false, ariaLabel, className, children }) {
        const resolved = isLink ? 'Link' : Style;

      /* ============================================================
       * Switch
       * ============================================================ */
      function Switch({ State = 'Enabled', checked, defaultChecked = false, name, label, onChange }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const value = isControlled ? !!checked : internal;
        const isDisabled = State === 'Disabled';
        const id = useId();
        const classes = ['dcds-Switch', `dcds-Switch--State-${State}`].join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              type="checkbox"
              role="switch"
              className="dcds-Switch__input"
              name={name}
              checked={value}
              disabled={isDisabled}
              aria-checked={value}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
            />
            <span className="dcds-Switch__track"><span className="dcds-Switch__thumb" /></span>
            {label && <span className="dcds-Switch__label">{label}</span>}
          </label>
        );
      }

      /* ============================================================
       * RadioButton
       * ============================================================ */
      function RadioButton({ State = 'Enabled', name, value, label, checked, defaultChecked, onChange, onClick, onFocus, onBlur, onKeyDown }) {
        const isDisabled = State === 'Disabled';
        const id = useId();
        return (
          <label className={`dcds-RadioButton dcds-RadioButton--State-${State}`} htmlFor={id}>
            <input
              id={id}
              type="radio"
              className="dcds-RadioButton__input"
              name={name}
              value={value}
              checked={checked}
              defaultChecked={defaultChecked}
              disabled={isDisabled}
              onChange={onChange}
              onClick={onClick}
              onFocus={onFocus}
              onBlur={onBlur}
              onKeyDown={onKeyDown}
            />
            <span className="dcds-RadioButton__indicator" />
            <span className="dcds-RadioButton__label">{label}</span>
          </label>

      /* ============================================================
       * Checkbox
       * ============================================================ */
      function Checkbox({ State = 'Enabled', name, value, label, checked, defaultChecked = false, indeterminate = false, required = false, onChange, onClick, onFocus, onBlur, onKeyDown }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const resolved = isControlled ? !!checked : internal;
        // Either/or: indeterminate forces effectiveChecked to false
        const effectiveChecked = indeterminate ? false : resolved;
        const isDisabled = State === 'Disabled';
        const ref = useRef(null);
        useEffect(() => { if (ref.current) ref.current.indeterminate = indeterminate; }, [indeterminate]);
        const id = useId();
        const classes = ['dcds-Checkbox', `dcds-Checkbox--State-${State}`, indeterminate ? 'dcds-Checkbox--indeterminate' : ''].filter(Boolean).join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              ref={ref}
              type="checkbox"
              className="dcds-Checkbox__input"
              name={name}
              value={value}
              checked={effectiveChecked}
              disabled={isDisabled}
              required={required}
              aria-checked={indeterminate ? 'mixed' : effectiveChecked}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
              onClick={onClick}
              onFocus={onFocus}
              onBlur={onBlur}
              onKeyDown={onKeyDown}
            />
            <span className="dcds-Checkbox__indicator" />
            <span className="dcds-Checkbox__label">{label}</span>
          </label>
        );

          <path d="M9.25 12C9.25 10.48 10.48 9.25 12 9.25C13.52 9.25 14.75 10.48 14.75 12C14.75 13.52 13.52 14.75 12 14.75C10.48 14.75 9.25 13.52 9.25 12ZM13.25 12C13.25 11.31 12.69 10.75 12 10.75C11.31 10.75 10.75 11.31 10.75 12C10.75 12.69 11.31 13.25 12 13.25C12.69 13.25 13.25 12.69 13.25 12Z" fill="currentColor" />
          <path d="M16.25 12C16.25 10.48 17.48 9.25 19 9.25C20.52 9.25 21.75 10.48 21.75 12C21.75 13.52 20.52 14.75 19 14.75C17.48 14.75 16.25 13.52 16.25 12ZM20.25 12C20.25 11.31 19.69 10.75 19 10.75C18.31 10.75 17.75 11.31 17.75 12C17.75 12.69 18.31 13.25 19 13.25C19.69 13.25 20.25 12.69 20.25 12Z" fill="currentColor" />
        </svg>
      );

      // Always 7 items for totalPages > 7. Three layout zones (Figma 640:9190 + user spec):
      // - Near start  (page ≤ 4):        [1, 2, 3, 4, 5, ···, last]
      // - Near end    (page ≥ last-3):   [1, ···, last-4, last-3, last-2, last-1, last]
      // - Middle:                         [1, ···, current-1, current, current+1, ···, last]
      // Truncation only placed where ≥2 pages are hidden; never adjacent to page 1 or last.
      function buildPageItems(currentPage, totalPages) {
        if (totalPages <= 1) return [1];
        if (totalPages <= 7) return Array.from({ length: totalPages }, (_, i) => i + 1);
        if (currentPage <= 4)
          return [1, 2, 3, 4, 5, '...', totalPages];
        if (currentPage >= totalPages - 3)
          return [1, '...', totalPages-4, totalPages-3, totalPages-2, totalPages-1, totalPages];
        return [1, '...', currentPage-1, currentPage, currentPage+1, '...', totalPages];
      }

      function PageNumber({ page, isActive, onClick, onMouseEnter, onMouseLeave }) {
        const classes = [
          'dcds-Pagination__btn', 'dcds-Pagination__page',
          isActive ? 'dcds-Pagination__page--active' : '',
        ].filter(Boolean).join(' ');
        return (
          <button type="button" className={classes}
                  aria-current={isActive ? 'page' : undefined}
                  aria-label={`Page ${page}`}
                  onClick={() => onClick && onClick(page)}
                  onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
            {page}
          </button>
        );
      }

      function PaginationTruncation({ side }) {
        return (
          <span className="dcds-Pagination__btn dcds-Pagination__truncation"
                aria-hidden="true" data-side={side}>
            <span className="dcds-Pagination__icon"><MoreIcon /></span>
          </span>
        );
      }

      function Pagination({
        pageStatus = 'First page',
        showPageNumber = true,
        currentPage,
        totalPages,
        onPageChange,
        onPageMouseEnter,
        onPageMouseLeave,
        onPrev,
        onPrevMouseEnter,
        onPrevMouseLeave,
        onNext,
        onNextMouseEnter,
        onNextMouseLeave,
        onSkipFirst,
        onSkipFirstMouseEnter,
        onSkipFirstMouseLeave,
        onSkipLast,
        onSkipLastMouseEnter,
        onSkipLastMouseLeave,
        className,
      }) {
        const isFirstPage  = pageStatus === 'First page';
        const isLastPage   = pageStatus === 'Last pages';
        const isUnknown    = pageStatus === '-';
        const disabledPrev = isFirstPage || isUnknown;
        const disabledNext = isLastPage  || isUnknown;

        const resolvedCurrent = currentPage != null ? currentPage
          : isFirstPage ? 1
          : isLastPage  ? (totalPages || 1)
          : 1;
        const resolvedTotal = totalPages || 1;
        const pageItems = showPageNumber && resolvedTotal > 0
          ? buildPageItems(resolvedCurrent, resolvedTotal)
          : [];

        const classes = ['dcds-Pagination', className || ''].filter(Boolean).join(' ');
        return (
          <nav className={classes} aria-label="Pagination">
            <button type="button" className="dcds-Pagination__btn dcds-Pagination__nav"
                    aria-label="Skip to first page"
                    disabled={disabledPrev} aria-disabled={disabledPrev || undefined}
                    onClick={onSkipFirst}
                    onMouseEnter={onSkipFirstMouseEnter} onMouseLeave={onSkipFirstMouseLeave}>
              <span className="dcds-Pagination__icon"><SkipFirstIcon /></span>
            </button>
            <button type="button" className="dcds-Pagination__btn dcds-Pagination__nav"
                    aria-label="Previous page"
                    disabled={disabledPrev} aria-disabled={disabledPrev || undefined}
                    onClick={onPrev}
                    onMouseEnter={onPrevMouseEnter} onMouseLeave={onPrevMouseLeave}>
              <span className="dcds-Pagination__icon"><ArrowLeftIcon /></span>
            </button>
            {showPageNumber && pageItems.length > 0 && (
              <div className="dcds-Pagination__page-numbers">
                {pageItems.map((item, i) =>
                  item === '...'
                    ? <PaginationTruncation key={`e-${i}`} side={i < pageItems.length / 2 ? 'left' : 'right'} />
                    : <PageNumber key={item} page={item} isActive={item === resolvedCurrent}
                                  onClick={onPageChange}
                                  onMouseEnter={() => onPageMouseEnter && onPageMouseEnter(item)}
                                  onMouseLeave={() => onPageMouseLeave && onPageMouseLeave(item)} />
                )}
              </div>
            )}
            <button type="button" className="dcds-Pagination__btn dcds-Pagination__nav"
                    aria-label="Next page"
                    disabled={disabledNext} aria-disabled={disabledNext || undefined}
                    onClick={onNext}
                    onMouseEnter={onNextMouseEnter} onMouseLeave={onNextMouseLeave}>
              <span className="dcds-Pagination__icon"><ArrowRightIcon /></span>
            </button>
            <button type="button" className="dcds-Pagination__btn dcds-Pagination__nav"
                    aria-label="Skip to last page"
                    disabled={disabledNext} aria-disabled={disabledNext || undefined}
                    onClick={onSkipLast}
                    onMouseEnter={onSkipLastMouseEnter} onMouseLeave={onSkipLastMouseLeave}>
              <span className="dcds-Pagination__icon"><SkipLastIcon /></span>
            </button>
          </nav>
        );
      }

      /* ============================================================
       * Reusable control widgets
       * ============================================================ */
      function CtrlSelect({ label, value, onChange, options }) {
        return (
          <div className="control">
            <label>{label}</label>
            <select value={value} onChange={(e) => onChange(e.target.value)}>
              {options.map((o) => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        );
      }
      function CtrlToggle({ label, checked, onChange }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
          </div>
        );
      }
      function CtrlText({ label, value, onChange, placeholder = '' }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="text" value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder} />
          </div>
        );

      function useEventLog() {
        const [log, setLog] = useState([]);
        const push = (msg) => setLog((prev) => [`${new Date().toLocaleTimeString()}  ${msg}`, ...prev.slice(0, 9)]);
        return [log, push];
      }

      /* ============================================================
       * Alert state messages
       * ============================================================ */
      function DismissableAlert({ state }) {
        const [dismissed, setDismissed] = React.useState(false);
        if (dismissed) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
              <span>{state} alert dismissed</span>
              <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontSize: 'var(--font-size-body-small)', fontFamily: 'inherit', padding: 0 }} onClick={() => setDismissed(false)}>
                Restore
              </button>
            </div>
          );
        }
        return (
          <Alert state={state} emphasis="subtle" title={ALERT_TITLES[state]} onClose={() => setDismissed(true)}>
            {ALERT_MESSAGES[state]}
          </Alert>
        );
      }

                      onClick={() => pushLbLog('onClick')}
                    >
                      {lbIconOnly ? undefined : lbLabel}
                    </LinkButton>
                  </div>
                  <div className="events">
                    {lbLog.length === 0 ? '— no events yet —' : lbLog.join('\n')}
                  </div>
                  <p className="stage-note" style={{ marginTop: 'var(--gap-16)' }}>All sizes:</p>
                  <div className="preview" style={{ gap: 'var(--gap-8)', flexWrap: 'wrap' }}>
                    {['L','M','S','XS'].map(sz => (
                      <LinkButton key={sz} size={sz} showIcon={lbShowIcon} isIconOnly={lbIconOnly}
                        ariaLabel={lbIconOnly ? `${sz} link` : undefined}>
                        {lbIconOnly ? undefined : `${sz} — Link`}
                      </LinkButton>
                    ))}
                  </div>
                </section>
              )}

              {activeComponent === 'dropdownbutton' && (
                <section>
                  <h2>DropdownButton</h2>
                  <p className="stage-note">
                    When <code>isOpen=true</code>, the floating menu drops below. Click outside or press <code>Escape</code> to dismiss.
                  </p>
                  <div className="preview" style={{ minHeight: 180, alignItems: 'flex-start' }}>
                    <DropdownButton
                      variant={dbVariant}
                      size={dbSize}
                      isDisabled={dbDisabled}
                      isOpen={dbOpen}
                      fixedWidth={dbFixedWidth || undefined}
                      onToggle={(next) => { setDbOpen(next); pushDbLog(`onToggle: ${next}`); }}
                      onSelect={(id) => pushDbLog(`onSelect: ${id}`)}
                      onClick={() => pushDbLog('onClick')}
                      menuItems={[{ id: 'opt-1', label: 'Option 1' }, { id: 'opt-2', label: 'Option 2' }]}
                    >
                      {dbLabel}
                    </DropdownButton>
                  </div>
                  <div className="events">
                    {dbLog.length === 0 ? '— no events yet —' : dbLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'buttongroup' && (
                <section>
                  <h2>ButtonGroup</h2>
                  <p className="stage-note">
                    Pairs related action buttons with a consistent gap. Each child retains its own rounded corners.
                  </p>
                  <div className="preview">
                    <ButtonGroup Style={bgStyle} ariaLabel="Paired actions">
                      {bgStyle === 'Link' ? (
                        <>
                          <LinkButton size="M" href="#">Link ↗</LinkButton>
                          <Button variant="Primary" color="Primary" size="M">Button</Button>
                        </>
                      ) : (
                        <>
                          <Button variant="Secondary" color="Primary" size="M">Cancel</Button>
                          <Button variant="Primary" color="Primary" size="M">Save</Button>
                        </>
                      )}
                    </ButtonGroup>
                  </div>
                  <p className="stage-note" style={{ marginTop: 'var(--gap-16)' }}>Large size:</p>
                  <div className="preview">
                    <ButtonGroup Style={bgStyle} ariaLabel="Paired actions large">
                      {bgStyle === 'Link' ? (
                        <>
                          <LinkButton size="L" href="#">Link ↗</LinkButton>
                          <Button variant="Primary" color="Primary" size="L">Button</Button>
                        </>
                      ) : (
                        <>
                          <Button variant="Secondary" color="Primary" size="L">Cancel</Button>
                          <Button variant="Primary" color="Primary" size="L">Save</Button>
                        </>
                      )}
                    </ButtonGroup>
                  </div>
                </section>
              )}

              {activeComponent === 'switch' && (
                <section>
                  <h2>Switch</h2>
                  <div className="preview">
                    <Switch
                      State={swState}
                      checked={swChecked}
                      label="Email notifications"
                      onChange={(next) => { setSwChecked(next); pushSwLog(`onChange: ${next}`); }}
                    />
                  </div>
                  <div className="events">
                    {swLog.length === 0 ? '— no events yet —' : swLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'radiobutton' && (
                <section>
                  <h2>RadioButton</h2>
                  <p className="stage-note">
                    Always wrap in <code>&lt;fieldset&gt;</code> + <code>&lt;legend&gt;</code> with a shared <code>name</code>.
                  </p>
                  <div className="preview">
                    <fieldset style={{ border: 'none', padding: 0, margin: 0, display: 'flex', flexDirection: 'column', gap: 'var(--gap-8)' }}>
                      <legend style={{ color: 'var(--color-text-subdued)', fontSize: 'var(--font-size-body-small)', marginBottom: 'var(--gap-4)', float: 'left', width: '100%' }}>
                        Repayment frequency
                      </legend>
                      {['monthly', 'quarterly', 'annual'].map((v) => (
                        <RadioButton
                          key={v}
                          name="freq"
                          value={v}
                          label={v[0].toUpperCase() + v.slice(1)}
                          State={rbState}
                          checked={rbValue === v}
                          onChange={() => setRbValue(v)}
                          onClick={(e) => pushRbLog('onClick · ' + e.target.value)}
                          onFocus={(e) => pushRbLog('onFocus · ' + e.target.value)}
                          onBlur={(e) => pushRbLog('onBlur · ' + e.target.value)}
                          onKeyDown={(e) => pushRbLog('onKeyDown · ' + e.key + ' · ' + e.target.value)}
                        />
                      ))}
                    </fieldset>
                  </div>
                  <div style={{ marginTop: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)', fontFamily: 'monospace', minHeight: 36 }}>
                    {rbLog.length === 0 ? '— no events yet —' : rbLog.join('   ')}
                  </div>
                </section>
              )}

              {activeComponent === 'checkbox' && (
                <section>
                  <h2>Checkbox</h2>
                  <p className="stage-note">
                    Toggling <code>indeterminate</code> sets <code>aria-checked="mixed"</code> for select-all patterns.
                  </p>
                  <div className="preview">
                    <Checkbox
                      State={cbState}
                      label="I agree to the terms and conditions"
                      checked={cbChecked}
                      indeterminate={cbIndeterminate}
                      onChange={(next) => setCbChecked(next)}
                      onClick={() => pushCbLog('onClick')}
                      onFocus={() => pushCbLog('onFocus')}
                      onBlur={() => pushCbLog('onBlur')}
                      onKeyDown={(e) => pushCbLog('onKeyDown · ' + e.key)}
                    />
                  </div>
                  <div style={{ marginTop: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)', fontFamily: 'monospace', minHeight: 36 }}>
                    {cbLog.length === 0 ? '— no events yet —' : cbLog.join('   ')}
                  </div>
                  <p style={{ fontSize: 12, color: 'var(--color-text-subdued)', margin: '4px 0 0' }}>
                    effectiveChecked = <strong>{String(cbIndeterminate ? false : cbChecked)}</strong>
                    {' · '}aria-checked = <strong>{cbIndeterminate ? 'mixed' : String(cbIndeterminate ? false : cbChecked)}</strong>
                  </p>
                  <p className="stage-note" style={{ marginTop: 'var(--gap-16)' }}>All three states — unchecked / checked / indeterminate:</p>
                  <div className="preview" style={{ gap: 'var(--gap-8)', flexDirection: 'column', alignItems: 'flex-start' }}>
                    <Checkbox State="Enabled" label="Unchecked" defaultChecked={false} />
                    <Checkbox State="Enabled" label="Checked" defaultChecked={true} />
                    <Checkbox State="Enabled" label="Indeterminate (mixed)" indeterminate={true} />
                  </div>
                </section>
              )}

              {activeComponent === 'alert' && (
                <>
                  <section>
                    <h2>Alert — Interactive Playground</h2>
                    <p className="stage-note">Adjust props in the left panel to preview any combination.</p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                      {alertClosed ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
                          <span>Alert dismissed.</span>
                          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontFamily: 'inherit', fontSize: 'var(--font-size-body-small)', padding: 0 }} onClick={() => setAlertClosed(false)}>
                            Restore
                          </button>
                        </div>
                      ) : (
                        <Alert
                          state={alertState}
                          emphasis={alertEmphasis}
                          isFlag={alertIsFlag}
                          title={alertShowTitle ? (alertTitle || undefined) : undefined}
                          onClose={alertShowClose ? () => setAlertClosed(true) : undefined}
                          onClick={() => pushAlertLog('onClick')}
                          onFocus={() => pushAlertLog('onFocus')}
                          onBlur={() => pushAlertLog('onBlur')}
                          onMouseEnter={() => pushAlertLog('onMouseEnter')}
                          onMouseLeave={() => pushAlertLog('onMouseLeave')}
                          onKeyDown={(e) => pushAlertLog(`onKeyDown: ${e.key}`)}
                          actions={alertShowActions ? (
                            <>
                              <Button variant="Secondary" color="Primary" size="S">Button</Button>
                              <LinkButton size="S">Link</LinkButton>
                            </>
                          ) : undefined}
                        >
                          {alertMessage}
                        </Alert>
                      )}
                    </div>
                    <div className="events">
                      {alertLog.length === 0 ? '— hover / click / focus the alert to see events —' : alertLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Icon alignment: title ON vs OFF</h2>
                    <p className="stage-note">
                      The icon always top-aligns with the body column, visually centering against the first text line — whether that is a bold title or a smaller description.
                    </p>
                    <div className="preview" style={{ gap: 'var(--gap-16)', flexWrap: 'wrap', alignItems: 'flex-start' }}>
                      <div style={{ flex: 1, minWidth: 200 }}>
                        <p style={{ fontSize: 12, color: 'var(--color-text-subdued)', marginBottom: 'var(--gap-8)', fontWeight: 700 }}>TITLE ON — ICON ↔ TITLE</p>
                        <Alert state="info" emphasis="subtle" title="Alert Title">
                          Lorem ipsum placeholder text commonly used in the publishing industries.
                        </Alert>
                      </div>
                      <div style={{ flex: 1, minWidth: 200 }}>
                        <p style={{ fontSize: 12, color: 'var(--color-text-subdued)', marginBottom: 'var(--gap-8)', fontWeight: 700 }}>TITLE OFF — ICON ↔ DESCRIPTION</p>
                        <Alert state="info" emphasis="subtle">
                          Lorem ipsum placeholder text commonly used in the publishing industries.
                        </Alert>
                      </div>
                    </div>
                  </section>
                </>
              )}

              {activeComponent === 'breadcrumbs' && (
                <>
                  <section>
                    <h2>Breadcrumbs — Interactive Playground</h2>
                    <p className="stage-note">
                      Ancestor items fire onClick. The current page item is plain text (non-interactive).
                    </p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 'var(--gap-16)' }}>
                      <Breadcrumbs
                        items={BC_ITEMS_MAP[bcItemCount]}
                        showHome={bcShowHome}
                      />
                    </div>
                    <div className="events">
                      {bcLog.length === 0 ? '— no events yet —' : bcLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>Breadcrumbs — All Variants</h2>
                    <p className="stage-note">showHome=false (text start) and showHome=true (home icon start), across item counts 2–5.</p>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--gap-16)', padding: 'var(--gap-16)', background: 'var(--color-surface-2)', borderRadius: 'var(--rd-S)' }}>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>2 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['2']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>2 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['2']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>3 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['3']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>3 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['3']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>4 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['4']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>4 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['4']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>5 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['5']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>5 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['5']} showHome={true} />
                      </div>
                    </div>
                  </section>

                </>
              )}

              {activeComponent === 'pagination' && (
                <>
                  <section>
                    <h2>Pagination — Interactive Playground</h2>
                    <p className="stage-note">
                      Adjust props in the left panel. All navigation buttons fire events logged below.
                    </p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 'var(--gap-16)' }}>
                      <Pagination
                        pageStatus={pgStatus}
                        showPageNumber={pgShowNumbers}
                        currentPage={pgCurrentPage}
                        totalPages={pgTotalPages}
                        onPageChange={(p) => { setPgCurrentPage(p); pushPgLog(`onPageChange: ${p}`); if (p === 1) setPgStatus('First page'); else if (p === pgTotalPages) setPgStatus('Last pages'); else setPgStatus('Middle pages'); }}
                        onPageMouseEnter={(p) => pushPgLog(`onPageMouseEnter: ${p}`)}
                        onPageMouseLeave={(p) => pushPgLog(`onPageMouseLeave: ${p}`)}
                        onPrev={() => { const p = Math.max(1, pgCurrentPage - 1); setPgCurrentPage(p); if (p === 1) setPgStatus('First page'); else setPgStatus('Middle pages'); pushPgLog('onPrev'); }}
                        onPrevMouseEnter={() => pushPgLog('onPrevMouseEnter')}
                        onPrevMouseLeave={() => pushPgLog('onPrevMouseLeave')}
                        onNext={() => { const p = Math.min(pgTotalPages, pgCurrentPage + 1); setPgCurrentPage(p); if (p === pgTotalPages) setPgStatus('Last pages'); else setPgStatus('Middle pages'); pushPgLog('onNext'); }}
                        onNextMouseEnter={() => pushPgLog('onNextMouseEnter')}
                        onNextMouseLeave={() => pushPgLog('onNextMouseLeave')}
                        onSkipFirst={() => { setPgCurrentPage(1); setPgStatus('First page'); pushPgLog('onSkipFirst'); }}
                        onSkipFirstMouseEnter={() => pushPgLog('onSkipFirstMouseEnter')}
                        onSkipFirstMouseLeave={() => pushPgLog('onSkipFirstMouseLeave')}
                        onSkipLast={() => { setPgCurrentPage(pgTotalPages); setPgStatus('Last pages'); pushPgLog('onSkipLast'); }}
                        onSkipLastMouseEnter={() => pushPgLog('onSkipLastMouseEnter')}
                        onSkipLastMouseLeave={() => pushPgLog('onSkipLastMouseLeave')}
                      />
                    </div>
                    <div className="events">
                      {pgLog.length === 0 ? '— no events yet —' : pgLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>Pagination — All Variants</h2>
                    <p className="stage-note">All pageStatus values × showPageNumber combinations.</p>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--gap-16)', padding: 'var(--gap-16)', background: 'var(--color-surface-2)', borderRadius: 'var(--rd-S)' }}>
                      {[
                        { label: 'pageStatus="First page" · showPageNumber=true',  status: 'First page',   show: true,  cur: 1,  total: 12 },
                        { label: 'pageStatus="Middle pages" · showPageNumber=true', status: 'Middle pages', show: true,  cur: 6,  total: 12 },
                        { label: 'pageStatus="Last pages" · showPageNumber=true',   status: 'Last pages',  show: true,  cur: 12, total: 12 },
                        { label: 'pageStatus="-" · showPageNumber=false',           status: '-',           show: false, cur: 1,  total: 12 },
                        { label: 'pageStatus="Middle pages" · showPageNumber=false', status: 'Middle pages', show: false, cur: 6, total: 12 },
                        { label: 'totalPages=5 · Middle page',                      status: 'Middle pages', show: true,  cur: 3,  total: 5  },
                      ].map(({ label, status, show, cur, total }) => (
                        <div key={label}>
                          <p className="stage-note" style={{ marginBottom: 'var(--gap-8)' }}>{label}</p>
                          <Pagination
                            pageStatus={status}
                            showPageNumber={show}
                            currentPage={cur}
                            totalPages={total}
                          />
                        </div>
                      ))}
                    </div>
                  </section>
                </>
              )}

              {activeComponent === 'alert' && (
                <>
                  <section>
                    <h2>Alert — Interactive Playground</h2>
                    <p className="stage-note">Adjust props in the left panel to preview any combination.</p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                      {alertClosed ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
                          <span>Alert dismissed.</span>
                          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontFamily: 'inherit', fontSize: 'var(--font-size-body-small)', padding: 0 }} onClick={() => setAlertClosed(false)}>
                            Restore
                          </button>
                        </div>
                      ) : (
                        <Alert
                          state={alertState}
                          emphasis={alertEmphasis}
                          isFlag={alertIsFlag}
                          title={alertShowTitle ? (alertTitle || undefined) : undefined}
                          onClose={alertShowClose ? () => setAlertClosed(true) : undefined}
                          actions={alertShowActions ? (
                            <>
                              <Button variant="Secondary" color="Primary" size="S">Button</Button>
                              <LinkButton size="S">Link</LinkButton>
                            </>
                          ) : undefined}
                        >
                          {alertMessage}
                        </Alert>
                      )}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtle</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code>: light background tint + 1 px coloured border. Default for most usage.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtle" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtler</h2>
                    <p className="stage-note">
                      <code>emphasis="subtler"</code>: white background + 2 px coloured border. Use when the Alert is secondary to surrounding content.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtler" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Dismiss (onClose)</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code> shows a dismiss button when <code>onClose</code> is supplied. <code>emphasis="subtler"</code> never shows one.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => <DismissableAlert key={s} state={s} />)}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Toast (isFlag)</h2>
                    <p className="stage-note">
                      <code>isFlag=true</code>: floating snackbar with left-border accent + shadow. Auto-dismisses after 5 s.
                    </p>
                    <div className="alert-toast-triggers">
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('success')}>Success toast</Button>
                      <Button variant="Secondary" color="Error"    size="M" onClick={() => showToast('error')}>Error toast</Button>
                      <Button variant="Secondary" color="Warning"  size="M" onClick={() => showToast('warning')}>Warning toast</Button>
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('info')}>Info toast</Button>
                    </div>
                    {toasts.length > 0 && (
                      <p className="stage-note" style={{ marginTop: 'var(--gap-8)' }}>
                        {toasts.length} active toast{toasts.length > 1 ? 's' : ''} — bottom-right corner.
                      </p>
                    )}
                  </section>
                </>
              )}
            </main>

            {/* ---- Toast overlay (fixed bottom-right) ---- */}
            <div className="toast-container" aria-live="polite" aria-atomic="false">
              {toasts.map((t) => (
                <Alert key={t.id} state={t.state} emphasis="subtle" isFlag={true} title={ALERT_TITLES[t.state]} onClose={() => dismissToast(t.id)}>
                  {ALERT_MESSAGES[t.state]}
                </Alert>
              ))}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Playground />);
    </script>
  </body>
</html>
