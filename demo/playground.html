/* ============================================================
 * Button.css
 * ============================================================ */
.dcds-Button { display:inline-flex; align-items:center; justify-content:center; gap:var(--gap-8); font-family:var(--font-family); font-weight:var(--font-weight-bold); border:1px solid transparent; cursor:pointer; transition:background-color 120ms ease,border-color 120ms ease,color 120ms ease; white-space:nowrap; user-select:none; text-decoration:none; background:none; }

.dcds-Button--size-L { height:48px; padding:0 var(--gap-20); font-size:var(--font-size-body); border-radius:var(--rd-S); }
.dcds-Button--size-M { height:40px; padding:0 var(--gap-16); font-size:var(--font-size-body); border-radius:var(--rd-S); }
.dcds-Button--size-S { height:32px; padding:0 var(--gap-12); font-size:var(--font-size-body-small); border-radius:var(--rd-XS); }

.dcds-Button--size-S .dcds-Button__icon, .dcds-Button--size-XS .dcds-Button__icon { width:12px; height:12px; }

.dcds-Button--icon-only.dcds-Button--size-M { width:40px; padding:0; }
.dcds-Button--icon-only.dcds-Button--size-S { width:32px; padding:0; }

.dcds-Button--full-width { width:100%; }
.dcds-Button--variant-Primary.dcds-Button--color-Primary { background-color:var(--color-fill-action); color:var(--color-text-invert); }
.dcds-Button--variant-Primary.dcds-Button--color-Primary:hover:not(:disabled) { background-color:var(--color-fill-dark-action); }

.dcds-Button--variant-Secondary { background-color:var(--color-surface-1); }

.dcds-Button--variant-Secondary.dcds-Button--color-Primary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }

.dcds-Button--variant-Secondary.dcds-Button--color-Error:hover:not(:disabled) { background-color:var(--color-fill-light-error); }

.dcds-DropdownButton--size-S { height:32px; padding:0 var(--gap-12); font-size:var(--font-size-label); }
.dcds-DropdownButton--size-XS { height:28px; padding:0 var(--gap-8); font-size:var(--font-size-label); }
.dcds-DropdownButton--variant-Primary { background-color:var(--color-fill-action); color:var(--color-text-invert); }
.dcds-DropdownButton--variant-Primary:hover:not(:disabled) { background-color:var(--color-fill-dark-action); }
.dcds-DropdownButton--variant-Secondary { background-color:transparent; border-color:var(--color-stroke-action); color:var(--color-text-action); }
.dcds-DropdownButton--variant-Secondary:hover:not(:disabled) { background-color:var(--color-fill-light-action); }
.dcds-DropdownButton--variant-Tertiary { background-color:transparent; border-color:transparent; color:var(--color-text-action); }

.dcds-DropdownButton--state-Open .dcds-DropdownButton__chevron { transform:rotate(180deg); }

/* ============================================================
 * Switch.css
 * ============================================================ */
.dcds-Switch { display:inline-flex; align-items:center; gap:var(--gap-8); font-family:var(--font-family); cursor:pointer; }

.dcds-Switch__track { position:relative; width:40px; height:20px; background-color:var(--color-surface-1); border:2px solid var(--color-stroke-action); border-radius:var(--rd-Max); transition:background-color 150ms ease,border-color 150ms ease; flex-shrink:0; }
.dcds-Switch__thumb { position:absolute; top:50%; left:2px; width:12px; height:12px; margin-top:-6px; background-color:var(--color-fill-action); border-radius:var(--rd-Max); transition:transform 150ms ease,background-color 150ms ease; }
.dcds-Switch__input:checked + .dcds-Switch__track { background-color:var(--color-fill-action); border-color:var(--color-fill-action); }

.dcds-Switch--State-Disabled .dcds-Switch__label { color:var(--color-text-disabled); }

    <script type="text/babel" data-presets="react">

      const ALERT_ICON_SVG = (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
          <path d="M12 22C17.51 22 22 17.51 22 12C22 6.49 17.51 2 12 2C6.49 2 2 6.49 2 12C2 17.51 6.49 22 12 22ZM12.75 16C12.75 16.41 12.41 16.75 12 16.75C11.59 16.75 11.25 16.41 11.25 16L11.25 11C11.25 10.59 11.59 10.25 12 10.25C12.41 10.25 12.75 10.59 12.75 11L12.75 16ZM11.08 7.62C11.13 7.49 11.2 7.39 11.29 7.29C11.39 7.2 11.5 7.13 11.62 7.08C11.74 7.03 11.87 7 12 7C12.13 7 12.26 7.03 12.38 7.08C12.5 7.13 12.61 7.2 12.71 7.29C12.8 7.39 12.87 7.49 12.92 7.62C12.97 7.74 13 7.87 13 8C13 8.13 12.97 8.26 12.92 8.38C12.87 8.5 12.8 8.61 12.71 8.71C12.61 8.8 12.5 8.87 12.38 8.92C12.14 9.02 11.86 9.02 11.62 8.92C11.5 8.87 11.39 8.8 11.29 8.71C11.2 8.61 11.13 8.5 11.08 8.38C11.03 8.26 11 8.13 11 8C11 7.87 11.03 7.74 11.08 7.62Z" fill="currentColor" />

      const ALERT_ICONS = {

      const AlertCloseIcon = () => (
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">

      function Alert({
        state = 'info',
        emphasis = 'subtle',
        isFlag = false,
        title,
        children,
        onClose,
        actions,
        className,
      }) {
        const timerRef = useRef(null);

        useEffect(() => {
          if (!isFlag || !onClose) return;
          timerRef.current = setTimeout(onClose, 5000);

        const role = (state === 'error' || state === 'warning') ? 'alert' : 'status';

        const showClose = emphasis === 'subtle' && !!onClose;

        const classes = [
          'dcds-Alert',
          `dcds-Alert--state-${state}`,
          `dcds-Alert--emphasis-${emphasis}`,
          isFlag ? 'dcds-Alert--flag' : '',

      /* ============================================================

      function Button({

        size = 'M',
        isDisabled = false,
        isFullWidth = false,
        isIconOnly = false,
        ariaLabel,
        ariaBusy,
        type = 'button',
        className,
        children,
        onClick,
        onFocus,
        onBlur,
        onMouseEnter,
        onMouseLeave,
        onKeyDown,

        const classes = [
          'dcds-Button',
          `dcds-Button--variant-${variant}`,
          `dcds-Button--color-${color}`,
          `dcds-Button--size-${size}`,
          isIconOnly ? 'dcds-Button--icon-only' : '',
          isFullWidth ? 'dcds-Button--full-width' : '',

        return (
          <button

            className={classes}

            aria-disabled={isDisabled || undefined}
            aria-busy={ariaBusy || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            onClick={onClick}
            onFocus={onFocus}
            onBlur={onBlur}
            onMouseEnter={onMouseEnter}
            onMouseLeave={onMouseLeave}
            onKeyDown={onKeyDown}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * LinkButton
       * ============================================================ */
      function LinkButton({
        state = 'Default',
        size = 'M',
        isIconOnly = false,
        ariaLabel,
        href,
        target,
        rel,
        className,
        children,
        onClick,
      }) {
        const isDisabled = state === 'Disabled';
        const classes = [
          'dcds-LinkButton',
          `dcds-LinkButton--state-${state}`,
          `dcds-LinkButton--size-${size}`,
          className || '',
        ].filter(Boolean).join(' ');
        if (href) {
          return (
            <a
              className={classes}
              href={isDisabled ? undefined : href}
              target={target}
              rel={rel}
              aria-disabled={isDisabled || undefined}
              aria-label={isIconOnly ? ariaLabel : undefined}
              onClick={onClick}
            >
              {children}
            </a>
          );
        }
        return (
          <button
            type="button"
            className={classes}
            disabled={isDisabled}
            aria-disabled={isDisabled || undefined}
            aria-label={isIconOnly ? ariaLabel : undefined}
            onClick={onClick}
          >
            {children}
          </button>
        );
      }

      /* ============================================================
       * ChevronDownIcon
       * ============================================================ */
      const ChevronDownIcon = ({ size = 16 }) => (
        <svg width={size} height={size} viewBox="0 0 16 16" fill="none" aria-hidden="true" focusable="false">
          <path d="M3.5 6L8 10.5L12.5 6" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
        </svg>
      );

      /* ============================================================
       * DropdownButton (with floating _BaseMenu)
       * ============================================================ */
      function DropdownButton({
        variant = 'Secondary',
        state = 'Default',
        size = 'M',
        isOpen = false,
        isDisabled = false,
        menuItems = [],
        onToggle,
        onSelect,
        className,
        children,
        onClick,
      }) {
        const wrapperRef = useRef(null);
        const resolvedState = isDisabled ? 'Disabled' : isOpen ? 'Open' : state;

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => {
            if (wrapperRef.current && !wrapperRef.current.contains(e.target)) {
              if (onToggle) onToggle(false);
            }
          };
          document.addEventListener('mousedown', handler);
          return () => document.removeEventListener('mousedown', handler);
        }, [isOpen, onToggle]);

        useEffect(() => {
          if (!isOpen) return;
          const handler = (e) => { if (e.key === 'Escape' && onToggle) onToggle(false); };
          document.addEventListener('keydown', handler);
          return () => document.removeEventListener('keydown', handler);
        }, [isOpen, onToggle]);

        const buttonClasses = [
          'dcds-DropdownButton',
          `dcds-DropdownButton--variant-${variant}`,
          `dcds-DropdownButton--state-${resolvedState}`,
          `dcds-DropdownButton--size-${size}`,
        ].filter(Boolean).join(' ');
        const wrapperClasses = ['dcds-DropdownButton__wrapper', className || ''].filter(Boolean).join(' ');

        return (
          <div ref={wrapperRef} className={wrapperClasses}>
            <button
              type="button"
              className={buttonClasses}
              disabled={isDisabled || resolvedState === 'Disabled'}
              aria-disabled={isDisabled || undefined}
              aria-haspopup="menu"
              aria-expanded={isOpen}
              onClick={(e) => {
                if (onToggle) onToggle(!isOpen);
                if (onClick) onClick(e);
              }}
            >
              <span>{children}</span>
              <span className="dcds-DropdownButton__chevron"><ChevronDownIcon size={16} /></span>
            </button>
            {isOpen && (
              <ul role="menu" className="dcds-DropdownButton__menu">
                {menuItems.map((item) => (
                  <li role="none" key={item.id}>
                    <button
                      type="button"
                      role="menuitem"
                      className="dcds-DropdownButton__menu-item"
                      disabled={item.disabled}
                      onClick={() => {
                        if (item.disabled) return;
                        if (item.onClick) item.onClick();
                        if (onSelect) onSelect(item.id);
                        if (onToggle) onToggle(false);
                      }}
                    >
                      {item.label}
                    </button>
                  </li>
                ))}
              </ul>
            )}
          </div>
        );
      }

      /* ============================================================
       * ButtonGroup
       * ============================================================ */
      function ButtonGroup({ Style = 'Default', isLink = false, ariaLabel, className, children }) {
        const resolved = isLink ? 'Link' : Style;
        const classes = ['dcds-ButtonGroup', `dcds-ButtonGroup--Style-${resolved}`, className || ''].filter(Boolean).join(' ');
        return (
          <div role="group" aria-label={ariaLabel} className={classes}>
            {children}
          </div>
        );
      }

      /* ============================================================
       * Switch
       * ============================================================ */
      function Switch({ State = 'Enabled', checked, defaultChecked = false, name, label, onChange }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const value = isControlled ? !!checked : internal;
        const isDisabled = State === 'Disabled';
        const id = useId();
        const classes = ['dcds-Switch', `dcds-Switch--State-${State}`].join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              type="checkbox"
              role="switch"
              className="dcds-Switch__input"
              name={name}
              checked={value}
              disabled={isDisabled}
              aria-checked={value}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
            />
            <span className="dcds-Switch__track"><span className="dcds-Switch__thumb" /></span>
            {label && <span className="dcds-Switch__label">{label}</span>}
          </label>
        );
      }

      /* ============================================================
       * RadioButton
       * ============================================================ */
      function RadioButton({ State = 'Enabled', name, value, label, checked, defaultChecked, onChange }) {
        const isDisabled = State === 'Disabled';
        const id = useId();
        return (
          <label className={`dcds-RadioButton dcds-RadioButton--State-${State}`} htmlFor={id}>
            <input
              id={id}
              type="radio"
              className="dcds-RadioButton__input"
              name={name}
              value={value}
              checked={checked}
              defaultChecked={defaultChecked}
              disabled={isDisabled}
              onChange={onChange}
            />
            <span className="dcds-RadioButton__indicator" />
            <span className="dcds-RadioButton__label">{label}</span>
          </label>
        );
      }

      /* ============================================================
       * Checkbox
       * ============================================================ */
      function Checkbox({ State = 'Enabled', name, value, label, checked, defaultChecked = false, indeterminate = false, required = false, onChange }) {
        const isControlled = checked !== undefined;
        const [internal, setInternal] = useState(defaultChecked);
        const resolved = isControlled ? !!checked : internal;
        const isDisabled = State === 'Disabled';
        const ref = useRef(null);
        useEffect(() => { if (ref.current) ref.current.indeterminate = indeterminate; }, [indeterminate]);
        const id = useId();
        const classes = ['dcds-Checkbox', `dcds-Checkbox--State-${State}`, indeterminate ? 'dcds-Checkbox--indeterminate' : ''].filter(Boolean).join(' ');
        return (
          <label className={classes} htmlFor={id}>
            <input
              id={id}
              ref={ref}
              type="checkbox"
              className="dcds-Checkbox__input"
              name={name}
              value={value}
              checked={resolved}
              disabled={isDisabled}
              required={required}
              aria-checked={indeterminate ? 'mixed' : resolved}
              onChange={(e) => {
                const next = e.target.checked;
                if (!isControlled) setInternal(next);
                if (onChange) onChange(next, e);
              }}
            />
            <span className="dcds-Checkbox__indicator" />
            <span className="dcds-Checkbox__label">{label}</span>
          </label>
        );
      }

      /* ============================================================
       * Breadcrumbs
       * ============================================================ */
      /* ── _BaseHomeIcon — linear/home-2.svg (default) + bold/home-2.svg (hover) ── */
      function _BaseHomeIcon({ position = 'Previous', href, onClick, onMouseEnter, onMouseLeave }) {
        const icons = (
          <>

              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M9.02 2.83998L3.63 7.03998C2.73 7.73998 2 9.22998 2 10.36V17.77C2 20.09 3.89 21.99 6.21 21.99H17.79C20.11 21.99 22 20.09 22 17.78V10.5C22 9.28998 21.19 7.73998 20.2 7.04998L14.02 2.71998C12.62 1.73998 10.37 1.78998 9.02 2.83998Z"
                      stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
                <path d="M12 17.99V14.99" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" />
              </svg>
            </span>
            <span className="dcds-BaseHomeIcon__bold">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" focusable="false">
                <path d="M20.04 6.82L14.28 2.79C12.71 1.69 10.3 1.75 8.78999 2.92L3.77999 6.83C2.77999 7.61 1.98999 9.21 1.98999 10.47V17.37C1.98999 19.92 4.05999 22 6.60999 22H17.39C19.94 22 22.01 19.93 22.01 17.38V10.6C22.01 9.25 21.14 7.59 20.04 6.82ZM12.75 18C12.75 18.41 12.41 18.75 12 18.75C11.59 18.75 11.25 18.41 11.25 18V15C11.25 14.59 11.59 14.25 12 14.25C12.41 14.25 12.75 14.59 12.75 15V18Z"
                      fill="currentColor" />
              </svg>
            </span>
          </>

        if (position === 'Current') {
          return (
            <div className="dcds-BaseHomeIcon--current" aria-label="Home"
                 onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
              {icons}
            </div>
          );
        }
        return (
          <a className="dcds-BaseHomeIcon" href={href || '#'} aria-label="Home"
             onClick={(e) => { e.preventDefault(); if (onClick) onClick(e); }}
             onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
            {icons}
          </a>
        );
      }

      /* ── _BaseBreadcrumbItems ── */
      function _BaseBreadcrumbItems({ label, position, href, onClick, onMouseEnter, onMouseLeave }) {
        if (position === 'Current') {
          return (
            <span className="dcds-BaseBreadcrumbItems--current" aria-current="page"
                  onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
              {label}
            </span>
          );
        }
        return (
          <a className="dcds-BaseBreadcrumbItems--previous" href={href || '#'}
             onClick={(e) => { e.preventDefault(); if (onClick) onClick(e); }}
             onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}>
            {label}
          </a>
        );
      }

      /* ── Separator ── */
      function Separator() {
        return (
          <li aria-hidden="true">
            <span className="dcds-Breadcrumbs__separator">/</span>
          </li>
        );
      }

      /* ── Breadcrumbs ── */
      function Breadcrumbs({ items = [], showHome = false, className }) {
        const classes = ['dcds-Breadcrumbs', className || ''].filter(Boolean).join(' ');
        return (
          <nav className={classes} aria-label="Breadcrumb">
            <ol className="dcds-Breadcrumbs__list">
              {items.map((item, index) => {
                const isFirst = index === 0;
                const isLast = index === items.length - 1;
                const position = isLast ? 'Current' : 'Previous';
                return (
                  <React.Fragment key={`${item.label}-${index}`}>
                    {!isFirst && <Separator />}
                    <li>
                      {isFirst && showHome
                        ? <_BaseHomeIcon position={position} href={item.href}
                            onClick={item.onClick}
                            onMouseEnter={item.onMouseEnter}
                            onMouseLeave={item.onMouseLeave} />
                        : <_BaseBreadcrumbItems label={item.label} position={position} href={item.href}
                            onClick={item.onClick}
                            onMouseEnter={item.onMouseEnter}
                            onMouseLeave={item.onMouseLeave} />
                      }
                    </li>
                  </React.Fragment>
                );
              })}
            </ol>
          </nav>
        );
      }

      /* ============================================================
       * Reusable control widgets
       * ============================================================ */
      function CtrlSelect({ label, value, onChange, options }) {
        return (
          <div className="control">
            <label>{label}</label>
            <select value={value} onChange={(e) => onChange(e.target.value)}>
              {options.map((o) => <option key={o} value={o}>{o}</option>)}
            </select>
          </div>
        );
      }
      function CtrlToggle({ label, checked, onChange }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="checkbox" checked={checked} onChange={(e) => onChange(e.target.checked)} />
          </div>
        );
      }
      function CtrlText({ label, value, onChange }) {
        return (
          <div className="control">
            <label>{label}</label>
            <input type="text" value={value} onChange={(e) => onChange(e.target.value)} />
          </div>
        );
      }
      function useEventLog() {
        const [log, setLog] = useState([]);
        const push = (msg) => setLog((prev) => [`${new Date().toLocaleTimeString()}  ${msg}`, ...prev.slice(0, 9)]);
        return [log, push];
      }

      /* ============================================================
       * Alert state messages
       * ============================================================ */
      function DismissableAlert({ state }) {
        const [dismissed, setDismissed] = React.useState(false);
        if (dismissed) {
          return (
            <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
              <span>{state} alert dismissed</span>
              <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontSize: 'var(--font-size-body-small)', fontFamily: 'inherit', padding: 0 }} onClick={() => setDismissed(false)}>
                Restore
              </button>
            </div>
          );
        }
        return (
          <Alert state={state} emphasis="subtle" title={ALERT_TITLES[state]} onClose={() => setDismissed(true)}>
            {ALERT_MESSAGES[state]}
          </Alert>
        );

                <>
                  <h2>Breadcrumbs</h2>
                  <CtrlSelect label="No of items" value={bcItemCount} onChange={setBcItemCount} options={['1', '2', '3', '4', '5']} />
                  <CtrlToggle label="showHome"    checked={bcShowHome}  onChange={setBcShowHome} />
                </>
              )}

              {activeComponent === 'alert' && (
                <>
                  <h2>Alert</h2>
                  <CtrlSelect label="state"       value={alertState}    onChange={(v) => { setAlertState(v); setAlertClosed(false); }} options={['success', 'error', 'warning', 'info']} />
                  <CtrlSelect label="emphasis"    value={alertEmphasis} onChange={(v) => { setAlertEmphasis(v); setAlertClosed(false); }} options={['subtle', 'subtler']} />
                  <CtrlToggle label="isFlag"      checked={alertIsFlag}      onChange={(v) => { setAlertIsFlag(v); setAlertClosed(false); }} />
                  <CtrlToggle label="showTitle"   checked={alertShowTitle}   onChange={setAlertShowTitle} />
                  <CtrlText   label="title"       value={alertTitle}         onChange={setAlertTitle} />
                  <CtrlText   label="message"     value={alertMessage}       onChange={setAlertMessage} />
                  <CtrlToggle label="showDismiss" checked={alertShowClose}   onChange={(v) => { setAlertShowClose(v); setAlertClosed(false); }} />
                  <CtrlToggle label="showActions" checked={alertShowActions} onChange={setAlertShowActions} />
                </>
              )}
            </aside>

            {/* ============================================================
             * MAIN STAGE — previews
             * ============================================================ */}
            <main className="stage">

              {activeComponent === 'button' && (
                <section>
                  <h2>Button</h2>
                  <p className="stage-note">
                    Click to fire all attached handlers (onClick, onFocus, onBlur, onMouseEnter, onMouseLeave, onKeyDown).
                  </p>
                  <div className="preview">
                    <Button
                      variant={btnVariant}
                      color={btnColor}
                      size={btnSize}
                      isDisabled={btnDisabled}
                      isFullWidth={btnFullWidth}
                      isIconOnly={btnIconOnly}
                      ariaLabel={btnIconOnly ? btnLabel : undefined}
                      onClick={() => pushBtnLog('onClick')}
                      onFocus={() => pushBtnLog('onFocus')}
                      onBlur={() => pushBtnLog('onBlur')}
                      onMouseEnter={() => pushBtnLog('onMouseEnter')}
                      onMouseLeave={() => pushBtnLog('onMouseLeave')}
                      onKeyDown={(e) => pushBtnLog(`onKeyDown: ${e.key}`)}
                    >
                      {btnIconOnly ? <ChevronDownIcon size={16} /> : btnLabel}
                    </Button>
                  </div>
                  <div className="events">
                    {btnLog.length === 0 ? '— no events yet —' : btnLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'linkbutton' && (
                <section>
                  <h2>LinkButton</h2>
                  <p className="stage-note">
                    Provide an <code>href</code> to render as <code>&lt;a&gt;</code>; leave empty for <code>&lt;button&gt;</code>.
                  </p>
                  <div className="preview">
                    <LinkButton state={lbState} size={lbSize} href={lbHref || undefined} onClick={() => pushLbLog('onClick')}>
                      {lbLabel}
                    </LinkButton>
                  </div>
                  <div className="events">
                    {lbLog.length === 0 ? '— no events yet —' : lbLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'dropdownbutton' && (
                <section>
                  <h2>DropdownButton</h2>
                  <p className="stage-note">
                    When <code>isOpen=true</code>, the floating menu drops below. Click outside or press <code>Escape</code> to dismiss.
                  </p>
                  <div className="preview" style={{ minHeight: 180, alignItems: 'flex-start' }}>
                    <DropdownButton
                      variant={dbVariant}
                      size={dbSize}
                      isDisabled={dbDisabled}
                      isOpen={dbOpen}
                      onToggle={(next) => { setDbOpen(next); pushDbLog(`onToggle: ${next}`); }}
                      onSelect={(id) => pushDbLog(`onSelect: ${id}`)}
                      onClick={() => pushDbLog('onClick')}
                      menuItems={[{ id: 'opt-1', label: 'Option 1' }, { id: 'opt-2', label: 'Option 2' }]}
                    >
                      {dbLabel}
                    </DropdownButton>
                  </div>
                  <div className="events">
                    {dbLog.length === 0 ? '— no events yet —' : dbLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'buttongroup' && (
                <section>
                  <h2>ButtonGroup</h2>
                  <p className="stage-note">
                    Pairs related action buttons with a consistent gap. Each child retains its own rounded corners.
                  </p>
                  <div className="preview">
                    <ButtonGroup Style={bgStyle} ariaLabel="Paired actions">
                      {bgStyle === 'Link' ? (
                        <>
                          <LinkButton size="M" href="#">Link ↗</LinkButton>
                          <Button variant="Primary" color="Primary" size="M">Button</Button>
                        </>
                      ) : (
                        <>
                          <Button variant="Secondary" color="Primary" size="M">Cancel</Button>
                          <Button variant="Primary" color="Primary" size="M">Save</Button>
                        </>
                      )}
                    </ButtonGroup>
                  </div>
                  <p className="stage-note" style={{ marginTop: 'var(--gap-16)' }}>Large size:</p>
                  <div className="preview">
                    <ButtonGroup Style={bgStyle} ariaLabel="Paired actions large">
                      {bgStyle === 'Link' ? (
                        <>
                          <LinkButton size="L" href="#">Link ↗</LinkButton>
                          <Button variant="Primary" color="Primary" size="L">Button</Button>
                        </>
                      ) : (
                        <>
                          <Button variant="Secondary" color="Primary" size="L">Cancel</Button>
                          <Button variant="Primary" color="Primary" size="L">Save</Button>
                        </>
                      )}
                    </ButtonGroup>
                  </div>
                </section>
              )}

              {activeComponent === 'switch' && (
                <section>
                  <h2>Switch</h2>
                  <div className="preview">
                    <Switch
                      State={swState}
                      checked={swChecked}
                      label="Email notifications"
                      onChange={(next) => { setSwChecked(next); pushSwLog(`onChange: ${next}`); }}
                    />
                  </div>
                  <div className="events">
                    {swLog.length === 0 ? '— no events yet —' : swLog.join('\n')}
                  </div>
                </section>
              )}

              {activeComponent === 'radiobutton' && (
                <section>
                  <h2>RadioButton</h2>
                  <p className="stage-note">
                    Always wrap in <code>&lt;fieldset&gt;</code> + <code>&lt;legend&gt;</code> with a shared <code>name</code>.
                  </p>
                  <div className="preview">
                    <fieldset style={{ border: '1px solid var(--color-stroke-subdued)', borderRadius: 'var(--rd-S)', padding: 'var(--gap-12)', display: 'flex', flexDirection: 'column', gap: 'var(--gap-8)' }}>
                      <legend style={{ padding: '0 var(--gap-8)', color: 'var(--color-text-subdued)', fontSize: 'var(--font-size-body-small)' }}>
                        Repayment frequency
                      </legend>
                      {['monthly', 'quarterly', 'annual'].map((v) => (
                        <RadioButton key={v} name="freq" value={v} label={v[0].toUpperCase() + v.slice(1)} State={rbState} checked={rbValue === v} onChange={() => setRbValue(v)} />
                      ))}
                    </fieldset>
                  </div>
                </section>
              )}

              {activeComponent === 'checkbox' && (
                <section>
                  <h2>Checkbox</h2>
                  <p className="stage-note">
                    Toggling <code>indeterminate</code> sets <code>aria-checked="mixed"</code> for select-all patterns.
                  </p>
                  <div className="preview">
                    <Checkbox
                      State={cbState}
                      label="I agree to the terms and conditions"
                      checked={cbChecked}
                      indeterminate={cbIndeterminate}
                      onChange={(next) => setCbChecked(next)}
                    />
                  </div>
                </section>
              )}

              {activeComponent === 'breadcrumbs' && (
                <>
                  <section>
                    <h2>Breadcrumbs — Interactive Playground</h2>
                    <p className="stage-note">
                      Ancestor items fire onClick. The current page item is plain text (non-interactive).
                    </p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'flex-start', gap: 'var(--gap-16)' }}>
                      <Breadcrumbs
                        items={BC_ITEMS_MAP[bcItemCount]}
                        showHome={bcShowHome}
                      />
                    </div>
                    <div className="events">
                      {bcLog.length === 0 ? '— no events yet —' : bcLog.join('\n')}
                    </div>
                  </section>

                  <section>
                    <h2>Breadcrumbs — All Variants</h2>
                    <p className="stage-note">showHome=false (text start) and showHome=true (home icon start), across item counts 2–5.</p>
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 'var(--gap-16)', padding: 'var(--gap-16)', background: 'var(--color-surface-2)', borderRadius: 'var(--rd-S)' }}>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>2 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['2']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>2 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['2']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>3 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['3']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>3 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['3']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>4 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['4']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>4 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['4']} showHome={true} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>5 items · showHome=false</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['5']} showHome={false} />
                      </div>
                      <div>
                        <p className="stage-note" style={{ marginBottom: 'var(--gap-4)' }}>5 items · showHome=true</p>
                        <Breadcrumbs items={BC_ITEMS_MAP['5']} showHome={true} />
                      </div>
                    </div>
                  </section>

                </>
              )}

              {activeComponent === 'alert' && (
                <>
                  <section>
                    <h2>Alert — Interactive Playground</h2>
                    <p className="stage-note">Adjust props in the left panel to preview any combination.</p>
                    <div className="preview" style={{ flexDirection: 'column', alignItems: 'stretch' }}>
                      {alertClosed ? (
                        <div style={{ display: 'flex', alignItems: 'center', gap: 'var(--gap-8)', padding: 'var(--gap-8) var(--gap-12)', background: 'var(--color-surface-3)', borderRadius: 'var(--rd-S)', fontSize: 'var(--font-size-body-small)', color: 'var(--color-text-subdued)' }}>
                          <span>Alert dismissed.</span>
                          <button style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--color-text-action)', fontFamily: 'inherit', fontSize: 'var(--font-size-body-small)', padding: 0 }} onClick={() => setAlertClosed(false)}>
                            Restore
                          </button>
                        </div>
                      ) : (
                        <Alert
                          state={alertState}
                          emphasis={alertEmphasis}
                          isFlag={alertIsFlag}
                          title={alertShowTitle ? (alertTitle || undefined) : undefined}
                          onClose={alertShowClose ? () => setAlertClosed(true) : undefined}
                          actions={alertShowActions ? (
                            <>
                              <Button variant="Secondary" color="Primary" size="S">Button</Button>
                              <LinkButton size="S">Link</LinkButton>
                            </>
                          ) : undefined}
                        >
                          {alertMessage}
                        </Alert>
                      )}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtle</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code>: light background tint + 1 px coloured border. Default for most usage.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtle" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — All States · subtler</h2>
                    <p className="stage-note">
                      <code>emphasis="subtler"</code>: white background + 2 px coloured border. Use when the Alert is secondary to surrounding content.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => (
                        <Alert key={s} state={s} emphasis="subtler" title={ALERT_TITLES[s]}>
                          {ALERT_MESSAGES[s]}
                        </Alert>
                      ))}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Dismiss (onClose)</h2>
                    <p className="stage-note">
                      <code>emphasis="subtle"</code> shows a dismiss button when <code>onClose</code> is supplied. <code>emphasis="subtler"</code> never shows one.
                    </p>
                    <div className="alert-grid">
                      {STATES.map((s) => <DismissableAlert key={s} state={s} />)}
                    </div>
                  </section>

                  <section>
                    <h2>Alert — Toast (isFlag)</h2>
                    <p className="stage-note">
                      <code>isFlag=true</code>: floating snackbar with left-border accent + shadow. Auto-dismisses after 5 s.
                    </p>
                    <div className="alert-toast-triggers">
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('success')}>Success toast</Button>
                      <Button variant="Secondary" color="Error"    size="M" onClick={() => showToast('error')}>Error toast</Button>
                      <Button variant="Secondary" color="Warning"  size="M" onClick={() => showToast('warning')}>Warning toast</Button>
                      <Button variant="Secondary" color="Primary"  size="M" onClick={() => showToast('info')}>Info toast</Button>
                    </div>
                    {toasts.length > 0 && (
                      <p className="stage-note" style={{ marginTop: 'var(--gap-8)' }}>
                        {toasts.length} active toast{toasts.length > 1 ? 's' : ''} — bottom-right corner.
                      </p>
                    )}
                  </section>
                </>
              )}
            </main>

            {/* ---- Toast overlay (fixed bottom-right) ---- */}
            <div className="toast-container" aria-live="polite" aria-atomic="false">
              {toasts.map((t) => (
                <Alert key={t.id} state={t.state} emphasis="subtle" isFlag={true} title={ALERT_TITLES[t.state]} onClose={() => dismissToast(t.id)}>
                  {ALERT_MESSAGES[t.state]}
                </Alert>
              ))}
            </div>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<Playground />);
    </script>
  </body>
</html>
